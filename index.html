  "Disk-Verwaltung": {
    icon: "💾",
    commands: [
      { name:"lsblk", short:"Block-Geräte auflisten", desc:"Zeigt alle Block-Geräte (Festplatten, SSDs, USB-Sticks, Partitionen) in einer übersichtlichen Baumstruktur an.", syntax:"<b>lsblk</b> <span class='opt-part'>[Optionen]</span>", options:[{flag:"lsblk",desc:"Alle Block-Geräte als Baum anzeigen"},{flag:"-f",desc:"Dateisystem-Typ und UUID anzeigen"},{flag:"-o NAME,SIZE,TYPE,MOUNTPOINT",desc:"Bestimmte Spalten wählen"},{flag:"-d",desc:"Nur Geräte ohne Partitionen"},{flag:"-J",desc:"JSON-Ausgabe"}], examples:[{title:"Alle Laufwerke anzeigen",code:"<span class='prompt'>$ </span>lsblk\n<span class='output'>NAME   MAJ:MIN RM  SIZE RO TYPE MOUNTPOINT\nsda      8:0    0  500G  0 disk\n├─sda1   8:1    0  512M  0 part /boot/efi\n├─sda2   8:2    0    2G  0 part /boot\n└─sda3   8:3    0  498G  0 part /\nsdb      8:16   1   32G  0 disk\n└─sdb1   8:17   1   32G  0 part /media/usb</span>",note:"Zeigt sofort Festplatten, Partitionen und Einhängepunkte."},{title:"Mit Dateisystem-Info",code:"<span class='prompt'>$ </span>lsblk -f\n<span class='output'>NAME   FSTYPE LABEL  UUID                                 MOUNTPOINT\nsda3   ext4          a3b1c2d4-...                         /</span>",note:"-f zeigt UUID — wichtig für /etc/fstab Einträge."}], tip:"lsblk ist der erste Befehl bei Festplatten-Diagnose — schneller und übersichtlicher als fdisk -l.", tags:["Disk","Hardware","System"] },
      { name:"fdisk", short:"Partitionen verwalten", desc:"Klassisches Werkzeug zum Erstellen, Löschen und Ändern von Partitionen. Interaktiver Modus mit Menü.", syntax:"<b>fdisk</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Gerät</span>", options:[{flag:"fdisk -l",desc:"Alle Partitionen auflisten"},{flag:"fdisk /dev/sdb",desc:"Interaktiver Modus für Gerät"},{flag:"p",desc:"(im Menü) Partitionstabelle anzeigen"},{flag:"n",desc:"(im Menü) Neue Partition erstellen"},{flag:"d",desc:"(im Menü) Partition löschen"},{flag:"t",desc:"(im Menü) Partitionstyp ändern"},{flag:"w",desc:"(im Menü) Änderungen schreiben und beenden"},{flag:"q",desc:"(im Menü) Beenden ohne Speichern"}], examples:[{title:"Partitionen auflisten",code:"<span class='prompt'>$ </span>sudo fdisk -l\n<span class='output'>Disk /dev/sda: 500 GB\nDevice     Boot   Start      End  Sectors  Size Type\n/dev/sda1  *       2048  1050623  1048576  512M EFI System\n/dev/sda2       1050624  5244927  4194304    2G Linux filesystem\n/dev/sda3       5244928 976773134 971528207  463G Linux filesystem</span>",note:"sudo nötig um alle Details zu sehen."},{title:"Neue Partition erstellen",code:"<span class='prompt'>$ </span>sudo fdisk /dev/sdb\n<span class='output'>Command (m for help): n\nPartition type: p (primary)\nFirst sector: [Enter]\nLast sector: +20G\nCommand: w\nThe partition table has been altered.</span>",note:"w schreibt die Änderungen — vorher kann alles abgebrochen werden."}], warn:"fdisk arbeitet direkt an der Partitionstabelle — ein Fehler kann alle Daten auf dem Gerät zerstören! Vorher Backup erstellen.", tags:["Disk","Partitionen","System-Admin"] },
      { name:"parted", short:"Moderne Partitionsverwaltung", desc:"Modernere Alternative zu fdisk mit GPT-Unterstützung, Scripting-Modus und Unterstützung für größere Festplatten (>2TB).", syntax:"<b>parted</b> <span class='arg-part'>Gerät</span> <span class='opt-part'>[Befehl]</span>", options:[{flag:"parted /dev/sdb print",desc:"Partitionen anzeigen"},{flag:"parted /dev/sdb mklabel gpt",desc:"GPT-Tabelle erstellen"},{flag:"parted /dev/sdb mkpart primary ext4 0% 100%",desc:"Partition erstellen"},{flag:"parted /dev/sdb rm 1",desc:"Partition 1 löschen"},{flag:"parted /dev/sdb resizepart 1 50GB",desc:"Partition vergrößern"},{flag:"-s",desc:"Skript-Modus (keine Nachfragen)"}], examples:[{title:"USB-Stick neu partitionieren",code:"<span class='prompt'>$ </span>sudo parted /dev/sdb --script mklabel gpt\n<span class='prompt'>$ </span>sudo parted /dev/sdb --script mkpart primary ext4 0% 100%\n<span class='prompt'>$ </span>sudo mkfs.ext4 /dev/sdb1",note:"parted + mkfs.ext4 — kompletter Workflow für neuen Datenträger."},{title:"Partitionen anzeigen",code:"<span class='prompt'>$ </span>sudo parted /dev/sda print\n<span class='output'>Model: ATA SAMSUNG (disk)\nDisk /dev/sda: 500GB\nPartition Table: gpt\nNumber Start   End    Size   File system  Name\n 1     1049kB  538MB  537MB  fat32        EFI\n 2     538MB   3000MB 2461MB ext4         boot</span>",note:"parted zeigt Größen in GB/MB statt Sektoren — leichter lesbar als fdisk."}], warn:"Auch parted kann bei falscher Bedienung Daten vernichten — immer zuerst mit print ansehen!", tags:["Disk","Partitionen","System-Admin"] },
      { name:"mkfs", short:"Dateisystem erstellen", desc:"Formatiert eine Partition mit einem Dateisystem. mkfs ist der Oberbegriff — mkfs.ext4, mkfs.vfat, mkfs.xfs für spezifische Typen.", syntax:"<b>mkfs.ext4</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Partition</span>", options:[{flag:"mkfs.ext4 /dev/sdb1",desc:"Ext4-Dateisystem erstellen (Linux-Standard)"},{flag:"mkfs.vfat -F 32 /dev/sdb1",desc:"FAT32 (für USB-Sticks, Windows-kompatibel)"},{flag:"mkfs.ntfs /dev/sdb1",desc:"NTFS (Windows)"},{flag:"mkfs.xfs /dev/sdb1",desc:"XFS (für Server, große Dateien)"},{flag:"-L 'Daten'",desc:"Label setzen"},{flag:"-n",desc:"Simulation ohne Formatierung"}], examples:[{title:"USB-Stick als FAT32 formatieren",code:"<span class='prompt'>$ </span>sudo mkfs.vfat -F 32 -n 'MEINSTICK' /dev/sdb1\n<span class='output'>mkfs.fat 4.1 (2017-01-24)\n/dev/sdb1: 30 GB</span>",note:"FAT32 wird von Linux, Windows und Mac erkannt."},{title:"Linux-Partition erstellen",code:"<span class='prompt'>$ </span>sudo mkfs.ext4 -L 'Daten' /dev/sdb1\n<span class='output'>Creating filesystem with 7864320 4k blocks\nWriting superblocks and filesystem accounting information: done</span>",note:"Ext4 ist das Standard-Dateisystem für Linux."}], warn:"mkfs löscht ALLE Daten auf der Partition unwiederbringlich! Gerät vorher mit lsblk prüfen.", tags:["Disk","Dateisystem","System-Admin"] },
      { name:"mount / umount", short:"Dateisysteme einbinden", desc:"mount binden ein Dateisystem (Partition, USB, ISO) in den Verzeichnisbaum ein. umount trennt die Verbindung sicher.", syntax:"<b>mount</b> <span class='arg-part'>Gerät Mountpoint</span>  |  <b>umount</b> <span class='arg-part'>Mountpoint</span>", options:[{flag:"mount /dev/sdb1 /mnt/daten",desc:"Partition einbinden"},{flag:"mount -t vfat /dev/sdb1 /mnt/usb",desc:"Mit Dateisystemtyp"},{flag:"mount -o ro /dev/sdb1 /mnt",desc:"Nur-Lesen einbinden"},{flag:"mount -o loop image.iso /mnt/iso",desc:"ISO-Datei einbinden"},{flag:"mount -a",desc:"Alle Einträge aus /etc/fstab einbinden"},{flag:"umount /mnt/daten",desc:"Verbindung sicher trennen"},{flag:"df -h",desc:"Alle eingebundenen Dateisysteme anzeigen"}], examples:[{title:"USB-Stick einbinden",code:"<span class='prompt'>$ </span>sudo mkdir -p /mnt/usb\n<span class='prompt'>$ </span>sudo mount /dev/sdb1 /mnt/usb\n<span class='prompt'>$ </span>ls /mnt/usb\n<span class='output'>Dokumente  Fotos  backup.tar.gz</span>",note:"Danach auf /mnt/usb zugreifen wie auf jeden anderen Ordner."},{title:"ISO-Datei einbinden",code:"<span class='prompt'>$ </span>sudo mount -o loop ubuntu.iso /mnt/iso\n<span class='prompt'>$ </span>ls /mnt/iso\n<span class='output'>boot  casper  dists  install</span>\n<span class='prompt'>$ </span>sudo umount /mnt/iso",note:"-o loop behandelt eine Datei wie ein Block-Gerät."}], tip:"udisksctl mount -b /dev/sdb1 bindet USB-Sticks ohne sudo ein — für Desktop-Nutzer praktischer.", tags:["Disk","Mount","Dateisystem"] },
      { name:"fsck", short:"Dateisystem prüfen und reparieren", desc:"Prüft ein Dateisystem auf Fehler und kann diese automatisch reparieren. Wird automatisch beim Booten ausgeführt oder manuell auf ungemounteten Partitionen.", syntax:"<b>fsck</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Partition</span>", options:[{flag:"fsck /dev/sdb1",desc:"Dateisystem prüfen"},{flag:"fsck -a /dev/sdb1",desc:"Fehler automatisch reparieren"},{flag:"fsck -n /dev/sdb1",desc:"Nur prüfen, nichts reparieren (sicher)"},{flag:"fsck -f /dev/sdb1",desc:"Erzwingen auch wenn sauber"},{flag:"fsck.ext4 -v /dev/sdb1",desc:"Ext4-spezifisch mit Details"},{flag:"tune2fs -l /dev/sdb1",desc:"Dateisystem-Metadaten anzeigen"}], examples:[{title:"USB-Stick prüfen",code:"<span class='prompt'>$ </span>sudo umount /dev/sdb1\n<span class='prompt'>$ </span>sudo fsck -n /dev/sdb1\n<span class='output'>fsck from util-linux 2.36\ne2fsck 1.46: checking pass 1, 2, 3, 4, 5\n/dev/sdb1: clean, 128/7864320 files, 1204/31457280 blocks</span>",note:"-n prüft ohne zu verändern — sicher für erste Inspektion."},{title:"Fehler reparieren",code:"<span class='prompt'>$ </span>sudo fsck -a /dev/sdb1\n<span class='output'>Phase 1: Check Blocks and Sizes\nPhase 2: Check Pathnames\n** File system was modified **</span>",note:"-a repariert alle erkannten Fehler automatisch ohne Rückfragen."}], warn:"fsck nur auf UNGEMOUNTETEN Partitionen ausführen — sonst Datenverlust möglich!", tags:["Disk","Reparatur","System-Admin"] },
      { name:"dd", short:"Rohdaten kopieren und Images erstellen", desc:"dd kopiert Daten Block für Block — direkt von/zu Geräten. Für Disk-Images, USB-Sticks bespielen, Boot-Sektoren sichern.", syntax:"<b>dd</b> <span class='arg-part'>if=Quelle of=Ziel</span> <span class='opt-part'>[bs=Blocksize]</span>", options:[{flag:"if=",desc:"Input-File (Quelle) — Gerät oder Datei"},{flag:"of=",desc:"Output-File (Ziel) — Gerät oder Datei"},{flag:"bs=4M",desc:"Blockgröße (4MB für schnelle Kopie)"},{flag:"status=progress",desc:"Fortschritt anzeigen"},{flag:"conv=fsync",desc:"Auf Festplatte schreiben bevor Fertig"},{flag:"count=1 skip=0",desc:"Nur ersten Block kopieren"}], examples:[{title:"ISO auf USB-Stick schreiben",code:"<span class='prompt'>$ </span>sudo dd if=ubuntu-22.04.iso of=/dev/sdb \\\n  bs=4M status=progress conv=fsync\n<span class='output'>1,2 GB kopiert, 0,45 s, 2,7 GB/s\n Datensätze ein- und ausgegeben</span>",note:"status=progress zeigt Geschwindigkeit und ETA."},{title:"Festplatten-Image erstellen",code:"<span class='prompt'>$ </span>sudo dd if=/dev/sda of=/backup/sda.img \\\n  bs=4M status=progress\n<span class='comment'># Image komprimieren:</span>\n<span class='prompt'>$ </span>sudo dd if=/dev/sda bs=4M | gzip > /backup/sda.img.gz",note:"Komplettes 1:1-Abbild der Festplatte — ideal für Backups."},{title:"USB-Stick sicher löschen",code:"<span class='prompt'>$ </span>sudo dd if=/dev/zero of=/dev/sdb bs=4M status=progress\n<span class='comment'># oder mit Zufallsdaten:</span>\n<span class='prompt'>$ </span>sudo dd if=/dev/urandom of=/dev/sdb bs=4M status=progress",note:"/dev/urandom erzeugt kryptografisch zufällige Daten — sicherer."}], warn:"dd ist 'disk destroyer' wenn falsch eingesetzt! if und of IMMER doppelt prüfen — falsches of zerstört Daten sofort.", tags:["Disk","Image","Backup","System-Admin"] },
      { name:"blkid / smartctl", short:"Disk-Infos und Gesundheit", desc:"blkid zeigt UUID und Dateisystem-Typ jeder Partition. smartctl prüft die physische Gesundheit von Festplatten (S.M.A.R.T.-Daten).", syntax:"<b>blkid</b>  |  <b>smartctl -a</b> <span class='arg-part'>Gerät</span>", options:[{flag:"blkid",desc:"UUID und Typ aller Partitionen"},{flag:"blkid /dev/sda1",desc:"Nur eine Partition"},{flag:"smartctl -a /dev/sda",desc:"Alle S.M.A.R.T.-Daten"},{flag:"smartctl -H /dev/sda",desc:"Nur Gesundheitsstatus"},{flag:"smartctl -t short /dev/sda",desc:"Kurztest starten (~2min)"},{flag:"smartctl -t long /dev/sda",desc:"Volltest starten (~mehrere Stunden)"}], examples:[{title:"UUID für /etc/fstab herausfinden",code:"<span class='prompt'>$ </span>sudo blkid\n<span class='output'>/dev/sda1: UUID=\"a3b1c2d4-e5f6-...\" TYPE=\"ext4\" LABEL=\"root\"\n/dev/sda2: UUID=\"A1B2-C3D4\" TYPE=\"vfat\" LABEL=\"EFI\"</span>",note:"UUID statt /dev/sda1 in /etc/fstab verwenden — stabiler bei Geräteumbenennung."},{title:"Festplattengesundheit prüfen",code:"<span class='prompt'>$ </span>sudo smartctl -H /dev/sda\n<span class='output'>SMART overall-health self-assessment test result: PASSED</span>\n<span class='prompt'>$ </span>sudo smartctl -a /dev/sda | grep -i error\n<span class='output'>Reallocated_Sector_Ct   0x0032   100   100   010    Old_age  1</span>",note:"Reallocated Sectors > 0 zeigt beginnende Festplattenprobleme."}], tip:"smartctl installieren: sudo apt install smartmontools — bei jedem Server Pflicht für regelmäßige Gesundheitschecks.", tags:["Disk","Hardware","Diagnose"] }
    ]
  },

  "SSH – Vertieft": {
    icon: "🔐",
    commands: [
      { name:"~/.ssh/config", short:"SSH Client-Konfigurationsdatei", desc:"Die SSH-Konfigurationsdatei erlaubt es, Verbindungsparameter für Hosts zu speichern — Aliase, Benutzer, Ports, Schlüssel und Weiterleitungsregeln. Spart bei jeder Verbindung Zeit.", syntax:"<b>~/.ssh/config</b> — Textdatei (Berechtigungen: 600)", options:[{flag:"Host Alias",desc:"Name/Alias für diesen Eintrag"},{flag:"HostName IP/Domain",desc:"Echter Hostname oder IP"},{flag:"User benutzername",desc:"Login-Benutzer"},{flag:"Port 2222",desc:"Abweichender Port"},{flag:"IdentityFile ~/.ssh/id_ed25519",desc:"Zu verwendender privater Schlüssel"},{flag:"ServerAliveInterval 60",desc:"Keepalive-Ping alle 60 Sekunden"},{flag:"ForwardAgent yes",desc:"SSH-Agent-Forwarding aktivieren"},{flag:"ProxyJump bastion",desc:"Über Bastion-Host verbinden"}], examples:[{title:"Typische Config-Datei",code:"<span class='comment'># ~/.ssh/config</span>\n\nHost meinserver\n    HostName 192.168.1.100\n    User admin\n    Port 2222\n    IdentityFile ~/.ssh/id_ed25519\n    ServerAliveInterval 60\n\nHost github\n    HostName github.com\n    User git\n    IdentityFile ~/.ssh/github_key\n\n<span class='comment'># Danach einfach:</span>\n<span class='prompt'>$ </span>ssh meinserver",note:"Statt 'ssh admin@192.168.1.100 -p 2222 -i ~/.ssh/id_ed25519' reicht 'ssh meinserver'."},{title:"Config-Datei sichern",code:"<span class='prompt'>$ </span>chmod 600 ~/.ssh/config\n<span class='prompt'>$ </span>ls -la ~/.ssh/\n<span class='output'>-rw------- config\n-rw------- id_ed25519\n-rw-r--r-- id_ed25519.pub\n-rw-r--r-- known_hosts</span>",note:"~/.ssh/ muss 700, Schlüssel müssen 600 haben — sonst verweigert SSH die Verbindung."}], tip:"Host * am Ende der Config setzt globale Defaults (z.B. ServerAliveInterval 60) für alle Verbindungen.", tags:["SSH","Konfiguration","Produktivität"] },

      { name:"SSH Port Forwarding", short:"Netzwerkverkehr durch SSH tunneln", desc:"SSH-Tunnel leiten Netzwerkverkehr verschlüsselt durch eine SSH-Verbindung. Drei Varianten: Lokal (-L), Remote (-R) und Dynamisch (-D als SOCKS-Proxy).", syntax:"<b>ssh</b> <span class='opt-part'>-L|-R|-D</span> <span class='arg-part'>[bind:]localPort:Ziel:remotePort</span> <span class='arg-part'>user@server</span>", options:[{flag:"-L 8080:intern:80",desc:"Lokal: Lokaler Port → Remote-Ziel"},{flag:"-R 9090:localhost:3000",desc:"Remote: Remote-Port → Lokaler Port"},{flag:"-D 1080",desc:"Dynamisch: SOCKS5-Proxy auf Port 1080"},{flag:"-N",desc:"Kein Befehl ausführen (nur Tunnel)"},{flag:"-f",desc:"In den Hintergrund wechseln"},{flag:"-g",desc:"Andere Hosts dürfen den Tunnel nutzen"}], examples:[{title:"Lokaler Tunnel (Firewall umgehen)",code:"<span class='comment'># Internes Webinterface lokal erreichbar machen:</span>\n<span class='prompt'>$ </span>ssh -L 8080:intern-webserver:80 user@jump-host -N\n<span class='comment'># → Browser: http://localhost:8080</span>",note:"Nützlich wenn ein internes System nur vom Server erreichbar ist."},{title:"Remote Tunnel (lokalen Dienst veröffentlichen)",code:"<span class='comment'># Lokalen Entwicklungsserver über Server erreichbar machen:</span>\n<span class='prompt'>$ </span>ssh -R 9000:localhost:3000 user@meinserver -N\n<span class='comment'># → Besucher von meinserver:9000 landen auf localhost:3000</span>",note:"Ähnlich wie ngrok — eigener Server statt Drittanbieter."},{title:"SOCKS5-Proxy (gesamter Traffic)",code:"<span class='prompt'>$ </span>ssh -D 1080 user@meinserver -N -f\n<span class='comment'># Browser-Proxy auf SOCKS5 127.0.0.1:1080 setzen</span>\n<span class='comment'># Gesamter Browser-Traffic läuft verschlüsselt über Server</span>",note:"Praktisch in unsicheren Netzwerken (Hotel-WLAN, öffentliches WLAN)."}], tip:"ssh -L 5432:localhost:5432 user@dbserver erlaubt lokale Tools direkt auf eine Remote-Datenbank zugreifen.", tags:["SSH","Tunnel","Sicherheit","Netzwerk"] },

      { name:"SSH ProxyJump", short:"Über Bastion-Host verbinden", desc:"ProxyJump (-J) verbindet über einen Zwischenserver (Bastion Host/Jump Host), um interne Systeme zu erreichen, die nicht direkt im Internet erreichbar sind.", syntax:"<b>ssh</b> <span class='opt-part'>-J</span> <span class='arg-part'>user@bastion</span> <span class='arg-part'>user@ziel</span>", options:[{flag:"-J user@bastion",desc:"Einzelner Jump-Host"},{flag:"-J host1,host2,host3",desc:"Kette von Jump-Hosts"},{flag:"ProxyJump bastion",desc:"In ~/.ssh/config dauerhaft eintragen"},{flag:"ProxyCommand",desc:"Ältere Alternative zu ProxyJump"}], examples:[{title:"Über Bastion verbinden",code:"<span class='comment'># Direkt per Befehl:</span>\n<span class='prompt'>$ </span>ssh -J admin@bastion.firma.de admin@intern-server-192.168.1.50\n\n<span class='comment'># Oder in ~/.ssh/config:</span>\nHost bastion\n    HostName bastion.firma.de\n    User admin\n\nHost intern\n    HostName 192.168.1.50\n    User admin\n    ProxyJump bastion\n\n<span class='prompt'>$ </span>ssh intern",note:"Die Verbindung zum internen Server wird vollständig durch den Bastion-Tunnel geleitet."},{title:"Dateien über Jump-Host kopieren",code:"<span class='prompt'>$ </span>scp -J admin@bastion datei.txt admin@intern:/home/admin/\n<span class='prompt'>$ </span>rsync -avz -e 'ssh -J admin@bastion' ./lokal/ admin@intern:/ziel/",note:"SCP und rsync unterstützen -J genauso wie SSH."}], tip:"Mit Agent Forwarding (ForwardAgent yes) muss der private Schlüssel nicht auf dem Bastion-Host liegen — sicherer!", tags:["SSH","Bastion","Sicherheit","Netzwerk"] },

      { name:"SSH-Agent & Forwarding", short:"Schlüssel im Speicher halten", desc:"ssh-agent speichert entschlüsselte SSH-Schlüssel im RAM — kein Passwort bei jeder Verbindung. Agent-Forwarding erlaubt die Nutzung dieser Schlüssel auf Remote-Servern.", syntax:"<b>ssh-agent</b>  |  <b>ssh-add</b> <span class='opt-part'>[Schlüssel]</span>", options:[{flag:"eval $(ssh-agent)",desc:"Agent starten und Umgebungsvariablen setzen"},{flag:"ssh-add ~/.ssh/id_ed25519",desc:"Schlüssel zum Agent hinzufügen"},{flag:"ssh-add -l",desc:"Geladene Schlüssel auflisten"},{flag:"ssh-add -d ~/.ssh/id_ed25519",desc:"Schlüssel entfernen"},{flag:"ssh-add -D",desc:"Alle Schlüssel entfernen"},{flag:"ssh -A user@host",desc:"Agent-Forwarding aktivieren"},{flag:"ssh-add -t 3600 key",desc:"Schlüssel nur für 1 Stunde laden"}], examples:[{title:"Agent starten und Schlüssel laden",code:"<span class='prompt'>$ </span>eval $(ssh-agent)\n<span class='output'>Agent pid 12345</span>\n<span class='prompt'>$ </span>ssh-add ~/.ssh/id_ed25519\n<span class='output'>Identity added: /home/user/.ssh/id_ed25519</span>\n<span class='prompt'>$ </span>ssh-add -l\n<span class='output'>256 SHA256:abc... /home/user/.ssh/id_ed25519 (ED25519)</span>",note:"Nach dem Laden: SSH-Verbindungen ohne Passwort-Eingabe."},{title:"Agent Forwarding für Jump-Hosts",code:"<span class='prompt'>$ </span>ssh -A admin@bastion\n<span class='comment'># Auf dem Bastion:</span>\n<span class='prompt'>bastion$ </span>ssh intern-server\n<span class='comment'># Nutzt den Schlüssel vom lokalen Rechner — kein Key auf Bastion nötig!</span>",note:"ForwardAgent yes in ~/.ssh/config macht -A überflüssig."}], warn:"ForwardAgent nur auf vertrauenswürdigen Servern! Ein kompromittierter Server könnte den Agent missbrauchen.", tags:["SSH","Agent","Sicherheit"] },

      { name:"known_hosts & Host-Keys", short:"Wie SSH Identität prüft", desc:"SSH schützt vor MITM-Angriffen durch Host-Key-Verifizierung. Beim ersten Verbinden wird der Fingerprint des Servers in ~/.ssh/known_hosts gespeichert. Ändert sich der Key, warnt SSH lautstark.", syntax:"<b>~/.ssh/known_hosts</b> — automatisch verwaltet", options:[{flag:"ssh-keyscan -H host",desc:"Host-Key eines Servers abrufen"},{flag:"ssh-keygen -lf known_hosts",desc:"Fingerprints aller gespeicherter Hosts"},{flag:"ssh-keygen -R hostname",desc:"Eintrag für Host entfernen"},{flag:"StrictHostKeyChecking yes",desc:"Verbindung ablehnen wenn Key unbekannt"},{flag:"StrictHostKeyChecking no",desc:"Warnung unterdrücken (unsicher!)"},{flag:"HashKnownHosts yes",desc:"Hostnamen in known_hosts verschlüsseln"}], examples:[{title:"Erster Verbindungsaufbau",code:"<span class='prompt'>$ </span>ssh user@neuserver.de\n<span class='output'>The authenticity of host 'neuserver.de' can't be established.\nED25519 key fingerprint is SHA256:abc123xyz...\nAre you sure you want to continue connecting (yes/no)?</span>\n<span class='comment'># → Fingerprint telefonisch/sicher mit Admin vergleichen!</span>\n<span class='comment'># → 'yes' speichert den Key in known_hosts</span>",note:"TOFU-Prinzip: Trust On First Use. Der erste Kontakt entscheidet."},{title:"Key-Konflikt — möglicher MITM!",code:"<span class='output'>@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@\n@    WARNING: REMOTE HOST       @\n@    IDENTIFICATION HAS CHANGED!@\n@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@\nHost key for server.de has changed.\nSomeone could be eavesdropping!\nOffending key in ~/.ssh/known_hosts:12</span>\n<span class='comment'># Erst mit Admin klären, dann:</span>\n<span class='prompt'>$ </span>ssh-keygen -R server.de",note:"Diese Warnung ERNST nehmen — könnte ein aktiver MITM-Angriff sein!"},{title:"Fingerprint vorab prüfen",code:"<span class='prompt'>$ </span>ssh-keyscan -H server.de | ssh-keygen -lf -\n<span class='output'>256 SHA256:abc123... server.de (ED25519)</span>",note:"Fingerprint mit dem Admin über sicheren Kanal (Telefon, Signal) abgleichen."}], warn:"Eine IDENTIFICATION HAS CHANGED Warnung NIEMALS ignorieren — sofort beim Serveradmin nachfragen!", tags:["SSH","Sicherheit","MITM","known_hosts"] },

      { name:"Man-in-the-Middle (MITM)", short:"SSH-MITM Angriff verstehen", desc:"Ein MITM-Angreifer schaltet sich unsichtbar zwischen Client und Server. Bei SSH ist das schwerer als bei HTTP — aber möglich wenn Host-Keys nicht geprüft werden oder ARP-Spoofing im LAN eingesetzt wird.", syntax:"<b>Konzept</b> — kein einzelner Befehl", options:[{flag:"ARP-Spoofing",desc:"Angreifer gibt sich als Router/Server aus (LAN-Angriff)"},{flag:"DNS-Spoofing",desc:"Angreifer leitet Hostnamen auf eigene IP um"},{flag:"Rogue SSH-Server",desc:"Gefälschter Server der Keys abgreift"},{flag:"SSH Downgrade",desc:"Erzwingen schwacher Verschlüsselung"},{flag:"StrictHostKeyChecking=no",desc:"Opfer ignoriert Key-Warnung — Angreifer profitiert"}], examples:[{title:"Wie ein SSH-MITM funktioniert",code:"<span class='comment'># Normaler Ablauf:\nClient ──────────────────────► Server\n       [SSH-Verbindung, verschlüsselt]\n\n# MITM-Angriff:\nClient ──► Angreifer ──► Server\n       [A entschlüsselt, liest mit, re-verschlüsselt]\n\n# Schritt 1: Angreifer positioniert sich (ARP-Spoofing):\n$ arpspoof -i eth0 -t 192.168.1.5 192.168.1.1\n# → Opfer sendet Traffic an Angreifer statt Router\n\n# Schritt 2: Angreifer betreibt gefälschten SSH-Server:\n# → Zeigt eigenen Host-Key statt echtem Server-Key\n\n# Schritt 3: Opfer verbindet sich...\n# → Sieht Fingerprint-Warnung!\n# → Ignoriert Opfer die Warnung: Angreifer hat Zugriff</span>",note:"Der SSH-MITM funktioniert nur wenn das Opfer die Host-Key-Warnung ignoriert oder StrictHostKeyChecking=no gesetzt ist."},{title:"Warum SSH schwer zu MITM-en ist",code:"<span class='comment'># SSH schützt durch:\n# 1. Host-Key-Verifizierung (known_hosts)\n# 2. Asymmetrische Kryptografie\n# 3. Session-ID-Binding\n\n# Angriff schlägt fehl wenn:\n$ ssh user@server\n@@@@@@@@@@@@@@@@@@@@@@@\n@ WARNING: HOST KEY   @\n@ HAS CHANGED!        @\n@@@@@@@@@@@@@@@@@@@@@@@\n# → Verbindung abgebrochen\n\n# Angriff gelingt nur wenn:\n# - Erstkontakt (TOFU-Phase) abgefangen\n# - Nutzer Warnung ignoriert\n# - StrictHostKeyChecking=no konfiguriert</span>",note:"SSH-MITM ist kein einfacher Angriff — es braucht Netzwerkzugang UND Nutzerfehler."}], legal:"Das Abfangen von SSH-Verbindungen ohne Genehmigung ist nach § 202a-c StGB strafbar. Nur in eigenen Testlaboren oder mit expliziter schriftlicher Genehmigung durchführen.", tags:["SSH","MITM","Sicherheit","Pentesting"] },

      { name:"ssh-mitm", short:"SSH-MITM für Pentesting", desc:"ssh-mitm ist ein spezialisiertes Pentest-Tool das SSH-Verbindungen in einer Man-in-the-Middle-Position abfangen kann — für autorisierte Sicherheitstests in eigenen Netzwerken.", syntax:"<b>ssh-mitm</b> <span class='opt-part'>[Optionen]</span>", options:[{flag:"--listen-port 10022",desc:"Port für den gefälschten SSH-Server"},{flag:"--target-host IP",desc:"Echter Ziel-Server"},{flag:"--target-port 22",desc:"Port des echten Servers"},{flag:"--log-level debug",desc:"Ausführliche Protokollierung"},{flag:"--intercept",desc:"Verbindungen aktiv abfangen (Interception-Modus)"},{flag:"--session-log-dir /tmp/logs",desc:"Sessions aufzeichnen"}], examples:[{title:"Installation und Start",code:"<span class='prompt'>$ </span>pip install ssh-mitm\n<span class='comment'># oder via Docker:</span>\n<span class='prompt'>$ </span>docker run -it --rm -p 10022:10022 ssh-mitm/ssh-mitm\n\n<span class='comment'># Proxy-Modus starten (leitet zu echtem Server weiter):</span>\n<span class='prompt'>$ </span>ssh-mitm server --listen-port 10022 \\\n  --target-host 192.168.1.100\n<span class='output'>[INFO] starting SSH server...\n[INFO] listening on 0.0.0.0:10022</span>",note:"Muss mit ARP-Spoofing oder DNS-Poisoning kombiniert werden um echten Traffic abzufangen."},{title:"Aufgezeichnete Sessions analysieren",code:"<span class='prompt'>$ </span>ssh-mitm server --session-log-dir /tmp/sessions \\\n  --listen-port 10022\n\n<span class='comment'># Nach dem Test:</span>\n<span class='prompt'>$ </span>ls /tmp/sessions/\n<span class='output'>session_001.log  session_002.log</span>\n<span class='prompt'>$ </span>cat /tmp/sessions/session_001.log\n<span class='output'>[COMMAND] ls -la\n[COMMAND] cat /etc/passwd</span>",note:"Zeigt exakt welche Befehle ein Nutzer in der SSH-Session ausgeführt hat."},{title:"Test im eigenen Labor",code:"<span class='comment'># Aufbau Testlabor:\n# VM1: Ubuntu-Server (Ziel) — 192.168.100.10\n# VM2: Kali Linux (Angreifer) — 192.168.100.20\n# VM3: Ubuntu-Client (Opfer) — 192.168.100.30\n\n# Auf Kali:\n$ sudo arpspoof -i eth0 -t 192.168.100.30 192.168.100.10\n$ ssh-mitm server --listen-port 22 --target-host 192.168.100.10\n\n# Auf Client:\n$ ssh user@192.168.100.10\n# → landet beim MITM-Server auf Kali</span>",note:"Nur in isolierten VMs ohne echte Daten testen!"}], legal:"ssh-mitm darf NUR in eigenen, isolierten Testlaboren eingesetzt werden. Jeder Einsatz in fremden Netzwerken ist nach §§ 202a-c StGB strafbar und kann mehrjährige Freiheitsstrafe nach sich ziehen.", warn:"ssh-mitm schlägt fehl wenn der Client die Host-Key-Warnung korrekt behandelt — das zeigt wie wichtig known_hosts ist!", tags:["SSH","MITM","Pentesting","Sicherheit"] },

      { name:"ARP-Spoofing", short:"Netzwerkpositon für MITM erkämpfen", desc:"ARP-Spoofing manipuliert ARP-Tabellen im LAN um den Datenverkehr anderer Hosts umzuleiten. Grundlage vieler LAN-MITM-Angriffe (inkl. SSH-MITM).", syntax:"<b>arpspoof</b> <span class='opt-part'>-i Interface -t Opfer</span> <span class='arg-part'>Ziel</span>", options:[{flag:"arpspoof -i eth0 -t Opfer Gateway",desc:"Opfer glaubt, Angreifer ist das Gateway"},{flag:"arpspoof -i eth0 -t Gateway Opfer",desc:"Gateway glaubt, Angreifer ist das Opfer (bidirektional)"},{flag:"echo 1 > /proc/sys/net/ipv4/ip_forward",desc:"IP-Forwarding aktivieren (Traffic weiterleiten)"},{flag:"arp -n",desc:"Eigene ARP-Tabelle anzeigen"},{flag:"arp -a",desc:"ARP-Cache des Systems"}], examples:[{title:"Wie ARP-Spoofing funktioniert",code:"<span class='comment'># Normales Netzwerk:\nOpfer    ARP-Cache: Gateway = AA:BB:CC:DD:EE:FF (echt)\nGateway  ARP-Cache: Opfer   = 11:22:33:44:55:66 (echt)\n\n# Nach ARP-Spoofing:\nOpfer    ARP-Cache: Gateway = FF:EE:DD:CC:BB:AA (ANGREIFER!)\nGateway  ARP-Cache: Opfer   = FF:EE:DD:CC:BB:AA (ANGREIFER!)\n\n# Angreifer sitzt jetzt dazwischen</span>",note:"ARP hat keine Authentifizierung — jeder kann gefälschte ARP-Replies senden."},{title:"Bidirektionaler MITM im Testlabor",code:"<span class='comment'># Terminal 1: Opfer → Gateway umleiten</span>\n<span class='prompt'>$ </span>sudo arpspoof -i eth0 -t 192.168.1.5 192.168.1.1\n<span class='comment'># Terminal 2: Gateway → Opfer umleiten</span>\n<span class='prompt'>$ </span>sudo arpspoof -i eth0 -t 192.168.1.1 192.168.1.5\n<span class='comment'># Terminal 3: Traffic weiterleiten</span>\n<span class='prompt'>$ </span>echo 1 | sudo tee /proc/sys/net/ipv4/ip_forward",note:"Ohne ip_forward bricht die Verbindung des Opfers ab — zu auffällig."},{title:"ARP-Spoofing erkennen",code:"<span class='prompt'>$ </span>arp -n\n<span class='output'>192.168.1.1  ether  AA:BB:CC:11:22:33  eth0  (Gateway)\n192.168.1.5  ether  AA:BB:CC:11:22:33  eth0  (Opfer)</span>\n<span class='comment'># ↑ Gleiche MAC für Gateway UND Opfer → ARP-Spoofing!</span>\n<span class='prompt'>$ </span>sudo apt install arpwatch\n<span class='prompt'>$ </span>sudo arpwatch -i eth0\n<span class='comment'># arpwatch alarmiert bei verdächtigen ARP-Änderungen</span>",note:"Wenn zwei IPs dieselbe MAC-Adresse haben, stimmt etwas nicht."}], legal:"ARP-Spoofing in fremden Netzwerken ist nach § 303b StGB (Computersabotage) und § 202b StGB (Abfangen von Daten) strafbar. Ausschließlich in eigenen, isolierten Testlaboren einsetzen.", warn:"Vergiss nach dem Test nicht ip_forwarding zu deaktivieren und ARP-Tabellen wiederherzustellen — sonst bleibt der MITM aktiv!", tags:["SSH","MITM","Netzwerk","Pentesting"] },

      { name:"ssh-audit", short:"SSH-Server-Konfiguration prüfen", desc:"ssh-audit analysiert SSH-Server und -Clients auf schwache Algorithmen, Konfigurationsfehler und bekannte Schwachstellen. Gibt konkrete Empfehlungen zur Härtung.", syntax:"<b>ssh-audit</b> <span class='arg-part'>hostname</span> <span class='opt-part'>[Optionen]</span>", options:[{flag:"ssh-audit server.de",desc:"Remote-Server prüfen"},{flag:"ssh-audit localhost",desc:"Eigenen SSH-Server prüfen"},{flag:"-p 2222",desc:"Anderen Port prüfen"},{flag:"-c",desc:"Client-Modus (lokalen SSH-Client prüfen)"},{flag:"-j",desc:"JSON-Ausgabe für Automatisierung"},{flag:"--level=warn",desc:"Nur Warnungen und Fehler anzeigen"}], examples:[{title:"Server-Scan",code:"<span class='prompt'>$ </span>pip install ssh-audit\n<span class='prompt'>$ </span>ssh-audit meinserver.de\n<span class='output'>  kex algorithms\n    [warn] diffie-hellman-group14-sha1 -- 2048-bit modulus only\n    [fail] diffie-hellman-group1-sha1  -- broken, do not use\n  host-key algorithms\n    [info] ssh-ed25519                 -- [info] available since OpenSSH 6.5\n    [warn] ssh-rsa                     -- 2048-bit modulus only\n  encryption algorithms\n    [info] chacha20-poly1305@openssh.com\n    [fail] 3des-cbc                    -- broken cipher\n  mac algorithms\n    [fail] hmac-md5                    -- broken hash algorithm</span>",note:"[fail] = sofort deaktivieren, [warn] = dringend prüfen, [info] = OK."},{title:"Härtungsmaßnahmen umsetzen",code:"<span class='comment'># /etc/ssh/sshd_config — empfohlene Algorithmen:</span>\nKexAlgorithms curve25519-sha256,diffie-hellman-group16-sha512\nHostKeyAlgorithms ssh-ed25519,rsa-sha2-512\nCiphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com\nMACs hmac-sha2-512-etm@openssh.com\n\n<span class='prompt'>$ </span>sudo systemctl restart sshd\n<span class='prompt'>$ </span>ssh-audit localhost\n<span class='output'>  [info] only 'safe' algorithms in use</span>",note:"Nach der Härtung erneut ssh-audit ausführen zur Bestätigung."}], tip:"ssh-audit.com bietet auch einen kostenlosen Online-Scanner — einfach Hostname eingeben und HTML-Bericht erhalten.", tags:["SSH","Sicherheit","Audit","Härtung"] },

      { name:"SSH Härtung (sshd_config)", short:"SSH-Server absichern", desc:"Eine gut konfigurierte sshd_config ist die wichtigste Verteidigung gegen SSH-Angriffe. Diese Einstellungen schließen die häufigsten Schwachstellen und erschweren MITM- und Brute-Force-Angriffe.", syntax:"<b>/etc/ssh/sshd_config</b> — Root-Zugriff erforderlich", options:[{flag:"Port 2222",desc:"Nicht-Standard-Port (obscurity, kein echter Schutz)"},{flag:"PermitRootLogin no",desc:"Root-Login verbieten"},{flag:"PasswordAuthentication no",desc:"Passwort-Login deaktivieren (nur Keys)"},{flag:"PubkeyAuthentication yes",desc:"Key-basierte Authentifizierung"},{flag:"AuthorizedKeysFile .ssh/authorized_keys",desc:"Pfad zu erlaubten Keys"},{flag:"AllowUsers admin deploy",desc:"Nur bestimmte User erlauben"},{flag:"MaxAuthTries 3",desc:"Maximal 3 Versuche pro Verbindung"},{flag:"LoginGraceTime 20",desc:"Verbindung nach 20s trennen wenn kein Login"},{flag:"X11Forwarding no",desc:"GUI-Weiterleitung deaktivieren"},{flag:"AllowTcpForwarding no",desc:"Port-Forwarding deaktivieren (falls nicht gebraucht)"}], examples:[{title:"Gehärtete sshd_config",code:"<span class='comment'># /etc/ssh/sshd_config — Härtung</span>\nPort 2200\nProtocol 2\n\nPermitRootLogin no\nPasswordAuthentication no\nPubkeyAuthentication yes\nAuthenticationMethods publickey\n\nMaxAuthTries 3\nLoginGraceTime 20\nMaxSessions 5\n\nAllowUsers deploy admin\nX11Forwarding no\nAllowTcpForwarding yes\n\n<span class='comment'># Algorithmen (nur starke):</span>\nKexAlgorithms curve25519-sha256\nHostKeyAlgorithms ssh-ed25519\nCiphers chacha20-poly1305@openssh.com\nMACs hmac-sha2-512-etm@openssh.com",note:"Wichtig: Erst Konfiguration prüfen, dann neu starten!"},{title:"Config prüfen und anwenden",code:"<span class='prompt'>$ </span>sudo sshd -t\n<span class='output'>Configuration OK</span>\n<span class='prompt'>$ </span>sudo systemctl reload sshd\n<span class='comment'># Aktuelle Session bleibt — neue Session zum Testen öffnen:</span>\n<span class='prompt'>$ </span>ssh -p 2200 admin@localhost\n<span class='output'>Welcome!</span>",note:"NIEMALS die aktuelle Session schließen bevor die neue Session funktioniert — sonst ausgesperrt!"}], warn:"Vor jeder sshd_config-Änderung: sudo sshd -t ausführen! Falsche Konfiguration kann dazu führen, dass kein SSH-Login mehr möglich ist.", tip:"Kombiniere sshd_config-Härtung mit fail2ban und ssh-audit — das sind die drei Säulen der SSH-Sicherheit.", tags:["SSH","Sicherheit","Härtung","sshd_config"] }
    ]
  },

  "Server-Einrichtung": {
    icon: "🖥️",
    commands: [
      { name:"Ersteinrichtung", short:"Neuen Server initial einrichten", desc:"Die ersten Schritte nach der Installation: System updaten, Zeitzone setzen, Hostnamen festlegen, einen Admin-User anlegen und Root-Login deaktivieren.", syntax:"<b>Checkliste</b> — Reihenfolge einhalten!", options:[{flag:"hostnamectl set-hostname name",desc:"Hostnamen dauerhaft setzen"},{flag:"timedatectl set-timezone Europe/Berlin",desc:"Zeitzone setzen"},{flag:"apt update && apt upgrade -y",desc:"System vollständig aktualisieren"},{flag:"adduser admin",desc:"Neuen Admin-User erstellen"},{flag:"usermod -aG sudo admin",desc:"User zur sudo-Gruppe hinzufügen"},{flag:"timedatectl status",desc:"Zeitzone und NTP-Status prüfen"}], examples:[{title:"Komplette Ersteinrichtung",code:"<span class='comment'># 1. Als root einloggen, sofort updaten:</span>\n<span class='prompt'># </span>apt update && apt upgrade -y\n\n<span class='comment'># 2. Hostnamen setzen:</span>\n<span class='prompt'># </span>hostnamectl set-hostname mein-webserver\n\n<span class='comment'># 3. Zeitzone:</span>\n<span class='prompt'># </span>timedatectl set-timezone Europe/Berlin\n<span class='prompt'># </span>timedatectl status\n<span class='output'>Time zone: Europe/Berlin (CET, +0100)\nSystem clock synchronized: yes</span>\n\n<span class='comment'># 4. Admin-User anlegen:</span>\n<span class='prompt'># </span>adduser admin\n<span class='prompt'># </span>usermod -aG sudo admin\n\n<span class='comment'># 5. SSH-Key kopieren, als admin einloggen, Root testen:</span>\n<span class='prompt'>$ </span>ssh-copy-id admin@server-ip\n<span class='prompt'>$ </span>ssh admin@server-ip\n<span class='prompt'>admin$ </span>sudo whoami\n<span class='output'>root</span>",note:"Reihenfolge wichtig: SSH-Key-Login testen BEVOR Root-Login deaktiviert wird!"},{title:"Lokalisierung und NTP",code:"<span class='prompt'># </span>locale-gen de_DE.UTF-8\n<span class='prompt'># </span>update-locale LANG=de_DE.UTF-8\n<span class='prompt'># </span>dpkg-reconfigure tzdata\n<span class='comment'># NTP-Synchronisation prüfen:</span>\n<span class='prompt'>$ </span>timedatectl\n<span class='output'>NTP service: active\nSystem clock synchronized: yes</span>",note:"Korrektes Datum ist wichtig für SSL-Zertifikate, Logs und Cron-Jobs."}], tip:"Erstelle nach der Einrichtung einen System-Snapshot (bei VPS oft als 'Backup' oder 'Snapshot' verfügbar) — Sicherheitsnetz für alle weiteren Schritte.", tags:["Server","Setup","Grundlagen"] },

      { name:"UFW Firewall", short:"Firewall für den Server einrichten", desc:"UFW (Uncomplicated Firewall) ist das einfachste Firewall-Tool für Linux-Server. Blockt alle eingehenden Verbindungen außer den explizit erlaubten.", syntax:"<b>ufw</b> <span class='opt-part'>[enable|allow|deny|status]</span>", options:[{flag:"ufw enable",desc:"Firewall aktivieren"},{flag:"ufw disable",desc:"Firewall deaktivieren"},{flag:"ufw status verbose",desc:"Alle Regeln anzeigen"},{flag:"ufw allow 22/tcp",desc:"SSH erlauben"},{flag:"ufw allow 80,443/tcp",desc:"HTTP und HTTPS erlauben"},{flag:"ufw allow from 1.2.3.4",desc:"Bestimmte IP erlauben"},{flag:"ufw deny 3306",desc:"MySQL-Port von außen sperren"},{flag:"ufw delete allow 80",desc:"Regel löschen"},{flag:"ufw reset",desc:"Alle Regeln zurücksetzen"}], examples:[{title:"Grundkonfiguration für Webserver",code:"<span class='comment'># Reihenfolge: erst SSH erlauben, dann aktivieren!</span>\n<span class='prompt'>$ </span>sudo ufw allow OpenSSH\n<span class='prompt'>$ </span>sudo ufw allow 80/tcp\n<span class='prompt'>$ </span>sudo ufw allow 443/tcp\n<span class='prompt'>$ </span>sudo ufw enable\n<span class='output'>Firewall is active and enabled on system startup</span>\n<span class='prompt'>$ </span>sudo ufw status\n<span class='output'>Status: active\nTo                  Action  From\n--                  ------  ----\nOpenSSH             ALLOW   Anywhere\n80/tcp              ALLOW   Anywhere\n443/tcp             ALLOW   Anywhere</span>",note:"SSH IMMER zuerst erlauben — sonst sperrt man sich aus!"},{title:"Datenbank nur intern erreichbar",code:"<span class='comment'># MySQL nur vom eigenen Server erreichbar (nicht von außen):</span>\n<span class='prompt'>$ </span>sudo ufw deny 3306\n<span class='comment'># Oder nur von einer bestimmten IP (z.B. App-Server):</span>\n<span class='prompt'>$ </span>sudo ufw allow from 192.168.1.50 to any port 3306",note:"Datenbanken niemals direkt aus dem Internet erreichbar lassen!"}], warn:"ufw enable VOR SSH-Freigabe kann dich dauerhaft aussperren — immer zuerst 'ufw allow ssh'!", tags:["Server","Firewall","Sicherheit"] },

      { name:"Nginx Webserver", short:"Nginx installieren und konfigurieren", desc:"Nginx ist ein hochperformanter Webserver und Reverse Proxy. Standard für moderne Webserver-Setups wegen geringem RAM-Verbrauch und guter Performance.", syntax:"<b>nginx</b> <span class='opt-part'>-t | -s reload</span>  |  <b>systemctl</b> restart nginx", options:[{flag:"nginx -t",desc:"Konfiguration auf Fehler prüfen"},{flag:"nginx -s reload",desc:"Config neu laden ohne Neustart"},{flag:"systemctl start/stop/restart nginx",desc:"Service verwalten"},{flag:"/etc/nginx/nginx.conf",desc:"Hauptkonfigurationsdatei"},{flag:"/etc/nginx/sites-available/",desc:"Verfügbare Virtual-Host-Configs"},{flag:"/etc/nginx/sites-enabled/",desc:"Aktivierte Virtual-Host-Configs (Symlinks)"},{flag:"/var/log/nginx/access.log",desc:"Zugriffs-Log"},{flag:"/var/log/nginx/error.log",desc:"Fehler-Log"}], examples:[{title:"Installation und erster Start",code:"<span class='prompt'>$ </span>sudo apt install nginx -y\n<span class='prompt'>$ </span>sudo systemctl enable --now nginx\n<span class='prompt'>$ </span>sudo systemctl status nginx\n<span class='output'>● nginx.service - A high performance web server\n   Active: active (running)</span>\n<span class='comment'># Im Browser: http://server-ip → Nginx-Willkommensseite</span>",note:"--now startet den Service sofort und aktiviert ihn für Autostart."},{title:"Virtual Host einrichten",code:"<span class='comment'># /etc/nginx/sites-available/meinsite.conf</span>\nserver {\n    listen 80;\n    server_name meinsite.de www.meinsite.de;\n    root /var/www/meinsite;\n    index index.html index.php;\n\n    location / {\n        try_files $uri $uri/ =404;\n    }\n\n    access_log /var/log/nginx/meinsite_access.log;\n    error_log  /var/log/nginx/meinsite_error.log;\n}\n\n<span class='prompt'>$ </span>sudo ln -s /etc/nginx/sites-available/meinsite.conf /etc/nginx/sites-enabled/\n<span class='prompt'>$ </span>sudo nginx -t\n<span class='output'>nginx: configuration file test is successful</span>\n<span class='prompt'>$ </span>sudo systemctl reload nginx",note:"Symlink in sites-enabled aktiviert die Config — kein Kopieren nötig."},{title:"Web-Root erstellen",code:"<span class='prompt'>$ </span>sudo mkdir -p /var/www/meinsite\n<span class='prompt'>$ </span>sudo chown -R $USER:$USER /var/www/meinsite\n<span class='prompt'>$ </span>echo '&lt;h1&gt;Es funktioniert!&lt;/h1&gt;' > /var/www/meinsite/index.html",note:"$USER als Eigentümer spart sudo beim Deployen."}], tip:"nginx -t vor JEDEM systemctl reload — ein Syntax-Fehler in der Config macht Nginx unerreichbar!", tags:["Server","Webserver","Nginx"] },

      { name:"Let's Encrypt / Certbot", short:"Kostenloses SSL-Zertifikat einrichten", desc:"Certbot holt automatisch kostenlose SSL/TLS-Zertifikate von Let's Encrypt und konfiguriert Nginx oder Apache dafür. Inkl. automatischer Verlängerung.", syntax:"<b>certbot</b> <span class='opt-part'>--nginx|--apache</span> <span class='opt-part'>-d domain.de</span>", options:[{flag:"certbot --nginx -d domain.de",desc:"Nginx automatisch konfigurieren"},{flag:"certbot --apache -d domain.de",desc:"Apache automatisch konfigurieren"},{flag:"certbot certonly --nginx",desc:"Nur Zertifikat holen, Config manuell"},{flag:"certbot renew",desc:"Alle Zertifikate erneuern"},{flag:"certbot renew --dry-run",desc:"Verlängerung testen ohne echte Anfrage"},{flag:"certbot certificates",desc:"Alle Zertifikate auflisten"},{flag:"certbot delete --cert-name domain.de",desc:"Zertifikat löschen"}], examples:[{title:"SSL-Zertifikat für Nginx einrichten",code:"<span class='prompt'>$ </span>sudo apt install certbot python3-certbot-nginx -y\n\n<span class='comment'># Domain muss auf den Server zeigen (DNS A-Record)!</span>\n<span class='prompt'>$ </span>sudo certbot --nginx -d meinsite.de -d www.meinsite.de\n<span class='output'>Requesting a certificate for meinsite.de\nSuccessfully received certificate.\nCertificate is saved at: /etc/letsencrypt/live/meinsite.de/\nDeploying certificate to VirtualHost /etc/nginx/sites-enabled/meinsite.conf\nRedirecting all traffic on port 80 to ssl in /etc/nginx/...\n\nCongratulations! Your site is now accessible at https://meinsite.de</span>",note:"Certbot ergänzt die Nginx-Config automatisch mit SSL und Redirect HTTP→HTTPS."},{title:"Automatische Verlängerung testen",code:"<span class='comment'># Zertifikate laufen nach 90 Tagen ab — Certbot verlängert automatisch:</span>\n<span class='prompt'>$ </span>sudo certbot renew --dry-run\n<span class='output'>Simulating renewal of an existing certificate for meinsite.de\nCongratulations, all simulated renewals succeeded.</span>\n<span class='comment'># Cronjob ist bereits eingerichtet:</span>\n<span class='prompt'>$ </span>cat /etc/cron.d/certbot\n<span class='output'>0 */12 * * * root certbot renew --quiet</span>",note:"--dry-run simuliert die Verlängerung — wichtig vor Ablauf zu testen!"}], warn:"Der DNS-A-Record der Domain MUSS auf die Server-IP zeigen bevor Certbot ausgeführt wird — sonst schlägt die Domain-Validierung fehl.", tip:"certbot certificates zeigt Ablaufdatum — bei < 30 Tagen sollte die Verlängerung manuell getriggert werden.", tags:["Server","SSL","HTTPS","Let's Encrypt"] },

      { name:"MySQL / MariaDB", short:"Datenbank installieren und absichern", desc:"MariaDB ist der empfohlene MySQL-Ersatz auf Ubuntu/Debian. Vollständig kompatibel, schneller und aktiv weiterentwickelt.", syntax:"<b>mysql</b> <span class='opt-part'>-u root -p</span>  |  <b>mysqladmin</b>", options:[{flag:"mysql -u root -p",desc:"Als root in MySQL einloggen"},{flag:"mysql -u user -p datenbank",desc:"Direkt in eine Datenbank"},{flag:"mysqldump -u root -p db > backup.sql",desc:"Datenbank-Backup erstellen"},{flag:"mysql -u root -p db < backup.sql",desc:"Backup einspielen"},{flag:"mysql_secure_installation",desc:"Sicherheits-Assistent ausführen"},{flag:"SHOW DATABASES;",desc:"(SQL) Alle Datenbanken auflisten"},{flag:"CREATE DATABASE myapp;",desc:"(SQL) Datenbank erstellen"},{flag:"GRANT ALL ON myapp.* TO 'user'@'localhost' IDENTIFIED BY 'pw';",desc:"(SQL) Benutzer anlegen"}], examples:[{title:"Installation und Absicherung",code:"<span class='prompt'>$ </span>sudo apt install mariadb-server -y\n<span class='prompt'>$ </span>sudo systemctl enable --now mariadb\n\n<span class='comment'># Sicherheits-Assistent — unbedingt ausführen!</span>\n<span class='prompt'>$ </span>sudo mysql_secure_installation\n<span class='output'>Set root password? [Y/n] Y\nRemove anonymous users? [Y/n] Y\nDisallow root login remotely? [Y/n] Y\nRemove test database? [Y/n] Y\nReload privilege tables? [Y/n] Y\n\nAll done!</span>",note:"mysql_secure_installation schließt Standard-Sicherheitslücken — niemals überspringen!"},{title:"Datenbank und User für App anlegen",code:"<span class='prompt'>$ </span>sudo mysql -u root -p\n<span class='output'>MariaDB [(none)]> </span>CREATE DATABASE meinapp CHARACTER SET utf8mb4;\n<span class='output'>MariaDB [(none)]> </span>CREATE USER 'appuser'@'localhost' IDENTIFIED BY 'sicheresPasswort!';\n<span class='output'>MariaDB [(none)]> </span>GRANT ALL PRIVILEGES ON meinapp.* TO 'appuser'@'localhost';\n<span class='output'>MariaDB [(none)]> </span>FLUSH PRIVILEGES;\n<span class='output'>MariaDB [(none)]> </span>EXIT;",note:"Jede App bekommt einen eigenen User mit minimalen Rechten — nie als root verbinden!"},{title:"Backup und Restore",code:"<span class='comment'># Backup:</span>\n<span class='prompt'>$ </span>mysqldump -u root -p meinapp > /backup/meinapp_$(date +%Y%m%d).sql\n<span class='comment'># Restore:</span>\n<span class='prompt'>$ </span>mysql -u root -p meinapp < /backup/meinapp_20250101.sql\n<span class='comment'># Automatisches tägliches Backup via Cron:</span>\n<span class='prompt'>$ </span>crontab -e\n<span class='output'>0 3 * * * mysqldump -u root -pmeinpass meinapp > /backup/db_$(date +\\%Y\\%m\\%d).sql</span>",note:"Backup-Datei enthält alle Daten als SQL — gut lesbar und portierbar."}], warn:"Niemals 'root'@'%' (Zugriff von überall) anlegen! Datenbank-User immer auf 'localhost' beschränken.", tags:["Server","Datenbank","MySQL","MariaDB"] },

      { name:"PHP-FPM", short:"PHP für Nginx einrichten", desc:"PHP-FPM (FastCGI Process Manager) ist die empfohlene Methode PHP mit Nginx zu betreiben. Schneller und ressourcenschonender als mod_php.", syntax:"<b>apt install php-fpm</b>  |  PHP in Nginx-Config einbinden", options:[{flag:"php-fpm8.3",desc:"PHP-FPM Service (Versionsnummer beachten)"},{flag:"php --version",desc:"Installierte PHP-Version prüfen"},{flag:"php -m",desc:"Geladene PHP-Module auflisten"},{flag:"/etc/php/8.3/fpm/php.ini",desc:"PHP-Konfigurationsdatei"},{flag:"php_value upload_max_filesize 64M",desc:"Upload-Limit in php.ini erhöhen"},{flag:"systemctl restart php8.3-fpm",desc:"PHP-FPM neu starten"}], examples:[{title:"PHP-FPM mit Nginx verbinden",code:"<span class='prompt'>$ </span>sudo apt install php-fpm php-mysql php-curl php-gd php-mbstring php-xml -y\n<span class='prompt'>$ </span>php --version\n<span class='output'>PHP 8.3.0 (fpm-fcgi)</span>\n\n<span class='comment'># Nginx Virtual Host mit PHP:</span>\nserver {\n    listen 80;\n    server_name meinsite.de;\n    root /var/www/meinsite;\n    index index.php index.html;\n\n    location ~ \\.php$ {\n        include snippets/fastcgi-php.conf;\n        fastcgi_pass unix:/run/php/php8.3-fpm.sock;\n    }\n\n    location ~ /\\.ht {\n        deny all;\n    }\n}\n<span class='prompt'>$ </span>sudo nginx -t && sudo systemctl reload nginx",note:"fastcgi_pass mit dem richtigen FPM-Socket — Version im Pfad beachten!"},{title:"PHP-Version prüfen",code:"<span class='comment'># Test-Datei erstellen:</span>\n<span class='prompt'>$ </span>echo '&lt;?php phpinfo(); ?&gt;' | sudo tee /var/www/meinsite/info.php\n<span class='comment'># Im Browser: http://meinsite.de/info.php</span>\n<span class='comment'># Danach UNBEDINGT löschen:</span>\n<span class='prompt'>$ </span>sudo rm /var/www/meinsite/info.php",note:"phpinfo() gibt sensible Server-Infos preis — nur kurz zum Testen, danach sofort löschen!"}], warn:"phpinfo() niemals dauerhaft online lassen — gibt PHP-Version, installierte Module und Server-Pfade preis!", tags:["Server","PHP","Nginx","Web"] },

      { name:"Node.js & npm", short:"Node.js-Umgebung einrichten", desc:"Node.js für Server-seitige JavaScript-Anwendungen. nvm (Node Version Manager) ist die empfohlene Installationsmethode für flexible Versionsverwaltung.", syntax:"<b>nvm install</b> <span class='arg-part'>Version</span>  |  <b>node</b> / <b>npm</b>", options:[{flag:"nvm install --lts",desc:"Neueste LTS-Version installieren"},{flag:"nvm use 20",desc:"Node.js Version 20 aktivieren"},{flag:"nvm ls",desc:"Alle installierten Versionen"},{flag:"node -v && npm -v",desc:"Versionen prüfen"},{flag:"npm install -g pm2",desc:"PM2 Process Manager global installieren"},{flag:"pm2 start app.js",desc:"App mit PM2 starten"},{flag:"pm2 startup",desc:"PM2 als Systemd-Service einrichten"},{flag:"pm2 save",desc:"Aktuelle PM2-Config dauerhaft speichern"}], examples:[{title:"Node.js via nvm installieren",code:"<span class='comment'># nvm installieren:</span>\n<span class='prompt'>$ </span>curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash\n<span class='prompt'>$ </span>source ~/.bashrc\n\n<span class='comment'># LTS installieren und nutzen:</span>\n<span class='prompt'>$ </span>nvm install --lts\n<span class='output'>Installing Node.js v20.11.0 (npm v10.2.4)</span>\n<span class='prompt'>$ </span>node -v\n<span class='output'>v20.11.0</span>",note:"nvm installiert Node.js ohne sudo — kein Berechtigungs-Problem beim npm install -g."},{title:"Express-App mit PM2 betreiben",code:"<span class='comment'># App installieren und starten:</span>\n<span class='prompt'>$ </span>mkdir /var/www/meinapp && cd /var/www/meinapp\n<span class='prompt'>$ </span>npm init -y && npm install express\n<span class='prompt'>$ </span>cat > app.js &lt;&lt;'EOF'\nconst express = require('express');\nconst app = express();\napp.get('/', (req, res) => res.send('Hallo Server!'));\napp.listen(3000);\nEOF\n\n<span class='comment'># Mit PM2 produktiv starten:</span>\n<span class='prompt'>$ </span>npm install -g pm2\n<span class='prompt'>$ </span>pm2 start app.js --name meinapp\n<span class='prompt'>$ </span>pm2 startup && pm2 save\n<span class='output'>[PM2] Freeze a process list on reboot via:\n   pm2 save\n[PM2] PM2 has been successfully setup.</span>",note:"pm2 startup + pm2 save stellt sicher dass die App nach einem Reboot automatisch startet."}], tip:"pm2 logs zeigt Live-Logs aller Apps — pm2 monit öffnet ein Terminal-Dashboard mit CPU/RAM-Verbrauch.", tags:["Server","Node.js","npm","PM2"] },

      { name:"Docker", short:"Container-Virtualisierung", desc:"Docker packt Anwendungen mit all ihren Abhängigkeiten in portable Container. Gleiche Umgebung auf Entwickler-PC und Produktionsserver — 'works on my machine' war gestern.", syntax:"<b>docker</b> <span class='opt-part'>run|build|ps|logs|exec</span>", options:[{flag:"docker run -d -p 80:80 nginx",desc:"Nginx-Container im Hintergrund starten"},{flag:"docker ps",desc:"Laufende Container anzeigen"},{flag:"docker ps -a",desc:"Alle Container (auch gestoppte)"},{flag:"docker logs -f container",desc:"Logs live verfolgen"},{flag:"docker exec -it container bash",desc:"Shell im Container öffnen"},{flag:"docker stop/start/restart name",desc:"Container steuern"},{flag:"docker rm container",desc:"Container löschen"},{flag:"docker images",desc:"Heruntergeladene Images"},{flag:"docker rmi image",desc:"Image löschen"},{flag:"docker pull ubuntu:22.04",desc:"Image herunterladen"}], examples:[{title:"Docker installieren (Ubuntu)",code:"<span class='prompt'>$ </span>curl -fsSL https://get.docker.com | sudo sh\n<span class='prompt'>$ </span>sudo usermod -aG docker $USER\n<span class='output'># Neu einloggen damit Gruppenänderung aktiv wird!</span>\n<span class='prompt'>$ </span>docker run hello-world\n<span class='output'>Hello from Docker!\nThis message shows that your installation appears to be working correctly.</span>",note:"get.docker.com ist das offizielle Installations-Skript von Docker."},{title:"Nginx-Container produktiv betreiben",code:"<span class='comment'># Nginx mit eigenem HTML-Ordner und Port 80:</span>\n<span class='prompt'>$ </span>docker run -d \\\n  --name webserver \\\n  --restart unless-stopped \\\n  -p 80:80 \\\n  -v /var/www/html:/usr/share/nginx/html:ro \\\n  nginx\n\n<span class='prompt'>$ </span>docker ps\n<span class='output'>CONTAINER ID  IMAGE  STATUS         PORTS\nabc123def456  nginx  Up 2 minutes   0.0.0.0:80->80/tcp</span>",note:"--restart unless-stopped startet den Container automatisch nach Reboot."},{title:"In Container debuggen",code:"<span class='prompt'>$ </span>docker logs -f webserver\n<span class='output'>192.168.1.1 - - [GET /index.html HTTP/1.1] 200</span>\n<span class='prompt'>$ </span>docker exec -it webserver bash\n<span class='output'>root@abc123:/# nginx -v\nnginx version: nginx/1.25.3</span>",note:"docker exec -it gibt eine vollwertige Shell im laufenden Container."}], tip:"docker system prune -a räumt alle ungenutzten Images, Container und Caches auf — spart oft mehrere GB.", tags:["Server","Docker","Container","DevOps"] },

      { name:"Docker Compose", short:"Multi-Container-Apps verwalten", desc:"Docker Compose definiert mehrstufige Applikationen (App + Datenbank + Cache) in einer YAML-Datei. Ein Befehl startet die gesamte Infrastruktur.", syntax:"<b>docker compose</b> <span class='opt-part'>up|down|logs|ps</span>", options:[{flag:"docker compose up -d",desc:"Alle Services im Hintergrund starten"},{flag:"docker compose down",desc:"Alle Services stoppen und entfernen"},{flag:"docker compose down -v",desc:"Auch Volumes (Daten!) löschen"},{flag:"docker compose logs -f",desc:"Logs aller Services live"},{flag:"docker compose logs -f service",desc:"Logs eines einzelnen Services"},{flag:"docker compose ps",desc:"Status aller Services"},{flag:"docker compose exec service bash",desc:"Shell in einem Service"},{flag:"docker compose pull",desc:"Alle Images aktualisieren"},{flag:"docker compose restart service",desc:"Einzelnen Service neustarten"}], examples:[{title:"WordPress + MySQL in 2 Minuten",code:"<span class='comment'># docker-compose.yml</span>\nversion: '3.8'\nservices:\n  db:\n    image: mariadb:11\n    restart: unless-stopped\n    environment:\n      MARIADB_ROOT_PASSWORD: rootpass\n      MARIADB_DATABASE: wordpress\n      MARIADB_USER: wpuser\n      MARIADB_PASSWORD: wppass\n    volumes:\n      - db_data:/var/lib/mysql\n\n  wordpress:\n    image: wordpress:latest\n    restart: unless-stopped\n    ports:\n      - '8080:80'\n    environment:\n      WORDPRESS_DB_HOST: db\n      WORDPRESS_DB_USER: wpuser\n      WORDPRESS_DB_PASSWORD: wppass\n    depends_on:\n      - db\n    volumes:\n      - wp_data:/var/www/html\n\nvolumes:\n  db_data:\n  wp_data:\n\n<span class='prompt'>$ </span>docker compose up -d\n<span class='output'>[+] Running 2/2\n ✔ Container db         Started\n ✔ Container wordpress  Started</span>\n<span class='comment'># → http://localhost:8080 öffnen</span>",note:"volumes: sorgt dafür dass Daten beim Container-Neustart erhalten bleiben."},{title:"Update-Workflow",code:"<span class='comment'># Neue Image-Versionen holen und neu starten:</span>\n<span class='prompt'>$ </span>docker compose pull\n<span class='prompt'>$ </span>docker compose up -d\n<span class='output'>[+] Running 2/2\n ✔ Container db         Running\n ✔ Container wordpress  Started (recreated)</span>\n<span class='comment'># Nur geänderte Container werden neu gestartet!</span>",note:"docker compose up -d nach pull aktualisiert nur Container mit neuen Images."}], tip:"Lege docker-compose.yml in ein eigenes Verzeichnis — docker compose commands beziehen sich immer auf die Compose-Datei im aktuellen Ordner.", tags:["Server","Docker","Docker Compose","DevOps"] },

      { name:"Nginx Reverse Proxy", short:"Apps hinter Nginx verstecken", desc:"Ein Reverse Proxy leitet HTTP-Anfragen an interne Dienste weiter (z.B. Node.js auf Port 3000 oder Docker-Container). Nginx übernimmt SSL, Compression und Load Balancing.", syntax:"<b>proxy_pass</b> in Nginx-Server-Block", options:[{flag:"proxy_pass http://localhost:3000;",desc:"Anfragen an lokalen Port weiterleiten"},{flag:"proxy_set_header Host $host;",desc:"Original-Hostname weitergeben"},{flag:"proxy_set_header X-Real-IP $remote_addr;",desc:"Echte Client-IP weitergeben"},{flag:"proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;",desc:"Proxy-Chain dokumentieren"},{flag:"proxy_set_header X-Forwarded-Proto $scheme;",desc:"HTTP/HTTPS weitergeben"},{flag:"upstream backend { server ... }",desc:"Load Balancing zwischen mehreren Servern"}], examples:[{title:"Node.js-App über Nginx erreichbar machen",code:"<span class='comment'># /etc/nginx/sites-available/meinapp.conf</span>\nserver {\n    listen 80;\n    server_name meinapp.de www.meinapp.de;\n\n    location / {\n        proxy_pass         http://localhost:3000;\n        proxy_http_version 1.1;\n        proxy_set_header   Upgrade $http_upgrade;\n        proxy_set_header   Connection 'upgrade';\n        proxy_set_header   Host $host;\n        proxy_set_header   X-Real-IP $remote_addr;\n        proxy_cache_bypass $http_upgrade;\n    }\n}\n\n<span class='prompt'>$ </span>sudo ln -s /etc/nginx/sites-available/meinapp.conf /etc/nginx/sites-enabled/\n<span class='prompt'>$ </span>sudo nginx -t && sudo systemctl reload nginx\n<span class='comment'># Dann Certbot für HTTPS:</span>\n<span class='prompt'>$ </span>sudo certbot --nginx -d meinapp.de",note:"Nginx übernimmt SSL — Node.js App bleibt intern auf Port 3000 ohne HTTPS."},{title:"Mehrere Apps auf einer IP",code:"<span class='comment'># App 1 — meinblog.de → Port 3000</span>\nserver {\n    server_name meinblog.de;\n    location / { proxy_pass http://localhost:3000; }\n}\n\n<span class='comment'># App 2 — meinshop.de → Port 4000</span>\nserver {\n    server_name meinshop.de;\n    location / { proxy_pass http://localhost:4000; }\n}",note:"Verschiedene Domains → verschiedene Apps auf einem Server — nur durch den server_name unterschieden."}], tip:"Mit Certbot + Reverse Proxy läuft HTTPS ohne dass die App selbst SSL implementieren muss.", tags:["Server","Nginx","Reverse Proxy","DevOps"] },

      { name:"Systemd Service", short:"Eigene Services erstellen", desc:"Mit einer .service-Datei wird jede beliebige Anwendung zum dauerhaften Systemdienst — startet beim Boot, startet nach Absturz neu und wird von systemctl verwaltet.", syntax:"<b>/etc/systemd/system/</b>meinapp.service", options:[{flag:"[Unit] Description=",desc:"Beschreibung des Services"},{flag:"After=network.target",desc:"Erst starten wenn Netzwerk bereit"},{flag:"[Service] ExecStart=",desc:"Befehl zum Starten"},{flag:"Restart=always",desc:"Bei Absturz automatisch neu starten"},{flag:"RestartSec=5",desc:"5 Sekunden vor Neustart warten"},{flag:"User=deploy",desc:"Service als bestimmter User ausführen"},{flag:"WorkingDirectory=",desc:"Arbeitsverzeichnis setzen"},{flag:"Environment=",desc:"Umgebungsvariablen setzen"},{flag:"[Install] WantedBy=multi-user.target",desc:"Bei Systemstart aktivieren"}], examples:[{title:"Node.js-App als Service",code:"<span class='comment'># /etc/systemd/system/meinapp.service</span>\n[Unit]\nDescription=Meine Node.js App\nAfter=network.target\n\n[Service]\nType=simple\nUser=deploy\nWorkingDirectory=/var/www/meinapp\nExecStart=/home/deploy/.nvm/versions/node/v20.11.0/bin/node app.js\nRestart=always\nRestartSec=5\nEnvironment=NODE_ENV=production\nEnvironment=PORT=3000\n\n[Install]\nWantedBy=multi-user.target\n\n<span class='prompt'>$ </span>sudo systemctl daemon-reload\n<span class='prompt'>$ </span>sudo systemctl enable --now meinapp\n<span class='prompt'>$ </span>sudo systemctl status meinapp\n<span class='output'>● meinapp.service - Meine Node.js App\n   Active: active (running) since...</span>",note:"daemon-reload MUSS nach jeder Änderung an .service-Dateien ausgeführt werden."},{title:"Service-Logs überwachen",code:"<span class='prompt'>$ </span>sudo journalctl -u meinapp -f\n<span class='output'>mein-server meinapp[1234]: Server gestartet auf Port 3000\nmein-server meinapp[1234]: GET / 200 5ms</span>\n<span class='comment'># Letzten 100 Zeilen:</span>\n<span class='prompt'>$ </span>sudo journalctl -u meinapp -n 100 --no-pager",note:"-f folgt dem Log live — wie tail -f aber für systemd-Services."}], tip:"systemd-analyze blame zeigt welche Services den Boot verlangsamen — hilfreich zur Startup-Optimierung.", tags:["Server","Systemd","Service","DevOps"] },

      { name:"Automatische Updates", short:"Server automatisch aktuell halten", desc:"unattended-upgrades installiert Sicherheitsupdates automatisch im Hintergrund — wichtigste Grundlage für einen sicheren, wartungsarmen Server.", syntax:"<b>unattended-upgrades</b>  |  <b>apt</b> auto-upgrades", options:[{flag:"apt install unattended-upgrades",desc:"Paket installieren"},{flag:"dpkg-reconfigure unattended-upgrades",desc:"Interaktiv konfigurieren"},{flag:"/etc/apt/apt.conf.d/50unattended-upgrades",desc:"Hauptkonfigurationsdatei"},{flag:"unattended-upgrades --dry-run",desc:"Simulieren was upgedated würde"},{flag:"unattended-upgrades -v",desc:"Manuell mit Details ausführen"},{flag:"/var/log/unattended-upgrades/",desc:"Log-Verzeichnis"}], examples:[{title:"Einrichtung und Konfiguration",code:"<span class='prompt'>$ </span>sudo apt install unattended-upgrades -y\n<span class='prompt'>$ </span>sudo dpkg-reconfigure --priority=low unattended-upgrades\n<span class='output'>Automatically download and install stable updates? [Yes]</span>\n\n<span class='comment'># /etc/apt/apt.conf.d/50unattended-upgrades</span>\nUnattended-Upgrade::Allowed-Origins {\n    \"${distro_id}:${distro_codename}-security\";\n    \"${distro_id}:${distro_codename}-updates\";\n};\nUnattended-Upgrade::Automatic-Reboot \"false\";\nUnattended-Upgrade::Automatic-Reboot-Time \"03:00\";\nUnattended-Upgrade::Mail \"admin@meinserver.de\";",note:"Automatic-Reboot false lässt Kernel-Updates anstehen bis du manuell rebootest."},{title:"Status und Logs prüfen",code:"<span class='prompt'>$ </span>sudo unattended-upgrades --dry-run -v\n<span class='output'>Packages that will be upgraded: openssh-server libssl3 curl</span>\n\n<span class='comment'># Log der letzten Upgrades:</span>\n<span class='prompt'>$ </span>cat /var/log/unattended-upgrades/unattended-upgrades.log\n<span class='output'>2025-01-15 03:12 Packages upgraded: libssl3 curl\n2025-01-15 03:12 All upgrades installed</span>",note:"Mail-Benachrichtigung bei Fehlern — setzt installiertes mailutils voraus."}], tip:"Für kritische Produktionsserver: nur Sicherheitsupdates automatisch, größere Updates manuell im Wartungsfenster — reduziert Risiko von Breaking Changes.", tags:["Server","Updates","Sicherheit","Automatisierung"] }
    ]
  },

  "WireGuard VPN": {
    icon: "🔒",
    commands: [
      { name:"WireGuard Grundlagen", short:"Modernes VPN-Protokoll verstehen", desc:"WireGuard ist ein modernes, schlankes VPN-Protokoll. Schneller und einfacher als OpenVPN, nutzt state-of-the-art Kryptografie (Curve25519, ChaCha20) und ist direkt im Linux-Kernel integriert.", syntax:"<b>Konzept:</b> Peer-to-Peer, kein CA nötig — nur Schlüsselpaare", options:[{flag:"wg",desc:"Aktuellen WireGuard-Status anzeigen"},{flag:"wg show",desc:"Alle Interfaces mit Peers und Traffic"},{flag:"wg showconf wg0",desc:"Vollständige Konfiguration anzeigen"},{flag:"wg-quick up wg0",desc:"Interface starten"},{flag:"wg-quick down wg0",desc:"Interface stoppen"},{flag:"systemctl enable wg-quick@wg0",desc:"VPN automatisch beim Boot starten"}], examples:[{title:"Wie WireGuard funktioniert",code:"<span class='comment'># Jeder Teilnehmer (Peer) hat:\n# - Privaten Schlüssel (geheim, nur lokal)\n# - Öffentlichen Schlüssel (wird geteilt)\n\n# Server kennt die Public Keys aller Clients\n# Clients kennen den Public Key des Servers\n\n# Verbindung:\n# Client → Server-IP:Port\n# Authentifizierung durch Schlüsselpaar\n# Kein Passwort, kein Zertifikat, keine CA</span>",note:"WireGuard ist ~4x schneller als OpenVPN und deutlich einfacher zu konfigurieren."},{title:"Installation",code:"<span class='comment'># Ubuntu 22.04+ (bereits im Kernel):</span>\n<span class='prompt'>$ </span>sudo apt install wireguard -y\n\n<span class='comment'># Kernel-Modul laden:</span>\n<span class='prompt'>$ </span>sudo modprobe wireguard\n<span class='prompt'>$ </span>lsmod | grep wireguard\n<span class='output'>wireguard             86016  0</span>",note:"Ab Ubuntu 20.04 / Debian 11 ist WireGuard im Standard-Kernel enthalten."}], tip:"WireGuard ist stealth — ein Interface ohne aktive Verbindung antwortet nicht auf Pings. Portscans sehen 'nichts'.", tags:["VPN","WireGuard","Sicherheit","Netzwerk"] },

      { name:"Schlüssel generieren", short:"WireGuard-Schlüsselpaare erstellen", desc:"Jeder WireGuard-Peer benötigt ein eigenes Schlüsselpaar. Der private Schlüssel bleibt lokal, der öffentliche wird mit anderen Peers geteilt.", syntax:"<b>wg genkey</b> | <b>wg pubkey</b>  |  <b>wg genpsk</b>", options:[{flag:"wg genkey",desc:"Privaten Schlüssel generieren"},{flag:"wg pubkey",desc:"Öffentlichen Schlüssel aus privatem ableiten"},{flag:"wg genpsk",desc:"Pre-Shared Key generieren (extra Sicherheit)"},{flag:"chmod 600 /etc/wireguard/privatekey",desc:"Private Key nur für Root lesbar machen"},{flag:"umask 077",desc:"Sichert dass neue Dateien nur Root-lesbar sind"}], examples:[{title:"Schlüsselpaar für Server erstellen",code:"<span class='prompt'>$ </span>cd /etc/wireguard\n<span class='prompt'>$ </span>umask 077\n<span class='prompt'>$ </span>wg genkey | tee privatekey | wg pubkey > publickey\n<span class='prompt'>$ </span>cat privatekey\n<span class='output'>4GhQmV8n3K2pL9rX7tY1wZ6bE0sA5fJu+hNcIvDoP2g=</span>\n<span class='prompt'>$ </span>cat publickey\n<span class='output'>K7vX2mA9nL4pQ8rT1wY6bE3sZ0fJu+hNcIvDoP5g2K=</span>",note:"Privater Schlüssel NIEMALS teilen oder committen! Öffentlicher Schlüssel ist sicher teilbar."},{title:"Alle Schlüssel auf einmal",code:"<span class='comment'># Server-Schlüssel:</span>\n<span class='prompt'>$ </span>wg genkey | tee /etc/wireguard/server.key | wg pubkey > /etc/wireguard/server.pub\n<span class='comment'># Client-Schlüssel:</span>\n<span class='prompt'>$ </span>wg genkey | tee /etc/wireguard/client1.key | wg pubkey > /etc/wireguard/client1.pub\n<span class='comment'># Optional: Pre-Shared Key:</span>\n<span class='prompt'>$ </span>wg genpsk > /etc/wireguard/client1.psk",note:"Pre-Shared Key (PSK) fügt eine extra Sicherheitsschicht gegen Quantencomputer hinzu."}], warn:"Private Keys niemals in Git, Backups oder Logs! chmod 600 auf alle Key-Dateien setzen.", tags:["VPN","WireGuard","Kryptografie"] },

      { name:"Server-Konfiguration", short:"WireGuard-Server einrichten", desc:"Die Server-seitige wg0.conf definiert das VPN-Interface und alle erlaubten Clients (Peers). Der Server ist selbst auch nur ein Peer.", syntax:"<b>/etc/wireguard/wg0.conf</b>", options:[{flag:"[Interface]",desc:"Eigene Interface-Einstellungen"},{flag:"Address = 10.0.0.1/24",desc:"VPN-IP des Servers"},{flag:"ListenPort = 51820",desc:"UDP-Port (Standard: 51820)"},{flag:"PrivateKey = ...",desc:"Privater Schlüssel des Servers"},{flag:"PostUp / PostDown",desc:"Befehle beim Hoch-/Runterfahren (Firewall)"},{flag:"[Peer]",desc:"Eintrag für jeden Client"},{flag:"PublicKey = ...",desc:"Öffentlicher Schlüssel des Clients"},{flag:"AllowedIPs = 10.0.0.2/32",desc:"VPN-IP des Clients"}], examples:[{title:"Vollständige Server-Config",code:"<span class='comment'># /etc/wireguard/wg0.conf (Server)</span>\n[Interface]\nAddress    = 10.0.0.1/24\nListenPort = 51820\nPrivateKey = $(cat /etc/wireguard/server.key)\n\n<span class='comment'># NAT: VPN-Traffic ins Internet routen:</span>\nPostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE\nPostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE\n\n<span class='comment'># Client 1:</span>\n[Peer]\nPublicKey  = $(cat /etc/wireguard/client1.pub)\nAllowedIPs = 10.0.0.2/32\n\n<span class='comment'># Client 2:</span>\n[Peer]\nPublicKey  = $(cat /etc/wireguard/client2.pub)\nAllowedIPs = 10.0.0.3/32",note:"Tausche eth0 gegen den echten Interface-Namen (ip -o link show | grep UP)."},{title:"IP-Forwarding aktivieren und Server starten",code:"<span class='comment'># IP-Forwarding dauerhaft aktivieren:</span>\n<span class='prompt'>$ </span>echo 'net.ipv4.ip_forward=1' | sudo tee -a /etc/sysctl.conf\n<span class='prompt'>$ </span>sudo sysctl -p\n\n<span class='comment'># UFW-Port freigeben:</span>\n<span class='prompt'>$ </span>sudo ufw allow 51820/udp\n\n<span class='comment'># VPN starten:</span>\n<span class='prompt'>$ </span>sudo wg-quick up wg0\n<span class='prompt'>$ </span>sudo systemctl enable wg-quick@wg0\n<span class='prompt'>$ </span>wg show\n<span class='output'>interface: wg0\n  public key: K7vX2m...\n  listening port: 51820</span>",note:"systemctl enable wg-quick@wg0 startet das VPN automatisch nach jedem Reboot."}], tags:["VPN","WireGuard","Server","Netzwerk"] },

      { name:"Client-Konfiguration", short:"WireGuard-Client verbinden", desc:"Die Client-Config spiegelt die Server-Config. Jeder Client kennt nur den Server-Peer, nicht andere Clients.", syntax:"<b>/etc/wireguard/wg0.conf</b> (Client)", options:[{flag:"Address = 10.0.0.2/32",desc:"VPN-IP des Clients"},{flag:"DNS = 1.1.1.1",desc:"DNS über VPN nutzen"},{flag:"Endpoint = server-ip:51820",desc:"Öffentliche IP und Port des Servers"},{flag:"PublicKey = ...",desc:"Öffentlicher Schlüssel des Servers"},{flag:"AllowedIPs = 0.0.0.0/0",desc:"Gesamter Traffic durch VPN (Full Tunnel)"},{flag:"AllowedIPs = 10.0.0.0/24",desc:"Nur VPN-Traffic (Split Tunnel)"},{flag:"PersistentKeepalive = 25",desc:"Verbindung aufrechterhalten (hinter NAT)"}], examples:[{title:"Client-Config (Full Tunnel)",code:"<span class='comment'># /etc/wireguard/wg0.conf (Client — alles durch VPN)</span>\n[Interface]\nAddress    = 10.0.0.2/32\nPrivateKey = &lt;CLIENT_PRIVATE_KEY&gt;\nDNS        = 1.1.1.1\n\n[Peer]\nPublicKey           = &lt;SERVER_PUBLIC_KEY&gt;\nEndpoint            = 203.0.113.1:51820\nAllowedIPs          = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\n\n<span class='prompt'>$ </span>sudo wg-quick up wg0\n<span class='output'>[#] ip link add wg0 type wireguard\n[#] wg setconf wg0 /dev/fd/63\n[#] ip address add 10.0.0.2/32 dev wg0</span>",note:"AllowedIPs = 0.0.0.0/0 leitet den gesamten Internet-Traffic durch den VPN-Server."},{title:"QR-Code für Smartphone",code:"<span class='prompt'>$ </span>sudo apt install qrencode\n<span class='prompt'>$ </span>qrencode -t ansiutf8 < /etc/wireguard/client1.conf",note:"Die WireGuard-App auf iOS/Android kann den QR-Code direkt scannen — kein manuelles Eintippen nötig."}], tip:"PersistentKeepalive = 25 ist wichtig wenn der Client hinter NAT ist — hält die UDP-Verbindung im Router-State.", tags:["VPN","WireGuard","Client","Mobil"] },

      { name:"wg / wg-quick", short:"WireGuard verwalten und debuggen", desc:"wg zeigt den aktuellen Status aller WireGuard-Verbindungen. wg-quick ist das Werkzeug zum Starten, Stoppen und Neuladen von WireGuard-Interfaces.", syntax:"<b>wg</b> <span class='opt-part'>[show|set|addconf]</span>  |  <b>wg-quick</b> <span class='opt-part'>[up|down|reload]</span>", options:[{flag:"wg show",desc:"Status aller Interfaces"},{flag:"wg show wg0",desc:"Status eines einzelnen Interfaces"},{flag:"wg show wg0 latest-handshakes",desc:"Letzter Handshake pro Peer (Verbindungscheck)"},{flag:"wg show wg0 transfer",desc:"Übertragene Daten pro Peer"},{flag:"wg-quick up wg0",desc:"Interface starten"},{flag:"wg-quick down wg0",desc:"Interface stoppen"},{flag:"wg-quick strip wg0",desc:"Config ohne PostUp/Down anzeigen"},{flag:"wg set wg0 peer KEY allowed-ips IP/32",desc:"Peer zur laufenden Config hinzufügen"}], examples:[{title:"Verbindungsstatus prüfen",code:"<span class='prompt'>$ </span>sudo wg show\n<span class='output'>interface: wg0\n  public key: K7vX2m...\n  listening port: 51820\n\npeer: abc123...\n  endpoint: 88.12.34.56:54321\n  allowed ips: 10.0.0.2/32\n  latest handshake: 23 seconds ago\n  transfer: 1.44 MiB received, 320 KiB sent</span>",note:"'latest handshake' zeigt ob der Client wirklich verbunden ist. Kein Handshake = kein Tunnel."},{title:"Peer dynamisch hinzufügen",code:"<span class='comment'># Neuen Client zur laufenden Config hinzufügen ohne Neustart:</span>\n<span class='prompt'>$ </span>sudo wg set wg0 peer &lt;CLIENT_PUBLIC_KEY&gt; allowed-ips 10.0.0.4/32\n<span class='comment'># Config dauerhaft speichern:</span>\n<span class='prompt'>$ </span>sudo wg-quick save wg0",note:"wg-quick save schreibt die aktuelle Laufzeit-Config zurück in die .conf-Datei."}], tip:"wg show wg0 latest-handshakes zeigt Unix-Timestamps — Timestamp 0 = Client hat sich noch nie verbunden.", tags:["VPN","WireGuard","Debugging"] }
    ]
