<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Lernpage</title>
<style>
  :root {
    --bg: #f0f5eb;
    --sidebar-bg: #e2edcf;
    --card-bg: #ffffff;
    --border: #c0d8a0;
    --accent: #3d7a28;
    --accent2: #2e6b1e;
    --accent3: #b83c1e;
    --accent4: #6b4fa8;
    --text: #1a2914;
    --text-muted: #547050;
    --code-bg: #1a2614;
    --code-text: #a0d068;
    --tag-bg: #ddeecb;
    --hover: #cfe3b8;
    --header-bg: #2e6b1e;
    --active-bg: #c8e0ae;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { background: var(--header-bg); border-bottom: 2px solid #255018; padding: 11px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .logo { font-size: 21px; font-weight: 800; color: #d8f0b8; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
  .logo span { color: #a8e060; }
  .search-wrap { flex: 1; max-width: 420px; position: relative; }
  .search-wrap input { width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 12px 8px 36px; border-radius: 8px; font-size: 14px; outline: none; transition: all 0.2s; }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.55); }
  .search-wrap input:focus { background: rgba(255,255,255,0.22); border-color: #a8e060; }
  .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.7); font-size: 14px; }
  .badge { background: #a8e060; color: #1a2914; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; margin-left: auto; white-space: nowrap; }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 215px; background: var(--sidebar-bg); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #b0cc90; border-radius: 4px; }
  .cat-header { padding: 13px 15px 5px; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }
  .cat-item { display: flex; align-items: center; gap: 9px; padding: 8px 15px; cursor: pointer; font-size: 13px; color: #3a5a30; transition: all 0.15s; border-left: 3px solid transparent; font-weight: 500; }
  .cat-item:hover { background: var(--hover); color: var(--text); }
  .cat-item.active { background: var(--active-bg); color: var(--accent2); border-left-color: var(--accent); font-weight: 700; }
  .cat-item .cat-icon { font-size: 15px; width: 20px; text-align: center; }
  .cat-count { margin-left: auto; background: #c8ddb0; color: #3a5a30; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }

  .cmd-list { width: 210px; background: #f8fbf4; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .cmd-list::-webkit-scrollbar { width: 4px; }
  .cmd-list::-webkit-scrollbar-thumb { background: #b0cc90; border-radius: 4px; }
  .cmd-list-header { padding: 12px 13px 9px; font-size: 11px; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.8px; }
  .cmd-item { padding: 9px 13px; cursor: pointer; border-bottom: 1px solid #eaf3e0; transition: all 0.13s; }
  .cmd-item:hover { background: var(--hover); }
  .cmd-item.active { background: var(--active-bg); border-left: 3px solid var(--accent); }
  .cmd-name { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: 700; color: var(--accent2); }
  .cmd-item.active .cmd-name { color: var(--accent); }
  .cmd-short { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .no-results { padding: 20px 13px; color: var(--text-muted); font-size: 13px; text-align: center; }

  .detail { flex: 1; overflow-y: auto; padding: 26px 34px; background: var(--bg); }
  .detail::-webkit-scrollbar { width: 6px; }
  .detail::-webkit-scrollbar-thumb { background: #b8cfa0; border-radius: 4px; }

  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; gap: 12px; }
  .welcome .big { font-size: 64px; }
  .welcome h2 { font-size: 22px; color: var(--text); font-weight: 700; }
  .welcome p { font-size: 14px; max-width: 340px; line-height: 1.7; }

  .detail-header { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 2px solid var(--border); }
  .detail-cmd { font-family: 'Consolas', monospace; font-size: 34px; font-weight: 800; color: var(--accent2); }
  .detail-category { display: inline-block; margin-top: 6px; font-size: 11px; background: var(--tag-bg); color: var(--accent2); padding: 3px 10px; border-radius: 12px; font-weight: 700; border: 1px solid var(--border); }
  .detail-desc { margin-top: 13px; font-size: 15px; color: var(--text); line-height: 1.75; }

  .section { margin-top: 26px; }
  .section-title { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent2); margin-bottom: 11px; padding-bottom: 5px; border-bottom: 2px solid var(--border); }

  .syntax-box { background: var(--code-bg); border: 1px solid #2e4820; border-radius: 9px; padding: 13px 18px; font-family: 'Consolas', monospace; font-size: 15px; color: #c8e890; overflow-x: auto; }
  .syntax-box .opt-part { color: #90c8f0; }
  .syntax-box .arg-part { color: #f0b870; }

  .options-grid { display: flex; flex-direction: column; gap: 7px; }
  .option-row { display: flex; align-items: flex-start; gap: 13px; padding: 9px 13px; background: var(--card-bg); border-radius: 7px; border: 1px solid var(--border); }
  .option-flag { font-family: 'Consolas', monospace; font-size: 13px; color: var(--accent4); min-width: 110px; font-weight: 700; }
  .option-desc { font-size: 13px; color: var(--text); line-height: 1.5; }

  .examples { display: flex; flex-direction: column; gap: 13px; }
  .example-block { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .example-title { background: var(--tag-bg); padding: 7px 13px; font-size: 12px; color: var(--accent2); font-weight: 700; border-bottom: 1px solid var(--border); }
  .example-code { background: var(--code-bg); padding: 13px 17px; font-family: 'Consolas', monospace; font-size: 13px; color: var(--code-text); line-height: 1.85; overflow-x: auto; }
  .example-code .prompt { color: #68a840; user-select: none; }
  .example-code .output { color: #c8ddb8; font-size: 12px; }
  .example-code .comment { color: #5a7a48; }
  .example-note { padding: 9px 13px; font-size: 12px; color: var(--text-muted); background: #f4f9ef; border-top: 1px solid var(--border); line-height: 1.6; }

  .tip-box { margin-top: 18px; background: #eaf5da; border: 1px solid #aad080; border-radius: 9px; padding: 12px 16px; display: flex; gap: 11px; }
  .tip-box .tip-text { font-size: 13px; color: #2e5a1a; line-height: 1.65; }
  .warn-box { margin-top: 10px; background: #fdf0ec; border: 1px solid #e8a090; border-radius: 9px; padding: 12px 16px; display: flex; gap: 11px; }
  .warn-box .tip-text { font-size: 13px; color: #8a2010; line-height: 1.65; }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
  .tag { background: var(--tag-bg); color: var(--accent2); font-size: 11px; padding: 3px 9px; border-radius: 12px; border: 1px solid var(--border); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">🌿 Linux<span>Lernen</span></div>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Befehl suchen... (z.B. grep, chmod, ssh)">
  </div>
  <div class="badge" id="totalBadge">…</div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="cmd-list" id="cmdList"></div>
  <div class="detail" id="detail">
    <div class="welcome">
      <div class="big">🌿</div>
      <h2>Willkommen zur Linux-Lernpage</h2>
      <p>Wähle links eine Kategorie, dann klicke auf einen Befehl — du bekommst eine ausführliche Erklärung mit Beispielen.</p>
    </div>
  </div>
</div>

      { name:"cd", short:"Verzeichnis wechseln", desc:"Wechselt das aktuelle Arbeitsverzeichnis. CD = Change Directory — einer der meistgenutzten Befehle überhaupt.", syntax:"<b>cd</b> <span class='arg-part'>[Verzeichnis]</span>", options:[{flag:"cd ~",desc:"Zum eigenen Home-Verzeichnis"},{flag:"cd -",desc:"Zum zuletzt besuchten Verzeichnis zurück"},{flag:"cd ..",desc:"Eine Ebene nach oben"},{flag:"cd ../..",desc:"Zwei Ebenen nach oben"},{flag:"cd /",desc:"Zum Root-Verzeichnis (oberste Ebene)"}], examples:[{title:"In Unterverzeichnis wechseln",code:"<span class='prompt'>$ </span>cd /var/log\n<span class='prompt'>$ </span>pwd\n<span class='output'>/var/log</span>",note:"Absoluter Pfad — funktioniert von überall."},{title:"Eine Ebene hoch",code:"<span class='prompt'>$ </span>cd ..\n<span class='output'>/var</span>",note:".. steht immer für das Elternverzeichnis."},{title:"Zwischen zwei Ordnern wechseln",code:"<span class='prompt'>$ </span>cd /var/log\n<span class='prompt'>$ </span>cd -\n<span class='output'>/home/benutzer</span>",note:"cd - springt zum zuletzt besuchten Ordner."}], tip:"Tab-Taste vervollständigt Verzeichnisnamen automatisch — tippe cd /ho[Tab].", tags:["Navigation","Grundbefehl"] },

  "Berechtigungen": {
    icon: "🔐",
    commands: [
      { name:"chmod", short:"Dateiberechtigungen ändern", desc:"Ändert Zugriffsrechte von Dateien und Ordnern. Rechte: r=lesen(4), w=schreiben(2), x=ausführen(1).", syntax:"<b>chmod</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Modus Datei</span>", options:[{flag:"u / g / o / a",desc:"User / Group / Others / All"},{flag:"+ / - / =",desc:"Recht hinzufügen / entfernen / setzen"},{flag:"-R",desc:"Rekursiv (alle Unterordner)"},{flag:"755",desc:"rwxr-xr-x (Standard für Programme)"},{flag:"644",desc:"rw-r--r-- (Standard für Dateien)"},{flag:"600",desc:"rw------- (nur Besitzer darf lesen/schreiben)"}], examples:[{title:"Skript ausführbar machen",code:"<span class='prompt'>$ </span>chmod +x script.sh\n<span class='prompt'>$ </span>./script.sh",note:"+x = Ausführungsrecht für alle hinzufügen."},{title:"Numerische Methode",code:"<span class='prompt'>$ </span>chmod 755 programm\n<span class='comment'># 7=rwx(Besitzer), 5=r-x(Gruppe), 5=r-x(Andere)</span>",note:"r=4, w=2, x=1: addieren für kombinierte Rechte."},{title:"Privat",code:"<span class='prompt'>$ </span>chmod 600 ~/.ssh/id_rsa",note:"600 = nur Besitzer darf lesen/schreiben — nötig für SSH-Schlüssel."}], tip:"Merkhilfe: 777=alle alles, 755=Standard Programm, 644=Standard Datei, 600=privat.", warn:"chmod 777 gibt jedem vollen Zugriff — nur wenn wirklich notwendig!", tags:["Rechte","Sicherheit"] },
      { name:"chown", short:"Besitzer/Gruppe ändern", desc:"Ändert den Besitzer und/oder die Gruppe von Dateien und Verzeichnissen. Erfordert Root-Rechte.", syntax:"<b>chown</b> <span class='arg-part'>Benutzer[:Gruppe] Datei</span>", options:[{flag:"-R",desc:"Rekursiv alle Unterordner ändern"},{flag:"-v",desc:"Änderungen anzeigen"}], examples:[{title:"Besitzer setzen",code:"<span class='prompt'>$ </span>sudo chown max datei.txt",note:"Macht 'max' zum Besitzer."},{title:"Besitzer und Gruppe",code:"<span class='prompt'>$ </span>sudo chown max:webteam projekt/",note:"Besitzer = max, Gruppe = webteam."},{title:"Webserver-Rechte",code:"<span class='prompt'>$ </span>sudo chown -R www-data:www-data /var/www/html/",note:"Typisch nach manuellen Datei-Uploads auf einen Server."}], tip:"chown :gruppe datei ändert nur die Gruppe, der Besitzer bleibt.", tags:["Rechte","Sicherheit"] },

};

let currentCategory = null;
let currentCommand = null;
let searchQuery = "";

let totalCommands = 0;
Object.values(data).forEach(cat => totalCommands += cat.commands.length);
document.getElementById('totalBadge').textContent = totalCommands + ' Befehle';

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="cat-header">Kategorien</div>';
  Object.entries(data).forEach(([name, cat]) => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (currentCategory === name ? ' active' : '');
    el.innerHTML = `<span class="cat-icon">${cat.icon}</span>${name}<span class="cat-count">${cat.commands.length}</span>`;
    el.onclick = () => { currentCategory = name; currentCommand = null; searchQuery = ""; document.getElementById('searchInput').value = ''; render(); showWelcome(); };
    sb.appendChild(el);
  });
}

function getFiltered() {
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const res = [];
    Object.entries(data).forEach(([cat, obj]) => {
      obj.commands.forEach(cmd => {
        if (cmd.name.toLowerCase().includes(q) || cmd.short.toLowerCase().includes(q) || cmd.desc.toLowerCase().includes(q) || (cmd.tags||[]).some(t => t.toLowerCase().includes(q)))
          res.push({...cmd, _cat: cat});
      });
    });
    return res;
  }
  if (!currentCategory) return [];
  return data[currentCategory].commands.map(cmd => ({...cmd, _cat: currentCategory}));
}

function renderCmdList() {
  const list = document.getElementById('cmdList');
  const cmds = getFiltered();
  const title = searchQuery ? `Suche (${cmds.length})` : (currentCategory || 'Kategorie wählen');
  list.innerHTML = `<div class="cmd-list-header">${title}</div>`;
  if (!cmds.length && (searchQuery || currentCategory)) {
    list.innerHTML += '<div class="no-results">Keine Ergebnisse</div>'; return;
  }
  cmds.forEach(cmd => {
    const el = document.createElement('div');
    el.className = 'cmd-item' + (currentCommand === cmd.name ? ' active' : '');
    el.innerHTML = `<div class="cmd-name">${cmd.name}</div><div class="cmd-short">${cmd.short}</div>`;
    el.onclick = () => { currentCommand = cmd.name; currentCategory = cmd._cat; renderDetail(cmd); renderCmdList(); renderSidebar(); };
    list.appendChild(el);
  });
}

function showWelcome() {
  document.getElementById('detail').innerHTML = `<div class="welcome"><div class="big">🌿</div><h2>Wähle einen Befehl</h2><p>Klicke links auf einen Befehl für Beschreibung, Optionen und Beispiele.</p></div>`;
}

function renderDetail(cmd) {
  let html = `<div class="detail-header"><div class="detail-cmd">${cmd.name}</div><span class="detail-category">${cmd._cat||currentCategory}</span><div class="detail-desc">${cmd.desc}</div>`;
  if (cmd.tags) html += `<div class="tags">${cmd.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  html += `</div>`;
  if (cmd.syntax) html += `<div class="section"><div class="section-title">Syntax</div><div class="syntax-box">${cmd.syntax}</div></div>`;
  if (cmd.options?.length) {
    html += `<div class="section"><div class="section-title">Optionen & Parameter</div><div class="options-grid">`;
    cmd.options.forEach(o => html += `<div class="option-row"><span class="option-flag">${o.flag}</span><span class="option-desc">${o.desc}</span></div>`);
    html += `</div></div>`;
  }
  if (cmd.examples?.length) {
    html += `<div class="section"><div class="section-title">Beispiele</div><div class="examples">`;
    cmd.examples.forEach(ex => {
      html += `<div class="example-block"><div class="example-title">${ex.title}</div><div class="example-code">${ex.code}</div>`;
      if (ex.note) html += `<div class="example-note">💡 ${ex.note}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  }
  if (cmd.tip) html += `<div class="tip-box"><span style="font-size:18px">✅</span><div class="tip-text"><strong>Tipp:</strong> ${cmd.tip}</div></div>`;
  if (cmd.warn) html += `<div class="warn-box"><span style="font-size:18px">⚠️</span><div class="tip-text"><strong>Warnung:</strong> ${cmd.warn}</div></div>`;
  document.getElementById('detail').innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  currentCommand = null;
  if (searchQuery) currentCategory = null;
  if (!searchQuery) showWelcome();
  else document.getElementById('detail').innerHTML = `<div class="welcome"><div class="big">🔍</div><h2>Ergebnisse für "${searchQuery}"</h2><p>Wähle einen Befehl aus der Liste.</p></div>`;
  render();
});

function render() { renderSidebar(); renderCmdList(); }
render();
</script>
