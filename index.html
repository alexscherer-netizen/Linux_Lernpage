      { name:"Dateien erstellen & befüllen", short:"Dokumente anlegen, schreiben und kopieren", desc:"Verschiedene Wege Dateien zu erstellen und mit Inhalt zu füllen — von der leeren Textdatei bis zum Kopieren ganzer Ordner mit Umbenennen.", syntax:"<b>touch</b>  |  <b>echo / cat</b>  |  <b>cp / rsync</b>  |  <b>nano / vim</b>", options:[{flag:"touch datei.txt",desc:"Leere Datei erstellen"},{flag:"echo 'Text' > datei.txt",desc:"Datei mit Text erstellen (überschreibt)"},{flag:"echo 'Text' >> datei.txt",desc:"Text an bestehende Datei anhängen"},{flag:"cat > datei.txt",desc:"Mehrzeilig eingeben (Ctrl+D beendet)"},{flag:"cp vorlage.txt kopie.txt",desc:"Datei kopieren"},{flag:"cp -r ordner/ kopie/",desc:"Ganzen Ordner kopieren"}], examples:[{title:"Textdateien auf verschiedene Arten erstellen",code:"<span class='comment'># 1. Leere Datei (nur Platzhalter):</span>\n<span class='prompt'>$ </span>touch notizen.txt protokoll.txt todo.txt\n\n<span class='comment'># 2. Datei mit einer Zeile:</span>\n<span class='prompt'>$ </span>echo 'Einkaufsliste' > einkauf.txt\n\n<span class='comment'># 3. Mehrzeilig über die Shell (Ctrl+D zum Beenden):</span>\n<span class='prompt'>$ </span>cat > besprechung.txt\nDatum: 10.05.2025\nTeilnehmer: Max, Anna\nThemen:\n- Budget Q3\n- neues Projekt\n<span class='comment'># Ctrl+D drücken</span>\n\n<span class='comment'># 4. Über Heredoc (ideal für Skripte):</span>\n<span class='prompt'>$ </span>cat > readme.txt &lt;&lt;'EOF'\n# Mein Projekt\n\nBeschreibung des Projekts.\n\n## Installation\nnpm install\nEOF\n\n<span class='comment'># 5. Direkt mit Editor:</span>\n<span class='prompt'>$ </span>nano bericht.txt",note:">> hängt an, > überschreibt — häufiger Fehler! Immer doppelt prüfen."},{title:"Ordner befüllen und Dateien organisieren",code:"<span class='comment'># Mehrere Dateien auf einmal erstellen (Monatsprotokolle):</span>\n<span class='prompt'>$ </span>for monat in Jan Feb Mar Apr Mai Jun; do\n    touch protokolle/protokoll_${monat}_2025.txt\n  done\n<span class='prompt'>$ </span>ls protokolle/\n<span class='output'>protokoll_Jan_2025.txt  protokoll_Feb_2025.txt  ...</span>\n\n<span class='comment'># Vorlage in alle Dateien schreiben:</span>\n<span class='prompt'>$ </span>for f in protokolle/*.txt; do\n    echo -e 'Datum:\\nTeilnehmer:\\nBeschlüsse:\\n' > \"$f\"\n  done\n\n<span class='comment'># Alle PDFs aus Downloads nach Dokumente sortieren:</span>\n<span class='prompt'>$ </span>cp ~/Downloads/*.pdf ~/Dokumente/2025/Rechnungen/Eingang/\n\n<span class='comment'># Nur neuere Dateien kopieren (rsync):</span>\n<span class='prompt'>$ </span>rsync -av --update ~/Downloads/*.pdf ~/Dokumente/2025/",note:"rsync --update kopiert nur wenn die Quelle neuer ist — kein doppeltes Kopieren."}], tags:["Workflow","Dateien","Erstellen","Befüllen","Alltag"] },

      { name:"Dateien umbenennen & sortieren", short:"Massenumbenennung und automatische Sortierung", desc:"Einzelne Dateien umbenennen, Massenumbenennung per Schleife, nach Datum sortieren und automatisch in Unterordner einsortieren — für Foto-Sammlungen, Downloads und Belege.", syntax:"<b>mv</b>  |  <b>rename</b>  |  <b>for-Schleife</b>  |  <b>find + mv</b>", options:[{flag:"mv alt.txt neu.txt",desc:"Einzelne Datei umbenennen"},{flag:"rename 's/alt/neu/' *.txt",desc:"Muster in Dateinamen ersetzen"},{flag:"rename 's/ /_/g' *",desc:"Leerzeichen durch _ ersetzen"},{flag:"mv datei zielordner/",desc:"Datei in Ordner verschieben"},{flag:"find -name '*.jpg' -exec mv {} ziel/ \\;",desc:"Alle JPEGs verschieben"}], examples:[{title:"Massenumbenennung von Dateien",code:"<span class='comment'># Leerzeichen in Dateinamen durch Unterstriche ersetzen:</span>\n<span class='prompt'>$ </span>for f in *\\ *; do mv \"$f\" \"${f// /_}\"; done\n\n<span class='comment'># Großbuchstaben → Kleinbuchstaben:</span>\n<span class='prompt'>$ </span>for f in *.JPG; do mv \"$f\" \"${f,,}\"; done\n<span class='comment'># ${f,,} = alles kleinschreiben (Bash 4+)</span>\n\n<span class='comment'># Nummerierung hinzufügen (z.B. für Bilder):</span>\n<span class='prompt'>$ </span>i=1; for f in *.jpg; do\n    mv \"$f\" \"$(printf '%03d' $i)_${f}\"\n    ((i++))\n  done\n<span class='output'>001_urlaub.jpg  002_strand.jpg  003_hotel.jpg</span>\n\n<span class='comment'># Mit rename-Tool (muss installiert werden):</span>\n<span class='prompt'>$ </span>sudo apt install rename\n<span class='prompt'>$ </span>rename 's/Bericht/Report/g' *.txt\n<span class='prompt'>$ </span>rename 's/\\.TXT$/.txt/' *  <span class='comment'># Endungen vereinheitlichen</span>",note:"${f,,} (lowercase) und ${f^^} (uppercase) sind eingebaut in Bash — kein Tool nötig."},{title:"Dateien automatisch nach Datum sortieren",code:"<span class='comment'># Alle Fotos nach Jahr/Monat in Unterordner sortieren:</span>\n<span class='prompt'>$ </span>for f in ~/Downloads/*.jpg; do\n    datum=$(stat -c %y \"$f\" | cut -d'-' -f1,2)  # z.B. 2025-05\n    mkdir -p ~/Fotos/$datum\n    mv \"$f\" ~/Fotos/$datum/\n  done\n<span class='output'># Ergebnis:\n# ~/Fotos/2025-03/bild001.jpg\n# ~/Fotos/2025-05/bild002.jpg</span>\n\n<span class='comment'># PDFs nach erstem Buchstaben sortieren:</span>\n<span class='prompt'>$ </span>for f in *.pdf; do\n    buchstabe=$(echo \"$f\" | cut -c1 | tr '[:lower:]' '[:upper:]')\n    mkdir -p \"sortiert/$buchstabe\"\n    cp \"$f\" \"sortiert/$buchstabe/\"\n  done",note:"stat -c %y gibt das Änderungsdatum — exif-Daten für Fotos mit 'exiftool' auslesen."}], tags:["Workflow","Umbenennen","Sortieren","Dateiverwaltung","Automatisierung"] },

      { name:"Ordner archivieren & komprimieren", short:"zip, tar, entpacken und Platz sparen", desc:"Ordner für Archivierung oder Transfer komprimieren, Archive öffnen und Inhalt prüfen — ohne unnötige Klicks.", syntax:"<b>tar -czf</b>  |  <b>zip -r</b>  |  <b>tar -xzf</b>  |  <b>unzip</b>", options:[{flag:"tar -czf archiv.tar.gz ordner/",desc:"Ordner als .tar.gz komprimieren"},{flag:"tar -xzf archiv.tar.gz",desc:"tar.gz entpacken"},{flag:"tar -tzf archiv.tar.gz",desc:"Inhalt anzeigen ohne entpacken"},{flag:"zip -r archiv.zip ordner/",desc:"Ordner als .zip (Windows-kompatibel)"},{flag:"unzip archiv.zip -d zielordner/",desc:"zip entpacken"},{flag:"gzip -9 datei.txt",desc:"Einzelne Datei komprimieren"}], examples:[{title:"Projekt archivieren und versenden",code:"<span class='comment'># Aktuellen Projektzustand sichern:</span>\n<span class='prompt'>$ </span>tar -czf projekt_backup_$(date +%Y%m%d).tar.gz \\\n    meinprojekt/ \\\n    --exclude='meinprojekt/node_modules' \\\n    --exclude='meinprojekt/.git' \\\n    --exclude='meinprojekt/*.log'\n\n<span class='prompt'>$ </span>ls -lh projekt_backup_*.tar.gz\n<span class='output'>-rw-r--r-- projekt_backup_20250510.tar.gz 2.3M</span>\n\n<span class='comment'># Inhalt prüfen OHNE zu entpacken:</span>\n<span class='prompt'>$ </span>tar -tzf projekt_backup_20250510.tar.gz | head -20\n<span class='output'>meinprojekt/\nmeinprojekt/src/\nmeinprojekt/src/index.html\nmeinprojekt/src/style.css</span>\n\n<span class='comment'># Für Windows-Empfänger als .zip:</span>\n<span class='prompt'>$ </span>zip -r projekt_$(date +%Y%m%d).zip meinprojekt/ \\\n    -x 'meinprojekt/node_modules/*' \\\n    -x 'meinprojekt/.git/*'",note:"--exclude und -x vor dem Entpacken testen mit -t (list) — spart Überraschungen."},{title:"Entpacken an den richtigen Ort",code:"<span class='comment'># tar.gz entpacken (in aktuellen Ordner):</span>\n<span class='prompt'>$ </span>tar -xzf projekt_backup_20250510.tar.gz\n\n<span class='comment'># In bestimmten Ordner entpacken:</span>\n<span class='prompt'>$ </span>tar -xzf archiv.tar.gz -C /tmp/restore/\n\n<span class='comment'># Nur eine bestimmte Datei aus Archiv holen:</span>\n<span class='prompt'>$ </span>tar -xzf archiv.tar.gz meinprojekt/src/index.html\n\n<span class='comment'># zip entpacken:</span>\n<span class='prompt'>$ </span>unzip archiv.zip -d /tmp/entpackt/\n\n<span class='comment'># Mehrere Archive auf einmal entpacken:</span>\n<span class='prompt'>$ </span>for f in ~/Downloads/*.zip; do\n    unzip -q \"$f\" -d ~/entpackt/$(basename \"$f\" .zip)\n  done",note:"basename datei.zip .zip entfernt die Dateiendung — nützlich für Zielordner-Namen."}], tags:["Workflow","Archiv","tar","zip","Komprimierung"] },

      { name:"Sicher löschen & aufräumen", short:"Dateien, Ordner und Duplikate entfernen", desc:"Dateien und Ordner sicher entfernen, Duplikate finden, Temporäres aufräumen und den Papierkorb-Gedanken nachbauen — ohne versehentlich Wichtiges zu verlieren.", syntax:"<b>rm -ri</b>  |  <b>trash-cli</b>  |  <b>find -delete</b>  |  <b>fdupes</b>", options:[{flag:"rm -ri ordner/",desc:"Interaktiv löschen (fragt für jede Datei)"},{flag:"rm -rf ordner/",desc:"Sofort löschen OHNE Nachfrage — Vorsicht!"},{flag:"rmdir ordner/",desc:"Nur leeren Ordner löschen"},{flag:"find . -name '*.tmp' -delete",desc:"Alle .tmp-Dateien löschen"},{flag:"find . -empty -type f -delete",desc:"Alle leeren Dateien löschen"},{flag:"find . -empty -type d -delete",desc:"Alle leeren Ordner löschen"},{flag:"trash datei",desc:"In Papierkorb verschieben (trash-cli)"}], examples:[{title:"Sicher löschen mit Bestätigung",code:"<span class='comment'># IMMER zuerst prüfen was gelöscht werden würde:</span>\n<span class='prompt'>$ </span>find ~/Downloads -name '*.tmp' -o -name '*.part'\n<span class='output'>/home/user/Downloads/video.tmp\n/home/user/Downloads/update.part</span>\n\n<span class='comment'># Dann erst löschen:</span>\n<span class='prompt'>$ </span>find ~/Downloads -name '*.tmp' -o -name '*.part' -delete\n\n<span class='comment'># Ordner mit Bestätigung löschen:</span>\n<span class='prompt'>$ </span>rm -ri altprojekt/\n<span class='output'>rm: descend into directory 'altprojekt/'? y\nrm: remove regular file 'altprojekt/README.md'? y\nrm: remove directory 'altprojekt/'? y</span>\n\n<span class='comment'># Papierkorb statt sofort löschen (sicherer):</span>\n<span class='prompt'>$ </span>sudo apt install trash-cli\n<span class='prompt'>$ </span>trash altprojekt/          <span class='comment'># In Papierkorb</span>\n<span class='prompt'>$ </span>trash-list                  <span class='comment'># Was ist drin?</span>\n<span class='prompt'>$ </span>trash-restore               <span class='comment'># Wiederherstellen</span>\n<span class='prompt'>$ </span>trash-empty                 <span class='comment'># Papierkorb leeren</span>",note:"trash-cli ist der beste Schutz vor rm-Unfällen — verhält sich wie der Desktop-Papierkorb."},{title:"Duplikate finden und aufräumen",code:"<span class='comment'># Duplikate finden mit fdupes:</span>\n<span class='prompt'>$ </span>sudo apt install fdupes\n<span class='prompt'>$ </span>fdupes -r ~/Dokumente\n<span class='output'>/home/user/Dokumente/bericht.pdf\n/home/user/Dokumente/Backup/bericht.pdf\n\n/home/user/Dokumente/foto.jpg\n/home/user/Dokumente/Fotos/foto.jpg</span>\n\n<span class='comment'># Duplikate interaktiv löschen (auswählen was behalten):</span>\n<span class='prompt'>$ </span>fdupes -r -d ~/Dokumente\n\n<span class='comment'># Alte Dateien (nicht benutzt seit 6 Monaten) finden:</span>\n<span class='prompt'>$ </span>find ~/Downloads -atime +180 -type f | sort\n\n<span class='comment'># Downloads aufräumen: alles älter als 30 Tage löschen:</span>\n<span class='prompt'>$ </span>find ~/Downloads -mtime +30 -type f -delete\n\n<span class='comment'># Leere Ordner entfernen:</span>\n<span class='prompt'>$ </span>find ~/Dokumente -empty -type d\n<span class='comment'># Erst anzeigen, dann:</span>\n<span class='prompt'>$ </span>find ~/Dokumente -empty -type d -delete",note:"fdupes -r zeigt zuerst NUR an — -d löscht interaktiv. Niemals blind -d ohne vorherige -r Kontrolle!"}], tags:["Workflow","Löschen","Aufräumen","Duplikate","Dateiverwaltung"] },

      { name:"Vollständiger Datei-Workflow", short:"Anlegen → Befüllen → Archivieren → Löschen", desc:"Der komplette Lebenszyklus von Dateien und Ordnern: Struktur anlegen, Dokumente erstellen und befüllen, alles archivieren und danach sauber aufräumen.", syntax:"<b>Kompletter Praxis-Workflow</b> mit echtem Beispiel", options:[{flag:"Phase 1",desc:"Ordnerstruktur anlegen"},{flag:"Phase 2",desc:"Dokumente erstellen und befüllen"},{flag:"Phase 3",desc:"Dateien organisieren und prüfen"},{flag:"Phase 4",desc:"Archivieren und sichern"},{flag:"Phase 5",desc:"Original aufräumen"}], examples:[{title:"Phase 1–3: Anlegen und Befüllen",code:"<span class='comment'>### PHASE 1: Struktur anlegen ###</span>\n<span class='prompt'>$ </span>mkdir -p ~/Projekte/Website_Relaunch/{Planung,Design/{Entwuerfe,Final},Texte/{Roh,Freigegeben},Abrechnung}\n<span class='prompt'>$ </span>tree ~/Projekte/Website_Relaunch\n<span class='output'>Website_Relaunch/\n├── Abrechnung/\n├── Design/\n│   ├── Entwuerfe/\n│   └── Final/\n├── Planung/\n└── Texte/\n    ├── Freigegeben/\n    └── Roh/</span>\n\n<span class='comment'>### PHASE 2: Dokumente erstellen ###</span>\n<span class='prompt'>$ </span>cat > ~/Projekte/Website_Relaunch/Planung/briefing.txt &lt;&lt;'EOF'\nProjekt: Website Relaunch 2025\nKunde: Muster GmbH\nDeadline: 30.06.2025\nBudget: 5.000 EUR\nEOF\n\n<span class='prompt'>$ </span>touch ~/Projekte/Website_Relaunch/Abrechnung/rechnung_{001..005}.txt\n\n<span class='comment'>### PHASE 3: Vorlage in alle Rechnungen schreiben ###</span>\n<span class='prompt'>$ </span>for f in ~/Projekte/Website_Relaunch/Abrechnung/rechnung_*.txt; do\n    nr=$(basename \"$f\" .txt | cut -d_ -f2)\n    cat > \"$f\" &lt;&lt;EOF\nRechnung Nr: $nr\nDatum: $(date +%d.%m.%Y)\nBetrag: \nBeschreibung: \nEOF\n  done\n\n<span class='comment'># Prüfen:</span>\n<span class='prompt'>$ </span>ls -lh ~/Projekte/Website_Relaunch/**/*.txt",note:"cat > datei <<'EOF' ... EOF schreibt mehrzeiligen Text ohne Editor — perfekt für Skripte."},{title:"Phase 4–5: Archivieren und Aufräumen",code:"<span class='comment'>### PHASE 4: Projekt abschließen und archivieren ###</span>\n<span class='prompt'>$ </span>cd ~/Projekte\n\n<span class='comment'># Archiv mit Datum erstellen:</span>\n<span class='prompt'>$ </span>tar -czf ~/Archiv/Website_Relaunch_$(date +%Y%m%d).tar.gz \\\n    Website_Relaunch/\n\n<span class='comment'># Inhalt und Größe prüfen:</span>\n<span class='prompt'>$ </span>tar -tzf ~/Archiv/Website_Relaunch_20250510.tar.gz | wc -l\n<span class='output'>47</span>\n<span class='prompt'>$ </span>ls -lh ~/Archiv/Website_Relaunch_*.tar.gz\n<span class='output'>-rw-r--r-- Website_Relaunch_20250510.tar.gz  1.2M</span>\n\n<span class='comment'># Test-Entpacken in temp (Integrität prüfen):</span>\n<span class='prompt'>$ </span>tar -tzf ~/Archiv/Website_Relaunch_20250510.tar.gz > /dev/null\n<span class='output'># Kein Fehler = Archiv ist in Ordnung</span>\n\n<span class='comment'>### PHASE 5: Nur wenn Archiv OK ist — Original löschen ###</span>\n<span class='prompt'>$ </span>rm -ri ~/Projekte/Website_Relaunch/\n<span class='comment'># ODER sicherer mit Papierkorb:</span>\n<span class='prompt'>$ </span>trash ~/Projekte/Website_Relaunch/\n<span class='prompt'>$ </span>trash-list\n<span class='output'>2025-05-10 Website_Relaunch</span>\n<span class='comment'># Erst nach ein paar Tagen:</span>\n<span class='prompt'>$ </span>trash-empty",note:"Niemals löschen bevor das Archiv geprüft wurde! tar -t liest den Index ohne zu entpacken."}], tags:["Workflow","Dateiverwaltung","Archiv","Alltag","Komplett"] },

      { name:"Schnelle Alias-Sammlung", short:"Produktivitäts-Shortcuts für ~/.bashrc", desc:"Die besten Aliases und Shell-Funktionen für den täglichen Gebrauch. In ~/.bashrc eintragen und sofort produktiver werden.", syntax:"<b>alias</b> und <b>function</b> in ~/.bashrc / ~/.zshrc", options:[{flag:"alias",desc:"Kurzes Kürzel für langen Befehl"},{flag:"function",desc:"Alias mit Parametern"},{flag:"source ~/.bashrc",desc:"Änderungen sofort aktivieren"},{flag:"alias -p",desc:"Alle aktuellen Aliases anzeigen"},{flag:"type befehl",desc:"Zeigt ob Befehl ein Alias ist"}], examples:[{title:"System-Aliases für den Alltag",code:"<span class='comment'># ~/.bashrc — am Ende einfügen:</span>\n\n<span class='comment'># Navigation</span>\nalias ..='cd ..'\nalias ...='cd ../..'\nalias ~='cd ~'\nalias ll='ls -lah --color=auto'\nalias la='ls -la'\nalias lt='ls -lt'\n\n<span class='comment'># Sicherheitsnetz</span>\nalias rm='rm -i'          <span class='comment'># Immer nachfragen</span>\nalias cp='cp -i'          <span class='comment'># Immer nachfragen</span>\nalias mv='mv -i'          <span class='comment'># Immer nachfragen</span>\nalias mkdir='mkdir -pv'   <span class='comment'># Eltern-Ordner + verbose</span>\n\n<span class='comment'># System</span>\nalias update='sudo apt update && sudo apt upgrade -y'\nalias ports='ss -tlnp'\nalias meminfo='free -h'\nalias diskinfo='df -h'\nalias myip='curl ifconfig.me'\nalias localip='hostname -I | awk \"{print \\$1}\"'\n\n<span class='comment'># Logs</span>\nalias syslog='sudo tail -f /var/log/syslog'\nalias errors='sudo journalctl -p err -n 50'\nalias nginxlog='sudo tail -f /var/log/nginx/access.log'\nalias nginxerr='sudo tail -f /var/log/nginx/error.log'\n\n<span class='prompt'>$ </span>source ~/.bashrc",note:"alias rm='rm -i' rettet dich garantiert irgendwann vor unbeabsichtigtem Datenverlust."},{title:"Shell-Funktionen mit Parametern",code:"<span class='comment'># Verzeichnis erstellen und sofort wechseln:</span>\nmkcd() { mkdir -p \"$1\" && cd \"$1\"; }\n\n<span class='comment'># Port-Check: Wer benutzt Port X?</span>\nport() { ss -tlnp | grep \":$1\"; }\n<span class='comment'># Nutzung: port 80</span>\n\n<span class='comment'># IP einer Domain anzeigen:</span>\ndig+short() { dig +short \"$1\" A; }\n\n<span class='comment'># HTTP-Status einer URL prüfen:</span>\nstatus() { curl -o /dev/null -s -w \"%{http_code}\\n\" \"$1\"; }\n<span class='comment'># Nutzung: status https://meinsite.de → 200</span>\n\n<span class='comment'># Backup einer Datei vor dem Bearbeiten:</span>\nbak() { cp \"$1\" \"$1.bak.$(date +%Y%m%d_%H%M%S)\"; }\n<span class='comment'># Nutzung: bak /etc/nginx/nginx.conf</span>\n\n<span class='comment'># Alle Prozesse eines Namens anzeigen:</span>\npss() { ps aux | grep -v grep | grep \"$1\"; }\n\n<span class='comment'># Aktivieren:</span>\n<span class='prompt'>$ </span>source ~/.bashrc",note:"mkcd und bak sind die nützlichsten Funktionen — täglich im Einsatz."}], tags:["Workflow","Aliases","bashrc","Produktivität","Shell"] }
    ]
  }
};

let currentCategory = null, currentCommand = null, searchQuery = "";
let totalCommands = 0;
Object.values(data).forEach(cat => totalCommands += cat.commands.length);
document.getElementById('totalBadge').textContent = totalCommands + ' Befehle';

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="cat-header">Kategorien</div>';
  Object.entries(data).forEach(([name, cat]) => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (currentCategory === name ? ' active' : '');
    el.innerHTML = `<span class="cat-icon">${cat.icon}</span>${name}<span class="cat-count">${cat.commands.length}</span>`;
    el.onclick = () => { currentCategory = name; currentCommand = null; searchQuery = ''; document.getElementById('searchInput').value = ''; showWelcome(); render(); showMobilePanel('cmdList'); };
    sb.appendChild(el);
  });
}

function getFiltered() {
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const res = [];
    Object.entries(data).forEach(([cat, obj]) => {
      obj.commands.forEach(cmd => {
        if (cmd.name.toLowerCase().includes(q) || cmd.short.toLowerCase().includes(q) || cmd.desc.toLowerCase().includes(q) || (cmd.tags||[]).some(t => t.toLowerCase().includes(q)))
          res.push({...cmd, _cat: cat});
      });
    });
    return res;
  }
  if (!currentCategory) return [];
  return data[currentCategory].commands.map(cmd => ({...cmd, _cat: currentCategory}));
}

function renderCmdList() {
  const list = document.getElementById('cmdList');
  const cmds = getFiltered();
  const title = searchQuery ? `Suche (${cmds.length})` : (currentCategory || 'Kategorie wählen');
  list.innerHTML = `<div class="cmd-list-header"><button class="mobile-back-btn" onclick="showMobilePanel('sidebar')">◀ Kategorien</button><span>${title}</span></div>`;
  if (!cmds.length && (searchQuery || currentCategory)) { list.innerHTML += '<div class="no-results">Keine Ergebnisse</div>'; return; }
  cmds.forEach(cmd => {
    const el = document.createElement('div');
    el.className = 'cmd-item' + (currentCommand === cmd.name ? ' active' : '');
    el.innerHTML = `<div class="cmd-name">${cmd.name}</div><div class="cmd-short">${cmd.short}</div>`;
    el.onclick = () => { currentCommand = cmd.name; currentCategory = cmd._cat; renderDetail(cmd); renderCmdList(); renderSidebar(); showMobilePanel('detail'); };
    list.appendChild(el);
  });
}

function showWelcome() {
  document.getElementById('detail').innerHTML = `<div class="welcome"><div class="big">🌿</div><h2>Wähle einen Befehl</h2><p>Klicke links auf einen Befehl für Beschreibung, Optionen und Beispiele.</p></div>`;
}

function renderDetail(cmd) {
  let h = `<button class="mobile-back-btn mobile-back-detail" onclick="showMobilePanel('cmdList')">◀ Zurück zur Liste</button>`;
  h += `<div class="detail-header"><div class="detail-cmd">${cmd.name}</div><span class="detail-category">${cmd._cat||currentCategory}</span><div class="detail-desc">${cmd.desc}</div>`;
  if (cmd.tags) h += `<div class="tags">${cmd.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  h += `</div>`;
  if (cmd.syntax) h += `<div class="section"><div class="section-title">Syntax</div><div class="syntax-box">${cmd.syntax}</div></div>`;
  if (cmd.options?.length) {
    h += `<div class="section"><div class="section-title">Optionen & Parameter</div><div class="options-grid">`;
    cmd.options.forEach(o => h += `<div class="option-row"><span class="option-flag">${o.flag}</span><span class="option-desc">${o.desc}</span></div>`);
    h += `</div></div>`;
  }
  if (cmd.examples?.length) {
    h += `<div class="section"><div class="section-title">Beispiele</div><div class="examples">`;
    cmd.examples.forEach(ex => {
      h += `<div class="example-block"><div class="example-title">${ex.title}</div><div class="example-code">${ex.code}</div>`;
      if (ex.note) h += `<div class="example-note">💡 ${ex.note}</div>`;
      h += `</div>`;
    });
    h += `</div></div>`;
  }
  if (cmd.legal) h += `<div style="margin-top:18px;background:#fff3e0;border:2px solid #e65100;border-radius:9px;padding:14px 18px;display:flex;gap:12px;"><span style="font-size:22px">⚖️</span><div style="font-size:13px;color:#7a2800;line-height:1.7;"><strong>NUR FÜR AUTORISIERTE NUTZUNG:</strong> ${cmd.legal}</div></div>`;
  if (cmd.tip) h += `<div class="tip-box"><span style="font-size:18px">✅</span><div class="tip-text"><strong>Tipp:</strong> ${cmd.tip}</div></div>`;
  if (cmd.warn) h += `<div class="warn-box"><span style="font-size:18px">⚠️</span><div class="tip-text"><strong>Warnung:</strong> ${cmd.warn}</div></div>`;
  document.getElementById('detail').innerHTML = h;
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  currentCommand = null;
  if (searchQuery) currentCategory = null;
  if (!searchQuery) showWelcome();
  else document.getElementById('detail').innerHTML = `<div class="welcome"><div class="big">🔍</div><h2>Suche: "${searchQuery}"</h2><p>Wähle einen Befehl aus der Liste.</p></div>`;
  render();
});

function render() { renderSidebar(); renderCmdList(); }

function showMobilePanel(id) {
  if (window.innerWidth > 768) return;
  ['sidebar','cmdList','detail'].forEach(p => document.getElementById(p).classList.remove('panel-active'));
  document.getElementById(id).classList.add('panel-active');
  [['mnavCat','sidebar'],['mnavCmd','cmdList'],['mnavDet','detail']].forEach(([btn,panel]) =>
    document.getElementById(btn).classList.toggle('active', panel === id));
}

window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    ['sidebar','cmdList','detail'].forEach(p => document.getElementById(p).classList.remove('panel-active'));
  } else if (!['sidebar','cmdList','detail'].some(p => document.getElementById(p).classList.contains('panel-active'))) {
    showMobilePanel('sidebar');
  }
});

render();
if (window.innerWidth <= 768) showMobilePanel('sidebar');
</script>
