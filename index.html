  "Disk-Verwaltung": {
    icon: "💾",
    commands: [
      { name:"lsblk", short:"Block-Geräte auflisten", desc:"Zeigt alle Block-Geräte (Festplatten, SSDs, USB-Sticks, Partitionen) in einer übersichtlichen Baumstruktur an.", syntax:"<b>lsblk</b> <span class='opt-part'>[Optionen]</span>", options:[{flag:"lsblk",desc:"Alle Block-Geräte als Baum anzeigen"},{flag:"-f",desc:"Dateisystem-Typ und UUID anzeigen"},{flag:"-o NAME,SIZE,TYPE,MOUNTPOINT",desc:"Bestimmte Spalten wählen"},{flag:"-d",desc:"Nur Geräte ohne Partitionen"},{flag:"-J",desc:"JSON-Ausgabe"}], examples:[{title:"Alle Laufwerke anzeigen",code:"<span class='prompt'>$ </span>lsblk\n<span class='output'>NAME   MAJ:MIN RM  SIZE RO TYPE MOUNTPOINT\nsda      8:0    0  500G  0 disk\n├─sda1   8:1    0  512M  0 part /boot/efi\n├─sda2   8:2    0    2G  0 part /boot\n└─sda3   8:3    0  498G  0 part /\nsdb      8:16   1   32G  0 disk\n└─sdb1   8:17   1   32G  0 part /media/usb</span>",note:"Zeigt sofort Festplatten, Partitionen und Einhängepunkte."},{title:"Mit Dateisystem-Info",code:"<span class='prompt'>$ </span>lsblk -f\n<span class='output'>NAME   FSTYPE LABEL  UUID                                 MOUNTPOINT\nsda3   ext4          a3b1c2d4-...                         /</span>",note:"-f zeigt UUID — wichtig für /etc/fstab Einträge."}], tip:"lsblk ist der erste Befehl bei Festplatten-Diagnose — schneller und übersichtlicher als fdisk -l.", tags:["Disk","Hardware","System"] },
      { name:"fdisk", short:"Partitionen verwalten", desc:"Klassisches Werkzeug zum Erstellen, Löschen und Ändern von Partitionen. Interaktiver Modus mit Menü.", syntax:"<b>fdisk</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Gerät</span>", options:[{flag:"fdisk -l",desc:"Alle Partitionen auflisten"},{flag:"fdisk /dev/sdb",desc:"Interaktiver Modus für Gerät"},{flag:"p",desc:"(im Menü) Partitionstabelle anzeigen"},{flag:"n",desc:"(im Menü) Neue Partition erstellen"},{flag:"d",desc:"(im Menü) Partition löschen"},{flag:"t",desc:"(im Menü) Partitionstyp ändern"},{flag:"w",desc:"(im Menü) Änderungen schreiben und beenden"},{flag:"q",desc:"(im Menü) Beenden ohne Speichern"}], examples:[{title:"Partitionen auflisten",code:"<span class='prompt'>$ </span>sudo fdisk -l\n<span class='output'>Disk /dev/sda: 500 GB\nDevice     Boot   Start      End  Sectors  Size Type\n/dev/sda1  *       2048  1050623  1048576  512M EFI System\n/dev/sda2       1050624  5244927  4194304    2G Linux filesystem\n/dev/sda3       5244928 976773134 971528207  463G Linux filesystem</span>",note:"sudo nötig um alle Details zu sehen."},{title:"Neue Partition erstellen",code:"<span class='prompt'>$ </span>sudo fdisk /dev/sdb\n<span class='output'>Command (m for help): n\nPartition type: p (primary)\nFirst sector: [Enter]\nLast sector: +20G\nCommand: w\nThe partition table has been altered.</span>",note:"w schreibt die Änderungen — vorher kann alles abgebrochen werden."}], warn:"fdisk arbeitet direkt an der Partitionstabelle — ein Fehler kann alle Daten auf dem Gerät zerstören! Vorher Backup erstellen.", tags:["Disk","Partitionen","System-Admin"] },
      { name:"parted", short:"Moderne Partitionsverwaltung", desc:"Modernere Alternative zu fdisk mit GPT-Unterstützung, Scripting-Modus und Unterstützung für größere Festplatten (>2TB).", syntax:"<b>parted</b> <span class='arg-part'>Gerät</span> <span class='opt-part'>[Befehl]</span>", options:[{flag:"parted /dev/sdb print",desc:"Partitionen anzeigen"},{flag:"parted /dev/sdb mklabel gpt",desc:"GPT-Tabelle erstellen"},{flag:"parted /dev/sdb mkpart primary ext4 0% 100%",desc:"Partition erstellen"},{flag:"parted /dev/sdb rm 1",desc:"Partition 1 löschen"},{flag:"parted /dev/sdb resizepart 1 50GB",desc:"Partition vergrößern"},{flag:"-s",desc:"Skript-Modus (keine Nachfragen)"}], examples:[{title:"USB-Stick neu partitionieren",code:"<span class='prompt'>$ </span>sudo parted /dev/sdb --script mklabel gpt\n<span class='prompt'>$ </span>sudo parted /dev/sdb --script mkpart primary ext4 0% 100%\n<span class='prompt'>$ </span>sudo mkfs.ext4 /dev/sdb1",note:"parted + mkfs.ext4 — kompletter Workflow für neuen Datenträger."},{title:"Partitionen anzeigen",code:"<span class='prompt'>$ </span>sudo parted /dev/sda print\n<span class='output'>Model: ATA SAMSUNG (disk)\nDisk /dev/sda: 500GB\nPartition Table: gpt\nNumber Start   End    Size   File system  Name\n 1     1049kB  538MB  537MB  fat32        EFI\n 2     538MB   3000MB 2461MB ext4         boot</span>",note:"parted zeigt Größen in GB/MB statt Sektoren — leichter lesbar als fdisk."}], warn:"Auch parted kann bei falscher Bedienung Daten vernichten — immer zuerst mit print ansehen!", tags:["Disk","Partitionen","System-Admin"] },
      { name:"mkfs", short:"Dateisystem erstellen", desc:"Formatiert eine Partition mit einem Dateisystem. mkfs ist der Oberbegriff — mkfs.ext4, mkfs.vfat, mkfs.xfs für spezifische Typen.", syntax:"<b>mkfs.ext4</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Partition</span>", options:[{flag:"mkfs.ext4 /dev/sdb1",desc:"Ext4-Dateisystem erstellen (Linux-Standard)"},{flag:"mkfs.vfat -F 32 /dev/sdb1",desc:"FAT32 (für USB-Sticks, Windows-kompatibel)"},{flag:"mkfs.ntfs /dev/sdb1",desc:"NTFS (Windows)"},{flag:"mkfs.xfs /dev/sdb1",desc:"XFS (für Server, große Dateien)"},{flag:"-L 'Daten'",desc:"Label setzen"},{flag:"-n",desc:"Simulation ohne Formatierung"}], examples:[{title:"USB-Stick als FAT32 formatieren",code:"<span class='prompt'>$ </span>sudo mkfs.vfat -F 32 -n 'MEINSTICK' /dev/sdb1\n<span class='output'>mkfs.fat 4.1 (2017-01-24)\n/dev/sdb1: 30 GB</span>",note:"FAT32 wird von Linux, Windows und Mac erkannt."},{title:"Linux-Partition erstellen",code:"<span class='prompt'>$ </span>sudo mkfs.ext4 -L 'Daten' /dev/sdb1\n<span class='output'>Creating filesystem with 7864320 4k blocks\nWriting superblocks and filesystem accounting information: done</span>",note:"Ext4 ist das Standard-Dateisystem für Linux."}], warn:"mkfs löscht ALLE Daten auf der Partition unwiederbringlich! Gerät vorher mit lsblk prüfen.", tags:["Disk","Dateisystem","System-Admin"] },
      { name:"mount / umount", short:"Dateisysteme einbinden", desc:"mount binden ein Dateisystem (Partition, USB, ISO) in den Verzeichnisbaum ein. umount trennt die Verbindung sicher.", syntax:"<b>mount</b> <span class='arg-part'>Gerät Mountpoint</span>  |  <b>umount</b> <span class='arg-part'>Mountpoint</span>", options:[{flag:"mount /dev/sdb1 /mnt/daten",desc:"Partition einbinden"},{flag:"mount -t vfat /dev/sdb1 /mnt/usb",desc:"Mit Dateisystemtyp"},{flag:"mount -o ro /dev/sdb1 /mnt",desc:"Nur-Lesen einbinden"},{flag:"mount -o loop image.iso /mnt/iso",desc:"ISO-Datei einbinden"},{flag:"mount -a",desc:"Alle Einträge aus /etc/fstab einbinden"},{flag:"umount /mnt/daten",desc:"Verbindung sicher trennen"},{flag:"df -h",desc:"Alle eingebundenen Dateisysteme anzeigen"}], examples:[{title:"USB-Stick einbinden",code:"<span class='prompt'>$ </span>sudo mkdir -p /mnt/usb\n<span class='prompt'>$ </span>sudo mount /dev/sdb1 /mnt/usb\n<span class='prompt'>$ </span>ls /mnt/usb\n<span class='output'>Dokumente  Fotos  backup.tar.gz</span>",note:"Danach auf /mnt/usb zugreifen wie auf jeden anderen Ordner."},{title:"ISO-Datei einbinden",code:"<span class='prompt'>$ </span>sudo mount -o loop ubuntu.iso /mnt/iso\n<span class='prompt'>$ </span>ls /mnt/iso\n<span class='output'>boot  casper  dists  install</span>\n<span class='prompt'>$ </span>sudo umount /mnt/iso",note:"-o loop behandelt eine Datei wie ein Block-Gerät."}], tip:"udisksctl mount -b /dev/sdb1 bindet USB-Sticks ohne sudo ein — für Desktop-Nutzer praktischer.", tags:["Disk","Mount","Dateisystem"] },
      { name:"fsck", short:"Dateisystem prüfen und reparieren", desc:"Prüft ein Dateisystem auf Fehler und kann diese automatisch reparieren. Wird automatisch beim Booten ausgeführt oder manuell auf ungemounteten Partitionen.", syntax:"<b>fsck</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Partition</span>", options:[{flag:"fsck /dev/sdb1",desc:"Dateisystem prüfen"},{flag:"fsck -a /dev/sdb1",desc:"Fehler automatisch reparieren"},{flag:"fsck -n /dev/sdb1",desc:"Nur prüfen, nichts reparieren (sicher)"},{flag:"fsck -f /dev/sdb1",desc:"Erzwingen auch wenn sauber"},{flag:"fsck.ext4 -v /dev/sdb1",desc:"Ext4-spezifisch mit Details"},{flag:"tune2fs -l /dev/sdb1",desc:"Dateisystem-Metadaten anzeigen"}], examples:[{title:"USB-Stick prüfen",code:"<span class='prompt'>$ </span>sudo umount /dev/sdb1\n<span class='prompt'>$ </span>sudo fsck -n /dev/sdb1\n<span class='output'>fsck from util-linux 2.36\ne2fsck 1.46: checking pass 1, 2, 3, 4, 5\n/dev/sdb1: clean, 128/7864320 files, 1204/31457280 blocks</span>",note:"-n prüft ohne zu verändern — sicher für erste Inspektion."},{title:"Fehler reparieren",code:"<span class='prompt'>$ </span>sudo fsck -a /dev/sdb1\n<span class='output'>Phase 1: Check Blocks and Sizes\nPhase 2: Check Pathnames\n** File system was modified **</span>",note:"-a repariert alle erkannten Fehler automatisch ohne Rückfragen."}], warn:"fsck nur auf UNGEMOUNTETEN Partitionen ausführen — sonst Datenverlust möglich!", tags:["Disk","Reparatur","System-Admin"] },
      { name:"dd", short:"Rohdaten kopieren und Images erstellen", desc:"dd kopiert Daten Block für Block — direkt von/zu Geräten. Für Disk-Images, USB-Sticks bespielen, Boot-Sektoren sichern.", syntax:"<b>dd</b> <span class='arg-part'>if=Quelle of=Ziel</span> <span class='opt-part'>[bs=Blocksize]</span>", options:[{flag:"if=",desc:"Input-File (Quelle) — Gerät oder Datei"},{flag:"of=",desc:"Output-File (Ziel) — Gerät oder Datei"},{flag:"bs=4M",desc:"Blockgröße (4MB für schnelle Kopie)"},{flag:"status=progress",desc:"Fortschritt anzeigen"},{flag:"conv=fsync",desc:"Auf Festplatte schreiben bevor Fertig"},{flag:"count=1 skip=0",desc:"Nur ersten Block kopieren"}], examples:[{title:"ISO auf USB-Stick schreiben",code:"<span class='prompt'>$ </span>sudo dd if=ubuntu-22.04.iso of=/dev/sdb \\\n  bs=4M status=progress conv=fsync\n<span class='output'>1,2 GB kopiert, 0,45 s, 2,7 GB/s\n Datensätze ein- und ausgegeben</span>",note:"status=progress zeigt Geschwindigkeit und ETA."},{title:"Festplatten-Image erstellen",code:"<span class='prompt'>$ </span>sudo dd if=/dev/sda of=/backup/sda.img \\\n  bs=4M status=progress\n<span class='comment'># Image komprimieren:</span>\n<span class='prompt'>$ </span>sudo dd if=/dev/sda bs=4M | gzip > /backup/sda.img.gz",note:"Komplettes 1:1-Abbild der Festplatte — ideal für Backups."},{title:"USB-Stick sicher löschen",code:"<span class='prompt'>$ </span>sudo dd if=/dev/zero of=/dev/sdb bs=4M status=progress\n<span class='comment'># oder mit Zufallsdaten:</span>\n<span class='prompt'>$ </span>sudo dd if=/dev/urandom of=/dev/sdb bs=4M status=progress",note:"/dev/urandom erzeugt kryptografisch zufällige Daten — sicherer."}], warn:"dd ist 'disk destroyer' wenn falsch eingesetzt! if und of IMMER doppelt prüfen — falsches of zerstört Daten sofort.", tags:["Disk","Image","Backup","System-Admin"] },
      { name:"blkid / smartctl", short:"Disk-Infos und Gesundheit", desc:"blkid zeigt UUID und Dateisystem-Typ jeder Partition. smartctl prüft die physische Gesundheit von Festplatten (S.M.A.R.T.-Daten).", syntax:"<b>blkid</b>  |  <b>smartctl -a</b> <span class='arg-part'>Gerät</span>", options:[{flag:"blkid",desc:"UUID und Typ aller Partitionen"},{flag:"blkid /dev/sda1",desc:"Nur eine Partition"},{flag:"smartctl -a /dev/sda",desc:"Alle S.M.A.R.T.-Daten"},{flag:"smartctl -H /dev/sda",desc:"Nur Gesundheitsstatus"},{flag:"smartctl -t short /dev/sda",desc:"Kurztest starten (~2min)"},{flag:"smartctl -t long /dev/sda",desc:"Volltest starten (~mehrere Stunden)"}], examples:[{title:"UUID für /etc/fstab herausfinden",code:"<span class='prompt'>$ </span>sudo blkid\n<span class='output'>/dev/sda1: UUID=\"a3b1c2d4-e5f6-...\" TYPE=\"ext4\" LABEL=\"root\"\n/dev/sda2: UUID=\"A1B2-C3D4\" TYPE=\"vfat\" LABEL=\"EFI\"</span>",note:"UUID statt /dev/sda1 in /etc/fstab verwenden — stabiler bei Geräteumbenennung."},{title:"Festplattengesundheit prüfen",code:"<span class='prompt'>$ </span>sudo smartctl -H /dev/sda\n<span class='output'>SMART overall-health self-assessment test result: PASSED</span>\n<span class='prompt'>$ </span>sudo smartctl -a /dev/sda | grep -i error\n<span class='output'>Reallocated_Sector_Ct   0x0032   100   100   010    Old_age  1</span>",note:"Reallocated Sectors > 0 zeigt beginnende Festplattenprobleme."}], tip:"smartctl installieren: sudo apt install smartmontools — bei jedem Server Pflicht für regelmäßige Gesundheitschecks.", tags:["Disk","Hardware","Diagnose"] }
    ]
  }
};

let currentCategory = null, currentCommand = null, searchQuery = "";
let totalCommands = 0;
Object.values(data).forEach(cat => totalCommands += cat.commands.length);
document.getElementById('totalBadge').textContent = totalCommands + ' Befehle';

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="cat-header">Kategorien</div>';
  Object.entries(data).forEach(([name, cat]) => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (currentCategory === name ? ' active' : '');
    el.innerHTML = `<span class="cat-icon">${cat.icon}</span>${name}<span class="cat-count">${cat.commands.length}</span>`;
    el.onclick = () => { currentCategory = name; currentCommand = null; searchQuery = ''; document.getElementById('searchInput').value = ''; showWelcome(); render(); };
    sb.appendChild(el);
  });
}

function getFiltered() {
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const res = [];
    Object.entries(data).forEach(([cat, obj]) => {
      obj.commands.forEach(cmd => {
        if (cmd.name.toLowerCase().includes(q) || cmd.short.toLowerCase().includes(q) || cmd.desc.toLowerCase().includes(q) || (cmd.tags||[]).some(t => t.toLowerCase().includes(q)))
          res.push({...cmd, _cat: cat});
      });
    });
    return res;
  }
  if (!currentCategory) return [];
  return data[currentCategory].commands.map(cmd => ({...cmd, _cat: currentCategory}));
}

function renderCmdList() {
  const list = document.getElementById('cmdList');
  const cmds = getFiltered();
  const title = searchQuery ? `Suche (${cmds.length})` : (currentCategory || 'Kategorie wählen');
  list.innerHTML = `<div class="cmd-list-header">${title}</div>`;
  if (!cmds.length && (searchQuery || currentCategory)) { list.innerHTML += '<div class="no-results">Keine Ergebnisse</div>'; return; }
  cmds.forEach(cmd => {
    const el = document.createElement('div');
    el.className = 'cmd-item' + (currentCommand === cmd.name ? ' active' : '');
    el.innerHTML = `<div class="cmd-name">${cmd.name}</div><div class="cmd-short">${cmd.short}</div>`;
    el.onclick = () => { currentCommand = cmd.name; currentCategory = cmd._cat; renderDetail(cmd); renderCmdList(); renderSidebar(); };
    list.appendChild(el);
  });
}

function showWelcome() {
  document.getElementById('detail').innerHTML = `<div class="welcome"><div class="big">🌿</div><h2>Wähle einen Befehl</h2><p>Klicke links auf einen Befehl für Beschreibung, Optionen und Beispiele.</p></div>`;
}

function renderDetail(cmd) {
  let h = `<div class="detail-header"><div class="detail-cmd">${cmd.name}</div><span class="detail-category">${cmd._cat||currentCategory}</span><div class="detail-desc">${cmd.desc}</div>`;
  if (cmd.tags) h += `<div class="tags">${cmd.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  h += `</div>`;
  if (cmd.syntax) h += `<div class="section"><div class="section-title">Syntax</div><div class="syntax-box">${cmd.syntax}</div></div>`;
  if (cmd.options?.length) {
    h += `<div class="section"><div class="section-title">Optionen & Parameter</div><div class="options-grid">`;
    cmd.options.forEach(o => h += `<div class="option-row"><span class="option-flag">${o.flag}</span><span class="option-desc">${o.desc}</span></div>`);
    h += `</div></div>`;
  }
  if (cmd.examples?.length) {
    h += `<div class="section"><div class="section-title">Beispiele</div><div class="examples">`;
    cmd.examples.forEach(ex => {
      h += `<div class="example-block"><div class="example-title">${ex.title}</div><div class="example-code">${ex.code}</div>`;
      if (ex.note) h += `<div class="example-note">💡 ${ex.note}</div>`;
      h += `</div>`;
    });
    h += `</div></div>`;
  }
  if (cmd.legal) h += `<div style="margin-top:18px;background:#fff3e0;border:2px solid #e65100;border-radius:9px;padding:14px 18px;display:flex;gap:12px;"><span style="font-size:22px">⚖️</span><div style="font-size:13px;color:#7a2800;line-height:1.7;"><strong>NUR FÜR AUTORISIERTE NUTZUNG:</strong> ${cmd.legal}</div></div>`;
  if (cmd.tip) h += `<div class="tip-box"><span style="font-size:18px">✅</span><div class="tip-text"><strong>Tipp:</strong> ${cmd.tip}</div></div>`;
  if (cmd.warn) h += `<div class="warn-box"><span style="font-size:18px">⚠️</span><div class="tip-text"><strong>Warnung:</strong> ${cmd.warn}</div></div>`;
  document.getElementById('detail').innerHTML = h;
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  currentCommand = null;
  if (searchQuery) currentCategory = null;
  if (!searchQuery) showWelcome();
  else document.getElementById('detail').innerHTML = `<div class="welcome"><div class="big">🔍</div><h2>Suche: "${searchQuery}"</h2><p>Wähle einen Befehl aus der Liste.</p></div>`;
  render();
});

function render() { renderSidebar(); renderCmdList(); }
render();
</script>
</body>
</html>
