      { name:"Restore & Disaster Recovery", short:"Backup wiederherstellen", desc:"Das Wiederherstellen ist die eigentliche Leistung eines Backup-Systems. Verschiedene Szenarien: einzelne Datei, komplettes Verzeichnis, ganzes System.", syntax:"<b>Restore-Szenarien</b> — immer testen!", options:[{flag:"rsync -av BACKUP/ ZIEL/",desc:"rsync-Backup wiederherstellen"},{flag:"borg extract REPO::ARCHIV",desc:"borg-Archiv wiederherstellen"},{flag:"borg mount REPO /mnt && ls /mnt",desc:"borg als Dateisystem — einzelne Dateien suchen"},{flag:"tar -xzf backup.tar.gz -C /restore/",desc:"tar-Archiv entpacken"},{flag:"mysql DB < backup.sql",desc:"MySQL-Backup einspielen"},{flag:"psql DB < backup.sql",desc:"PostgreSQL-Backup einspielen"},{flag:"timeshift --restore",desc:"System-Snapshot zurückspielen"}], examples:[{title:"Einzelne Datei aus borg wiederherstellen",code:"<span class='comment'># Repository als Dateisystem einbinden:</span>\n<span class='prompt'>$ </span>mkdir /mnt/borg-restore\n<span class='prompt'>$ </span>borg mount /mnt/backup/borg::server-2025-05-09 /mnt/borg-restore\n\n<span class='comment'># Datei suchen und kopieren:</span>\n<span class='prompt'>$ </span>ls /mnt/borg-restore/etc/nginx/\n<span class='prompt'>$ </span>cp /mnt/borg-restore/etc/nginx/sites-available/meinsite.conf /etc/nginx/sites-available/\n\n<span class='comment'># Unmounten:</span>\n<span class='prompt'>$ </span>borg umount /mnt/borg-restore",note:"borg mount ist die eleganteste Art einzelne Dateien aus einem Backup zu holen."},{title:"Komplettes System wiederherstellen",code:"<span class='comment'># Szenario: Server ausgefallen, neuer Server\n# 1. Neuen Server booten, borg installieren\n# 2. Backup-Medium einbinden oder von Remote holen:\n$ rsync -avz backup-server:/backups/borg/ /mnt/borg/\n\n# 3. Restore:\n$ borg extract --strip-components 1 \\\n  /mnt/borg::server-2025-05-09 \\\n  etc var/www home\n\n# 4. Configs anpassen, Services starten\n# 5. DNS umzeigen\n# 6. SSL-Zertifikate neu ausstellen</span>",note:"Einen Restore-Prozess VORHER üben — nicht erst wenn der Ernstfall eintritt!"}], warn:"Restore NIE auf das laufende Produktionssystem — erst auf Testserver, dann umschalten!", tags:["Backup","Restore","Recovery","Disaster Recovery"] }
    ]
  },

  "NFS & Samba": {
    icon: "📂",
    commands: [
      { name:"NFS Server", short:"Linux-Netzlaufwerke freigeben", desc:"NFS (Network File System) ermöglicht Linux-zu-Linux Dateifreigaben. Schnell, stabil, kein Overhead — Standard für Linux-Netzwerke und Container-Storage.", syntax:"<b>/etc/exports</b>  |  <b>exportfs</b>  |  <b>systemctl</b> nfs-server", options:[{flag:"/etc/exports",desc:"Freigaben konfigurieren"},{flag:"exportfs -a",desc:"Alle Freigaben aktivieren"},{flag:"exportfs -v",desc:"Aktive Freigaben anzeigen"},{flag:"exportfs -r",desc:"Freigaben neu einlesen"},{flag:"showmount -e localhost",desc:"Eigene Freigaben anzeigen"},{flag:"rw",desc:"Lesen und Schreiben erlaubt"},{flag:"ro",desc:"Nur lesend"},{flag:"sync",desc:"Synchrones Schreiben (sicherer)"},{flag:"no_subtree_check",desc:"Performance-Optimierung"},{flag:"no_root_squash",desc:"Root bleibt Root (Vorsicht!)"}], examples:[{title:"NFS-Server einrichten",code:"<span class='prompt'>$ </span>sudo apt install nfs-kernel-server -y\n\n<span class='comment'># /etc/exports</span>\n<span class='comment'># Syntax: Pfad  Client(Optionen)</span>\n/srv/share        192.168.1.0/24(rw,sync,no_subtree_check)\n/srv/readonly     192.168.1.0/24(ro,sync,no_subtree_check)\n/var/www          192.168.1.50(rw,sync,no_root_squash)\n\n<span class='prompt'>$ </span>sudo mkdir -p /srv/share\n<span class='prompt'>$ </span>sudo exportfs -a\n<span class='prompt'>$ </span>sudo systemctl enable --now nfs-server\n<span class='prompt'>$ </span>showmount -e localhost\n<span class='output'>Export list for localhost:\n/srv/share    192.168.1.0/24\n/srv/readonly 192.168.1.0/24</span>",note:"no_root_squash nur wenn der Client-Root auch Server-Root sein soll — sicherheitsrelevant."},{title:"Firewall für NFS öffnen",code:"<span class='prompt'>$ </span>sudo ufw allow from 192.168.1.0/24 to any port nfs\n<span class='comment'># NFS nutzt Port 2049 (TCP/UDP)</span>\n<span class='prompt'>$ </span>sudo ufw allow 2049",note:"NFS sollte niemals aus dem Internet erreichbar sein — nur im LAN verwenden."}], warn:"NFS hat keine eingebaute Verschlüsselung — für öffentliche Netzwerke NFS über SSH-Tunnel oder Samba mit Kerberos verwenden.", tags:["NFS","Netzwerk","Dateifreigabe","Linux"] },

      { name:"NFS Client", short:"NFS-Freigaben einbinden", desc:"NFS-Freigaben auf dem Client-System einbinden — temporär mit mount oder dauerhaft über /etc/fstab.", syntax:"<b>mount</b> <span class='arg-part'>server:/pfad /lokaler/pfad</span>  |  <b>/etc/fstab</b>", options:[{flag:"mount server:/share /mnt/nfs",desc:"NFS-Freigabe einbinden"},{flag:"mount -t nfs4",desc:"NFS Version 4 explizit"},{flag:"mount -o ro",desc:"Nur-Lesen einbinden"},{flag:"mount -o rw,soft,intr",desc:"Mit Timeout (soft) einbinden"},{flag:"df -h",desc:"Eingebundene Freigaben anzeigen"},{flag:"umount /mnt/nfs",desc:"Freigabe trennen"},{flag:"showmount -e server",desc:"Verfügbare Freigaben anzeigen"}], examples:[{title:"Manuell einbinden und testen",code:"<span class='prompt'>$ </span>sudo apt install nfs-common -y\n\n<span class='comment'># Verfügbare Freigaben anzeigen:</span>\n<span class='prompt'>$ </span>showmount -e 192.168.1.100\n<span class='output'>Export list for 192.168.1.100:\n/srv/share  192.168.1.0/24</span>\n\n<span class='comment'># Einbinden:</span>\n<span class='prompt'>$ </span>sudo mkdir /mnt/nfs-share\n<span class='prompt'>$ </span>sudo mount 192.168.1.100:/srv/share /mnt/nfs-share\n<span class='prompt'>$ </span>df -h | grep nfs\n<span class='output'>192.168.1.100:/srv/share  100G  20G  80G  20% /mnt/nfs-share</span>",note:"nfs-common muss auf dem Client installiert sein — enthält Mount-Unterstützung."},{title:"Dauerhaft via /etc/fstab",code:"<span class='comment'># /etc/fstab — Zeile hinzufügen:</span>\n192.168.1.100:/srv/share  /mnt/nfs-share  nfs  defaults,_netdev  0  0\n\n<span class='comment'># _netdev = erst einbinden wenn Netzwerk aktiv ist!</span>\n\n<span class='prompt'>$ </span>sudo mount -a\n<span class='output'># Kein Fehler = Eintrag korrekt</span>\n\n<span class='comment'># Mit Optionen:</span>\n192.168.1.100:/srv/share  /mnt/data  nfs  rw,soft,intr,timeo=30,_netdev  0  0",note:"_netdev verhindert Boot-Fehler wenn das Netzwerk beim Mounten noch nicht bereit ist."}], tags:["NFS","Mount","Client","Netzwerk"] },

      { name:"Samba Server", short:"Dateien mit Windows teilen", desc:"Samba ermöglicht Dateifreigaben zwischen Linux und Windows über das SMB/CIFS-Protokoll. Windows-PCs sehen Linux-Freigaben wie normale Netzlaufwerke.", syntax:"<b>/etc/samba/smb.conf</b>  |  <b>smbpasswd</b>  |  <b>testparm</b>", options:[{flag:"testparm",desc:"Konfiguration auf Fehler prüfen"},{flag:"smbpasswd -a user",desc:"Samba-Passwort für User setzen"},{flag:"smbpasswd -e user",desc:"User aktivieren"},{flag:"pdbedit -L",desc:"Alle Samba-User auflisten"},{flag:"smbstatus",desc:"Aktive Verbindungen anzeigen"},{flag:"systemctl restart smbd nmbd",desc:"Samba-Services neu starten"}], examples:[{title:"Samba installieren und konfigurieren",code:"<span class='prompt'>$ </span>sudo apt install samba -y\n\n<span class='comment'># /etc/samba/smb.conf — am Ende hinzufügen:</span>\n[global]\n   workgroup = WORKGROUP\n   server string = Mein Linux Server\n   security = user\n   map to guest = bad user\n\n[Daten]\n   path = /srv/samba/daten\n   browseable = yes\n   writable = yes\n   valid users = sambauser\n   create mask = 0644\n   directory mask = 0755\n\n[Public]\n   path = /srv/samba/public\n   browseable = yes\n   writable = yes\n   guest ok = yes\n   create mask = 0666\n\n<span class='prompt'>$ </span>sudo mkdir -p /srv/samba/{daten,public}\n<span class='prompt'>$ </span>sudo chmod 777 /srv/samba/public\n<span class='prompt'>$ </span>testparm\n<span class='output'>Loaded services file OK.</span>\n<span class='prompt'>$ </span>sudo systemctl restart smbd",note:"testparm prüft smb.conf auf Syntaxfehler — immer vor dem Neustart aufrufen."},{title:"Samba-User anlegen",code:"<span class='comment'># Linux-User erstellen (ohne Login):</span>\n<span class='prompt'>$ </span>sudo useradd -M -s /sbin/nologin sambauser\n\n<span class='comment'># Samba-Passwort setzen:</span>\n<span class='prompt'>$ </span>sudo smbpasswd -a sambauser\n<span class='output'>New SMB password: ****\nAdded user sambauser.</span>\n\n<span class='comment'># Firewall:</span>\n<span class='prompt'>$ </span>sudo ufw allow samba\n\n<span class='comment'># Verbindung testen von Linux:</span>\n<span class='prompt'>$ </span>smbclient //localhost/Daten -U sambauser",note:"Samba hat eigene Passwort-Datenbank — separates Passwort von Linux-Login möglich."}], tip:"Samba als Active Directory Domain Controller möglich (samba-ad-dc) — für Unternehmens-Netzwerke mit zentraler Authentifizierung.", tags:["Samba","SMB","Windows","Dateifreigabe"] },

      { name:"Samba Client", short:"Windows-Freigaben von Linux nutzen", desc:"Von Linux aus auf Windows-Freigaben (oder andere Samba-Server) zugreifen — mit smbclient, mount.cifs oder im Dateimanager.", syntax:"<b>smbclient</b>  |  <b>mount -t cifs</b>", options:[{flag:"smbclient -L //server",desc:"Verfügbare Freigaben auflisten"},{flag:"smbclient //server/share -U user",desc:"Interaktive FTP-ähnliche Shell"},{flag:"mount -t cifs //server/share /mnt -o user=X,pass=Y",desc:"Dauerhaft einbinden"},{flag:"//server/share /mnt cifs credentials=/etc/samba/creds",desc:"Credentials-Datei für /etc/fstab"},{flag:"get datei",desc:"(in smbclient) Datei herunterladen"},{flag:"put datei",desc:"(in smbclient) Datei hochladen"}], examples:[{title:"Windows-Freigabe einbinden",code:"<span class='prompt'>$ </span>sudo apt install cifs-utils -y\n\n<span class='comment'># Temporär einbinden:</span>\n<span class='prompt'>$ </span>sudo mount -t cifs //192.168.1.10/Dokumente /mnt/windows \\\n  -o username=max,password=geheim,vers=3.0\n\n<span class='comment'># Credentials-Datei (sicherer):</span>\n<span class='comment'># /etc/samba/creds-windows</span>\nusername=max\npassword=geheim\ndomain=WORKGROUP\n\n<span class='prompt'>$ </span>chmod 600 /etc/samba/creds-windows\n\n<span class='comment'># /etc/fstab:</span>\n//192.168.1.10/Dokumente  /mnt/windows  cifs  credentials=/etc/samba/creds-windows,_netdev  0  0",note:"Credentials-Datei statt Passwort im Klartext in /etc/fstab — Pflicht für Sicherheit."},{title:"smbclient interaktiv",code:"<span class='prompt'>$ </span>smbclient //192.168.1.10/Dokumente -U max\n<span class='output'>smb: \\&gt; ls\n  .                 D  0  Mon Jan  1 10:00:00 2025\n  Bericht.docx      A  24576  Fri Dec 31 09:00:00 2024\n\nsmb: \\&gt; get Bericht.docx\nsmb: \\&gt; exit</span>",note:"smbclient funktioniert wie ein FTP-Client — gut zum Testen ohne mount."}], tags:["Samba","CIFS","Windows","Mount"] }
    ]
  },

  "Ansible": {
    icon: "🤖",
    commands: [
      { name:"Ansible Grundlagen", short:"Infrastruktur automatisieren", desc:"Ansible konfiguriert Server automatisch über SSH — kein Agent nötig. YAML-Playbooks beschreiben den gewünschten Zustand. Idempotent: mehrfach ausführbar ohne Nebenwirkungen.", syntax:"<b>ansible</b>  |  <b>ansible-playbook</b>  |  <b>ansible-galaxy</b>", options:[{flag:"ansible all -m ping",desc:"Alle Hosts anpingen"},{flag:"ansible webserver -m shell -a 'uptime'",desc:"Befehl auf Gruppe ausführen"},{flag:"ansible-playbook playbook.yml",desc:"Playbook ausführen"},{flag:"ansible-playbook -i inventory playbook.yml",desc:"Mit eigenem Inventory"},{flag:"ansible-playbook --check playbook.yml",desc:"Dry-Run — keine echten Änderungen"},{flag:"ansible-playbook --diff playbook.yml",desc:"Zeigt was sich ändern würde"},{flag:"ansible-playbook -v / -vvv",desc:"Verbose-Ausgabe"}], examples:[{title:"Installation",code:"<span class='prompt'>$ </span>sudo apt install ansible -y\n<span class='comment'># oder via pip (neuere Version):</span>\n<span class='prompt'>$ </span>pip install ansible\n<span class='prompt'>$ </span>ansible --version\n<span class='output'>ansible [core 2.16.0]</span>",note:"Ansible braucht nur auf der Steuermaschine installiert zu sein — nicht auf den Ziel-Servern."},{title:"Ersten Ping-Test",code:"<span class='comment'># /etc/ansible/hosts (Inventory):</span>\n[webserver]\n192.168.1.100\n192.168.1.101\n\n[dbserver]\ndb.meinsite.de\n\n<span class='prompt'>$ </span>ansible all -m ping\n<span class='output'>192.168.1.100 | SUCCESS => {\"ping\": \"pong\"}\n192.168.1.101 | SUCCESS => {\"ping\": \"pong\"}\ndb.meinsite.de | SUCCESS => {\"ping\": \"pong\"}</span>",note:"Ansible verbindet per SSH — SSH-Keys müssen eingerichtet sein."}], tip:"ansible-doc -l listet alle verfügbaren Module auf. ansible-doc apt zeigt Dokumentation des apt-Moduls.", tags:["Ansible","DevOps","Automatisierung","IaC"] },

      { name:"Inventory", short:"Server-Gruppen definieren", desc:"Das Inventory definiert welche Server Ansible kennt und verwaltet. Hosts können in Gruppen zusammengefasst werden. Variablen pro Host oder Gruppe möglich.", syntax:"<b>/etc/ansible/hosts</b>  |  <b>-i inventory.yml</b>", options:[{flag:"[gruppe]",desc:"Gruppe von Hosts definieren"},{flag:"ansible_host=IP",desc:"Tatsächliche IP/Hostname"},{flag:"ansible_user=admin",desc:"SSH-Benutzer"},{flag:"ansible_port=2222",desc:"Abweichender SSH-Port"},{flag:"ansible_ssh_private_key_file=~/.ssh/id_ed25519",desc:"SSH-Key"},{flag:"[gruppe:vars]",desc:"Variablen für eine Gruppe"},{flag:"ansible-inventory --list",desc:"Inventory als JSON anzeigen"},{flag:"ansible-inventory --graph",desc:"Inventory als Baum anzeigen"}], examples:[{title:"Strukturiertes Inventory",code:"<span class='comment'># inventory.yml (YAML-Format — moderner)</span>\nall:\n  children:\n    webserver:\n      hosts:\n        web1:\n          ansible_host: 192.168.1.100\n          ansible_user: admin\n        web2:\n          ansible_host: 192.168.1.101\n          ansible_user: admin\n      vars:\n        nginx_port: 80\n\n    dbserver:\n      hosts:\n        db1:\n          ansible_host: 192.168.1.200\n          ansible_user: deploy\n          ansible_port: 2222\n\n<span class='prompt'>$ </span>ansible-inventory -i inventory.yml --graph\n<span class='output'>@all:\n  |--@webserver:\n  |  |--web1\n  |  |--web2\n  |--@dbserver:\n  |  |--db1</span>",note:"YAML-Inventory ist übersichtlicher als INI-Format bei vielen Hosts."},{title:"Einzelnen Host testen",code:"<span class='prompt'>$ </span>ansible -i inventory.yml web1 -m shell -a 'hostname && uptime'\n<span class='output'>web1 | SUCCESS | rc=0 >>\nmein-webserver\n 14:23:01 up 42 days, 3:12,  1 user,  load average: 0.08</span>",note:"-m shell -a 'Befehl' führt beliebige Befehle auf dem Ziel-Host aus."}], tags:["Ansible","Inventory","DevOps"] },

      { name:"Playbooks", short:"Automatisierungs-Skripte in YAML", desc:"Playbooks beschreiben was Ansible auf den Servern tun soll — in YAML. Tasks nutzen Module (apt, copy, service, user...) und sind idempotent.", syntax:"<b>ansible-playbook</b> <span class='arg-part'>playbook.yml</span>", options:[{flag:"hosts:",desc:"Auf welchen Hosts ausführen"},{flag:"become: yes",desc:"sudo verwenden"},{flag:"tasks:",desc:"Liste der Aufgaben"},{flag:"name:",desc:"Beschreibung des Tasks"},{flag:"notify:",desc:"Handler auslösen wenn Task Änderungen macht"},{flag:"handlers:",desc:"Aktionen die nur bei Änderung laufen (z.B. reload nginx)"},{flag:"vars:",desc:"Variablen im Playbook"},{flag:"when:",desc:"Bedingte Ausführung"},{flag:"loop:",desc:"Task für jedes Item wiederholen"}], examples:[{title:"Webserver-Setup Playbook",code:"<span class='comment'># webserver.yml</span>\n---\n- name: Webserver einrichten\n  hosts: webserver\n  become: yes\n\n  vars:\n    domain: meinsite.de\n    webroot: /var/www/{{ domain }}\n\n  tasks:\n    - name: Nginx installieren\n      apt:\n        name: nginx\n        state: present\n        update_cache: yes\n\n    - name: Web-Verzeichnis erstellen\n      file:\n        path: '{{ webroot }}'\n        state: directory\n        mode: '0755'\n\n    - name: Index-Seite kopieren\n      copy:\n        content: '&lt;h1&gt;{{ domain }}&lt;/h1&gt;'\n        dest: '{{ webroot }}/index.html'\n      notify: Nginx reload\n\n    - name: Nginx starten\n      service:\n        name: nginx\n        state: started\n        enabled: yes\n\n  handlers:\n    - name: Nginx reload\n      service:\n        name: nginx\n        state: reloaded\n\n<span class='prompt'>$ </span>ansible-playbook -i inventory.yml webserver.yml\n<span class='output'>PLAY [Webserver einrichten]\nTASK [Nginx installieren]  ok\nTASK [Web-Verzeichnis erstellen]  changed\nTASK [Index-Seite kopieren]  changed\nTASK [Nginx starten]  ok\nRUNNING HANDLER [Nginx reload]  changed</span>",note:"'changed' = Aktion ausgeführt, 'ok' = bereits im Soll-Zustand. Handler läuft nur wenn ein Task 'changed' war."}], tip:"ansible-playbook --check --diff zeigt was sich ändern würde ohne echte Änderungen — immer vor dem ersten Ausführen!", tags:["Ansible","Playbook","YAML","DevOps"] },

      { name:"Ansible Vault", short:"Geheimnisse verschlüsseln", desc:"Ansible Vault verschlüsselt sensible Daten (Passwörter, API-Keys) in Playbooks und Variablendateien. AES-256-Verschlüsselung direkt in Git-Repos speicherbar.", syntax:"<b>ansible-vault</b> <span class='opt-part'>create|encrypt|decrypt|edit|view</span>", options:[{flag:"ansible-vault create secrets.yml",desc:"Neue verschlüsselte Datei erstellen"},{flag:"ansible-vault encrypt datei.yml",desc:"Bestehende Datei verschlüsseln"},{flag:"ansible-vault decrypt datei.yml",desc:"Entschlüsseln"},{flag:"ansible-vault edit secrets.yml",desc:"Verschlüsselte Datei bearbeiten"},{flag:"ansible-vault view secrets.yml",desc:"Inhalt anzeigen ohne zu entschlüsseln"},{flag:"ansible-vault encrypt_string 'secret'",desc:"Einzelnen Wert verschlüsseln"},{flag:"--ask-vault-pass",desc:"Passwort interaktiv abfragen"},{flag:"--vault-password-file ~/.vault_pass",desc:"Passwort aus Datei lesen"}], examples:[{title:"Secrets verschlüsseln",code:"<span class='comment'># Verschlüsselte Variablendatei erstellen:</span>\n<span class='prompt'>$ </span>ansible-vault create group_vars/all/vault.yml\n<span class='comment'># Editor öffnet sich — Inhalt eingeben:</span>\nvault_db_password: 'sicheresPasswort123!'\nvault_api_key: 'sk-abc123xyz...'\n\n<span class='comment'># Im Playbook verwenden:</span>\n<span class='comment'># vars_files:</span>\n<span class='comment'>#   - group_vars/all/vault.yml</span>\n<span class='comment'># tasks:</span>\n<span class='comment'>#   - name: DB konfigurieren</span>\n<span class='comment'>#     template: ...</span>\n<span class='comment'>#     vars:</span>\n<span class='comment'>#       password: '{{ vault_db_password }}'</span>\n\n<span class='comment'># Playbook mit Vault ausführen:</span>\n<span class='prompt'>$ </span>ansible-playbook playbook.yml --ask-vault-pass",note:"vault.yml ist verschlüsselt und kann sicher in Git committet werden."},{title:"Einzelnen Wert verschlüsseln",code:"<span class='prompt'>$ </span>ansible-vault encrypt_string 'meinGeheimnis' --name 'db_password'\n<span class='output'>db_password: !vault |\n          $ANSIBLE_VAULT;1.1;AES256\n          34623834386162333331...\n          ...\nEncryption successful</span>\n<span class='comment'># Diesen Block direkt in vars: einfügen</span>",note:"!vault markiert einzelne verschlüsselte Werte — Rest des Playbooks bleibt im Klartext."}], warn:"Vault-Passwort sicher aufbewahren — ohne es sind alle verschlüsselten Secrets unwiederbringlich verloren!", tags:["Ansible","Vault","Sicherheit","Secrets"] }
    ]
  },

  "Kubernetes / K3s": {
    icon: "☸️",
    commands: [
      { name:"Kubernetes Grundlagen", short:"Container-Orchestrierung verstehen", desc:"Kubernetes (K8s) automatisiert Deployment, Skalierung und Verwaltung von Container-Anwendungen. K3s ist eine leichtgewichtige Distribution ideal für kleine Server und Homelab.", syntax:"<b>kubectl</b> <span class='opt-part'>[Befehl]</span> <span class='opt-part'>[Ressource]</span>", options:[{flag:"Pod",desc:"Kleinste Einheit — 1+ Container"},{flag:"Deployment",desc:"Verwaltet Pods, Rollouts, Replicas"},{flag:"Service",desc:"Netzwerk-Endpunkt für Pods"},{flag:"Namespace",desc:"Logische Trennung im Cluster"},{flag:"ConfigMap",desc:"Konfigurationsdaten"},{flag:"Secret",desc:"Verschlüsselte sensible Daten"},{flag:"Ingress",desc:"HTTP-Routing von außen in den Cluster"},{flag:"PersistentVolume",desc:"Dauerhafter Speicher für Pods"}], examples:[{title:"K3s installieren (Single-Node)",code:"<span class='comment'># K3s installieren (alles in einem Befehl):</span>\n<span class='prompt'>$ </span>curl -sfL https://get.k3s.io | sh -\n<span class='output'>[INFO] Finding release for channel stable\n[INFO] Downloading k3s v1.29.0+k3s1\n[INFO] systemd: Starting k3s</span>\n\n<span class='comment'># Cluster prüfen:</span>\n<span class='prompt'>$ </span>sudo k3s kubectl get nodes\n<span class='output'>NAME       STATUS   ROLES                  AGE   VERSION\nmeinhost   Ready    control-plane,master   1m    v1.29.0</span>\n\n<span class='comment'># kubectl als normaler User nutzen:</span>\n<span class='prompt'>$ </span>mkdir ~/.kube\n<span class='prompt'>$ </span>sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config\n<span class='prompt'>$ </span>sudo chown $USER ~/.kube/config\n<span class='prompt'>$ </span>kubectl get nodes",note:"K3s ist vollständiges Kubernetes in einer einzigen Binary — perfekt für Server mit 1-2 GB RAM."},{title:"Cluster-Überblick",code:"<span class='prompt'>$ </span>kubectl cluster-info\n<span class='output'>Kubernetes control plane is running at https://127.0.0.1:6443</span>\n\n<span class='prompt'>$ </span>kubectl get all --all-namespaces\n<span class='output'>NAMESPACE     NAME                    READY  STATUS   AGE\nkube-system   pod/coredns-...         1/1    Running  5m\nkube-system   pod/traefik-...         1/1    Running  5m</span>",note:"K3s liefert Traefik als Ingress-Controller mit — sofort einsatzbereit."}], tip:"k9s (k9s-installer.io) ist ein Terminal-Dashboard für Kubernetes — viel übersichtlicher als kubectl get all.", tags:["Kubernetes","K3s","Container","DevOps"] },

      { name:"kubectl Grundbefehle", short:"Kubernetes über die CLI steuern", desc:"kubectl ist das Hauptwerkzeug für die Kubernetes-Verwaltung. Ressourcen erstellen, inspizieren, skalieren und löschen.", syntax:"<b>kubectl</b> <span class='opt-part'>get|describe|apply|delete|logs|exec</span>", options:[{flag:"kubectl get pods",desc:"Alle Pods im aktuellen Namespace"},{flag:"kubectl get pods -A",desc:"Pods in allen Namespaces"},{flag:"kubectl describe pod NAME",desc:"Detailinfos zu einem Pod"},{flag:"kubectl logs pod-name",desc:"Pod-Logs anzeigen"},{flag:"kubectl logs -f pod-name",desc:"Logs live verfolgen"},{flag:"kubectl exec -it pod -- bash",desc:"Shell im Pod öffnen"},{flag:"kubectl apply -f datei.yml",desc:"Ressource aus YAML erstellen/updaten"},{flag:"kubectl delete -f datei.yml",desc:"Ressource löschen"},{flag:"kubectl scale deployment NAME --replicas=3",desc:"Skalieren"}], examples:[{title:"Pods und Deployments verwalten",code:"<span class='comment'># Alle Ressourcen anzeigen:</span>\n<span class='prompt'>$ </span>kubectl get pods,deployments,services\n<span class='output'>NAME                     READY  STATUS   AGE\npod/nginx-7d6b5f-abc     1/1    Running  5m\n\nNAME                  READY  UP-TO-DATE  AVAILABLE\ndeployment.apps/nginx  1/1    1           1\n\nNAME            TYPE       CLUSTER-IP    PORT(S)\nservice/nginx   ClusterIP  10.43.100.50  80/TCP</span>\n\n<span class='comment'># In Pod debuggen:</span>\n<span class='prompt'>$ </span>kubectl exec -it pod/nginx-7d6b5f-abc -- bash\n<span class='output'>root@nginx-7d6b5f-abc:/# nginx -v\nnginx version: nginx/1.25.3</span>",note:"kubectl exec -it ... -- bash öffnet eine Shell direkt im laufenden Container."},{title:"Deployment skalieren und updaten",code:"<span class='comment'># Auf 3 Replicas skalieren:</span>\n<span class='prompt'>$ </span>kubectl scale deployment nginx --replicas=3\n<span class='prompt'>$ </span>kubectl get pods\n<span class='output'>nginx-7d6b5f-abc  1/1  Running\nnginx-7d6b5f-def  1/1  Running\nnginx-7d6b5f-ghi  1/1  Running</span>\n\n<span class='comment'># Rolling Update auf neue Image-Version:</span>\n<span class='prompt'>$ </span>kubectl set image deployment/nginx nginx=nginx:1.26\n<span class='prompt'>$ </span>kubectl rollout status deployment/nginx\n<span class='output'>Waiting for deployment: 1 out of 3 new replicas updated...\ndeployment successfully rolled out</span>\n\n<span class='comment'># Rollback:</span>\n<span class='prompt'>$ </span>kubectl rollout undo deployment/nginx",note:"Rolling Update ersetzt Pods nacheinander — kein Downtime."}], tags:["Kubernetes","kubectl","Container","DevOps"] },

      { name:"YAML-Manifeste", short:"Kubernetes-Ressourcen deklarativ", desc:"Kubernetes-Ressourcen werden in YAML-Dateien deklariert. kubectl apply -f wendet sie an — idempotent und versionierbar in Git.", syntax:"<b>kubectl apply -f</b> <span class='arg-part'>manifest.yml</span>", options:[{flag:"apiVersion:",desc:"API-Version der Ressource"},{flag:"kind:",desc:"Ressourcentyp (Pod, Deployment, Service...)"},{flag:"metadata:",desc:"Name, Labels, Namespace"},{flag:"spec:",desc:"Spezifikation der Ressource"},{flag:"kubectl apply -f .",desc:"Alle YAMLs im Verzeichnis anwenden"},{flag:"kubectl apply -f https://...",desc:"Direkt von URL anwenden"},{flag:"kubectl diff -f manifest.yml",desc:"Unterschied zum aktuellen Zustand"}], examples:[{title:"Nginx Deployment + Service",code:"<span class='comment'># nginx.yml</span>\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: nginx\n  labels:\n    app: nginx\nspec:\n  replicas: 2\n  selector:\n    matchLabels:\n      app: nginx\n  template:\n    metadata:\n      labels:\n        app: nginx\n    spec:\n      containers:\n      - name: nginx\n        image: nginx:1.25\n        ports:\n        - containerPort: 80\n        resources:\n          requests:\n            memory: '64Mi'\n            cpu: '50m'\n          limits:\n            memory: '128Mi'\n            cpu: '200m'\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: nginx\nspec:\n  selector:\n    app: nginx\n  ports:\n  - port: 80\n    targetPort: 80\n\n<span class='prompt'>$ </span>kubectl apply -f nginx.yml\n<span class='output'>deployment.apps/nginx created\nservice/nginx created</span>",note:"--- trennt mehrere Ressourcen in einer YAML-Datei — alles mit einem Befehl anwenden."},{title:"ConfigMap und Secret",code:"<span class='comment'># ConfigMap für Konfiguration:</span>\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: app-config\ndata:\n  APP_ENV: production\n  LOG_LEVEL: info\n---\n<span class='comment'># Secret für Passwörter (base64-kodiert):</span>\napiVersion: v1\nkind: Secret\nmetadata:\n  name: db-secret\ntype: Opaque\ndata:\n  password: c2ljaGVyZXNQYXNzd29ydA==  # base64\n\n<span class='comment'># base64 erstellen:</span>\n<span class='prompt'>$ </span>echo -n 'sicheresPasswort' | base64\n<span class='output'>c2ljaGVyZXNQYXNzd29ydA==</span>",note:"Secrets sind nur base64-kodiert, nicht verschlüsselt — für echte Verschlüsselung: Sealed Secrets oder Vault."}], tags:["Kubernetes","YAML","Deployment","DevOps"] },

      { name:"Helm", short:"Kubernetes Paketmanager", desc:"Helm ist der Paketmanager für Kubernetes. Charts bündeln alle YAML-Manifeste einer Anwendung. Mit einem Befehl komplexe Stacks wie Prometheus, WordPress oder cert-manager installieren.", syntax:"<b>helm</b> <span class='opt-part'>install|upgrade|list|uninstall</span>", options:[{flag:"helm repo add NAME URL",desc:"Chart-Repository hinzufügen"},{flag:"helm repo update",desc:"Repository-Liste aktualisieren"},{flag:"helm search repo NAME",desc:"Chart suchen"},{flag:"helm install NAME CHART",desc:"Chart installieren"},{flag:"helm install NAME CHART -f values.yml",desc:"Mit eigenen Werten"},{flag:"helm upgrade NAME CHART",desc:"Auf neue Version updaten"},{flag:"helm list",desc:"Alle installierten Charts"},{flag:"helm uninstall NAME",desc:"Chart deinstallieren"},{flag:"helm show values CHART",desc:"Alle konfigurierbaren Werte anzeigen"}], examples:[{title:"Prometheus + Grafana via Helm",code:"<span class='comment'># Helm installieren:</span>\n<span class='prompt'>$ </span>curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash\n\n<span class='comment'># Prometheus-Community Repository:</span>\n<span class='prompt'>$ </span>helm repo add prometheus-community https://prometheus-community.github.io/helm-charts\n<span class='prompt'>$ </span>helm repo update\n\n<span class='comment'># Prometheus-Stack installieren (inkl. Grafana):</span>\n<span class='prompt'>$ </span>helm install monitoring prometheus-community/kube-prometheus-stack\n<span class='output'>NAME: monitoring\nNAMESPACE: default\nSTATUS: deployed</span>\n\n<span class='prompt'>$ </span>kubectl get pods\n<span class='output'>prometheus-...   2/2  Running\ngrafana-...      1/1  Running\nalertmanager-... 2/2  Running</span>",note:"kube-prometheus-stack installiert Prometheus, Grafana und Alertmanager auf einmal."},{title:"Eigene values.yml",code:"<span class='comment'># Grafana-Passwort und Ingress konfigurieren:</span>\n<span class='comment'># values.yml</span>\ngrafana:\n  adminPassword: meinSicheresPasswort\n  ingress:\n    enabled: true\n    hosts:\n      - grafana.meinsite.de\n\n<span class='prompt'>$ </span>helm upgrade monitoring prometheus-community/kube-prometheus-stack \\\n  -f values.yml",note:"values.yml überschreibt Chart-Defaults — in Git versionierbar und reproduzierbar."}], tip:"artifacthub.io — die offizielle Helm-Chart-Suche. Tausende Charts für jede populäre Software.", tags:["Kubernetes","Helm","DevOps","Paketmanager"] }
    ]
  },

  "PostgreSQL": {
    icon: "🐘",
    commands: [
      { name:"PostgreSQL Installation", short:"PostgreSQL installieren und einrichten", desc:"PostgreSQL ist die mächtigste Open-Source-Datenbank. ACID-konform, JSON-Support, Window Functions, und voll SQL-standards-konform. Besser als MySQL für komplexe Abfragen.", syntax:"<b>psql</b>  |  <b>pg_dump</b>  |  <b>/etc/postgresql/</b>", options:[{flag:"sudo -u postgres psql",desc:"Als postgres-User einloggen"},{flag:"psql -U user -d datenbank",desc:"Direkt mit User und DB"},{flag:"psql -h host -p 5432",desc:"Remote-Verbindung"},{flag:"\\l",desc:"(psql) Alle Datenbanken auflisten"},{flag:"\\c dbname",desc:"(psql) Datenbank wechseln"},{flag:"\\dt",desc:"(psql) Alle Tabellen anzeigen"},{flag:"\\du",desc:"(psql) Alle User/Rollen anzeigen"},{flag:"\\q",desc:"(psql) Beenden"}], examples:[{title:"Installation und Erstkonfiguration",code:"<span class='prompt'>$ </span>sudo apt install postgresql postgresql-contrib -y\n<span class='prompt'>$ </span>sudo systemctl enable --now postgresql\n<span class='prompt'>$ </span>sudo -u postgres psql\n<span class='output'>psql (16.0)\nType 'help' for help.\n\npostgres=#</span>\n\n<span class='comment'># Datenbank und User für App anlegen:</span>\n<span class='output'>postgres=# </span>CREATE DATABASE meinapp;\n<span class='output'>postgres=# </span>CREATE USER appuser WITH ENCRYPTED PASSWORD 'sicheresPasswort!';\n<span class='output'>postgres=# </span>GRANT ALL PRIVILEGES ON DATABASE meinapp TO appuser;\n<span class='output'>postgres=# </span>\\q",note:"PostgreSQL hat einen eigenen 'postgres' System-User — alle Admin-Aktionen als dieser User."},{title:"Verbindung testen",code:"<span class='prompt'>$ </span>psql -U appuser -d meinapp -h localhost\n<span class='output'>Password for user appuser: ****\nmeinapp=></span>\n\n<span class='comment'># Schnelltest ohne interaktiv einzuloggen:</span>\n<span class='prompt'>$ </span>psql -U appuser -d meinapp -c 'SELECT version();'\n<span class='output'>                     version\nPostgreSQL 16.0 on x86_64-pc-linux-gnu</span>",note:"-c 'SQL' führt eine Query direkt aus — gut für Scripts und Monitoring."}], tags:["PostgreSQL","Datenbank","SQL"] },

      { name:"psql & SQL", short:"Datenbank verwalten mit psql", desc:"psql ist der interaktive PostgreSQL-Client. Neben SQL-Befehlen hat psql eigene Meta-Befehle (beginnen mit \\) für Administration.", syntax:"<b>psql</b>  |  <b>\\Befehle</b>  |  <b>SQL</b>", options:[{flag:"\\l",desc:"Alle Datenbanken"},{flag:"\\c dbname",desc:"Datenbank wechseln"},{flag:"\\dt",desc:"Alle Tabellen"},{flag:"\\d tablename",desc:"Tabellen-Schema anzeigen"},{flag:"\\du",desc:"Alle Rollen/User"},{flag:"\\timing",desc:"Query-Laufzeit anzeigen"},{flag:"\\e",desc:"Editor öffnen für längere Queries"},{flag:"\\i datei.sql",desc:"SQL-Datei ausführen"},{flag:"\\copy",desc:"CSV import/export"}], examples:[{title:"Tabelle erstellen und Daten einfügen",code:"<span class='output'>meinapp=> </span>CREATE TABLE users (\n    id        SERIAL PRIMARY KEY,\n    username  VARCHAR(50) UNIQUE NOT NULL,\n    email     TEXT NOT NULL,\n    created   TIMESTAMP DEFAULT NOW()\n);\n\n<span class='output'>meinapp=> </span>INSERT INTO users (username, email)\n          VALUES ('max', 'max@beispiel.de'),\n                 ('anna', 'anna@beispiel.de');\n\n<span class='output'>meinapp=> </span>SELECT * FROM users;\n<span class='output'> id | username |       email        |         created\n----+----------+--------------------+-------------------------\n  1 | max      | max@beispiel.de    | 2025-05-10 14:23:01.123\n  2 | anna     | anna@beispiel.de   | 2025-05-10 14:23:01.124</span>",note:"SERIAL ist auto-increment in PostgreSQL. UUID als Primary Key auch möglich: gen_random_uuid()."},{title:"CSV importieren",code:"<span class='comment'># CSV direkt in Tabelle laden:</span>\n<span class='output'>meinapp=> </span>\\copy users(username,email) FROM '/tmp/users.csv' CSV HEADER;\n\n<span class='comment'># Tabelle als CSV exportieren:</span>\n<span class='output'>meinapp=> </span>\\copy users TO '/tmp/users_export.csv' CSV HEADER;\n\n<span class='comment'># Abfrage als CSV:</span>\n<span class='prompt'>$ </span>psql -U appuser -d meinapp -c '\\copy (SELECT * FROM users WHERE created > NOW() - INTERVAL '7 days') TO /tmp/neue_user.csv CSV HEADER'",note:"\\copy (mit Backslash) läuft auf dem Client — \\COPY (ohne Backslash) auf dem Server."}], tags:["PostgreSQL","psql","SQL","Datenbank"] },

      { name:"pg_dump & Backup", short:"PostgreSQL-Datenbanken sichern", desc:"pg_dump erstellt konsistente Backups ohne die Datenbank zu sperren. pg_dumpall sichert alle Datenbanken inkl. Rollen. pg_restore stellt sie wieder her.", syntax:"<b>pg_dump</b>  |  <b>pg_dumpall</b>  |  <b>pg_restore</b>", options:[{flag:"pg_dump dbname > backup.sql",desc:"SQL-Format (lesbar)"},{flag:"pg_dump -Fc dbname > backup.dump",desc:"Custom-Format (komprimiert, schnellerer Restore)"},{flag:"pg_dump -Fd -f backupdir/ dbname",desc:"Directory-Format (parallel möglich)"},{flag:"pg_dumpall > all_databases.sql",desc:"Alle DBs + Rollen sichern"},{flag:"pg_restore -d dbname backup.dump",desc:"Custom-Format wiederherstellen"},{flag:"pg_restore -j 4",desc:"Mit 4 parallelen Threads (Directory-Format)"}], examples:[{title:"Tägliches Backup-Script",code:"<span class='comment'># /usr/local/bin/pg-backup.sh</span>\n#!/bin/bash\nBACKUP_DIR='/var/backups/postgresql'\nDATE=$(date +%Y-%m-%d)\nmkdir -p $BACKUP_DIR\n\n<span class='comment'># Alle Datenbanken sichern:</span>\nsudo -u postgres pg_dumpall | gzip > $BACKUP_DIR/all_$DATE.sql.gz\n\n<span class='comment'># Einzelne DB im Custom-Format:</span>\nsudo -u postgres pg_dump -Fc meinapp > $BACKUP_DIR/meinapp_$DATE.dump\n\n<span class='comment'># Alte Backups löschen (30 Tage):</span>\nfind $BACKUP_DIR -mtime +30 -delete\n\necho 'Backup fertig: '$DATE\n\n<span class='prompt'>$ </span>chmod +x /usr/local/bin/pg-backup.sh\n<span class='prompt'>$ </span>echo '0 3 * * * root /usr/local/bin/pg-backup.sh' | sudo tee /etc/cron.d/pg-backup",note:"-Fc (Custom Format) ist komprimiert und erlaubt selektiven Restore einzelner Tabellen."},{title:"Restore",code:"<span class='comment'># Aus SQL-Dump:</span>\n<span class='prompt'>$ </span>sudo -u postgres psql -d meinapp < backup.sql\n\n<span class='comment'># Aus komprimiertem Dump:</span>\n<span class='prompt'>$ </span>zcat all_2025-05-09.sql.gz | sudo -u postgres psql\n\n<span class='comment'># Custom-Format (schneller, mit Fortschritt):</span>\n<span class='prompt'>$ </span>sudo -u postgres pg_restore -d meinapp -v meinapp_2025-05-09.dump\n\n<span class='comment'># Nur bestimmte Tabelle:</span>\n<span class='prompt'>$ </span>sudo -u postgres pg_restore -d meinapp -t users meinapp_2025-05-09.dump",note:"-v (verbose) zeigt jede wiederhergestellte Tabelle — gut um den Fortschritt zu sehen."}], tags:["PostgreSQL","Backup","pg_dump","Datenbank"] },

      { name:"pg_hba.conf & Rollen", short:"Authentifizierung und Berechtigungen", desc:"pg_hba.conf steuert wer sich von wo verbinden darf. Rollen (Roles) sind PostgreSQLs System für Benutzer und Gruppen mit feingranularen Berechtigungen.", syntax:"<b>/etc/postgresql/16/main/pg_hba.conf</b>", options:[{flag:"peer",desc:"Linux-User = DB-User (nur lokal)"},{flag:"md5",desc:"Passwort-Authentifizierung (veraltet)"},{flag:"scram-sha-256",desc:"Modernes Passwort-Hashing (empfohlen)"},{flag:"trust",desc:"Kein Passwort (nur für localhost/Dev)"},{flag:"GRANT SELECT ON TABLE",desc:"Lese-Berechtigung auf Tabelle"},{flag:"GRANT ALL PRIVILEGES ON ALL TABLES",desc:"Vollzugriff auf alle Tabellen"},{flag:"CREATE ROLE readonly",desc:"Rollen-basiertes Zugriffskonzept"},{flag:"REVOKE",desc:"Berechtigungen entziehen"}], examples:[{title:"pg_hba.conf konfigurieren",code:"<span class='comment'># /etc/postgresql/16/main/pg_hba.conf</span>\n<span class='comment'># TYPE   DATABASE    USER        ADDRESS          METHOD</span>\nlocal    all         postgres                     peer\nlocal    all         all                          scram-sha-256\nhost     all         all         127.0.0.1/32     scram-sha-256\nhost     meinapp     appuser     192.168.1.0/24   scram-sha-256\n<span class='comment'># Kein Zugriff von 0.0.0.0 — nur explizite Netze!</span>\n\n<span class='prompt'>$ </span>sudo systemctl reload postgresql",note:"Nach pg_hba.conf-Änderungen reload reicht — kein Neustart nötig."},{title:"Read-only Rolle für Monitoring",code:"<span class='output'>postgres=# </span>CREATE ROLE readonly;\n<span class='output'>postgres=# </span>GRANT CONNECT ON DATABASE meinapp TO readonly;\n<span class='output'>postgres=# </span>GRANT USAGE ON SCHEMA public TO readonly;\n<span class='output'>postgres=# </span>GRANT SELECT ON ALL TABLES IN SCHEMA public TO readonly;\n<span class='output'>postgres=# </span>ALTER DEFAULT PRIVILEGES IN SCHEMA public\n          GRANT SELECT ON TABLES TO readonly;\n\n<span class='comment'># User zur Rolle hinzufügen:</span>\n<span class='output'>postgres=# </span>CREATE USER monitoring WITH PASSWORD 'lesezugriff';\n<span class='output'>postgres=# </span>GRANT readonly TO monitoring;",note:"Rollen-Konzept: Rechte auf Rolle vergeben, User der Rolle zuweisen — sauber und erweiterbar."}], tip:"EXPLAIN ANALYZE SELECT ... zeigt den Query-Plan und Ausführungszeit — unverzichtbar für Performance-Optimierung.", tags:["PostgreSQL","Sicherheit","Rollen","pg_hba"] }
    ]
  },

  "Redis": {
    icon: "🔴",
    commands: [
      { name:"Redis Installation", short:"In-Memory-Datenbank einrichten", desc:"Redis ist eine ultraschnelle In-Memory-Datenbank für Caching, Sessions, Pub/Sub und Queues. Liest/schreibt millionen Operationen pro Sekunde.", syntax:"<b>redis-server</b>  |  <b>redis-cli</b>  |  <b>/etc/redis/redis.conf</b>", options:[{flag:"redis-server",desc:"Redis starten"},{flag:"redis-cli",desc:"Interaktive Redis-Shell"},{flag:"redis-cli ping",desc:"Verbindungstest"},{flag:"redis-cli -h host -p 6379 -a passwort",desc:"Remote-Verbindung"},{flag:"redis-cli info",desc:"Server-Informationen"},{flag:"redis-cli monitor",desc:"Alle Befehle live anzeigen"},{flag:"redis-cli --latency",desc:"Latenz messen"}], examples:[{title:"Installation und Test",code:"<span class='prompt'>$ </span>sudo apt install redis-server -y\n<span class='prompt'>$ </span>sudo systemctl enable --now redis-server\n\n<span class='comment'># Verbindungstest:</span>\n<span class='prompt'>$ </span>redis-cli ping\n<span class='output'>PONG</span>\n\n<span class='comment'># Kurzer Funktionstest:</span>\n<span class='prompt'>$ </span>redis-cli\n<span class='output'>127.0.0.1:6379> SET test 'Hallo Redis'\nOK\n127.0.0.1:6379> GET test\n'Hallo Redis'\n127.0.0.1:6379> DEL test\n(integer) 1</span>",note:"Redis hört standardmäßig nur auf 127.0.0.1 — sicher für lokale Nutzung."},{title:"Redis absichern",code:"<span class='comment'># /etc/redis/redis.conf</span>\nbind 127.0.0.1\nrequirepass sicheresRedisPasswort!\nmaxmemory 256mb\nmaxmemory-policy allkeys-lru\n\n<span class='prompt'>$ </span>sudo systemctl restart redis-server\n<span class='prompt'>$ </span>redis-cli -a sicheresRedisPasswort! ping\n<span class='output'>PONG</span>",note:"requirepass setzt ein Passwort. maxmemory verhindert unkontrollierten RAM-Verbrauch."}], tags:["Redis","Cache","Datenbank","In-Memory"] },

      { name:"Redis Datentypen", short:"Strings, Listen, Sets, Hashes", desc:"Redis kennt 5 Haupt-Datentypen: Strings, Lists, Sets, Sorted Sets und Hashes. Jeder Typ hat spezialisierte Befehle für effiziente Operationen.", syntax:"<b>SET/GET</b>  |  <b>LPUSH/LRANGE</b>  |  <b>HSET/HGET</b>  |  <b>SADD</b>", options:[{flag:"SET key value EX 3600",desc:"String mit TTL von 1 Stunde"},{flag:"MSET k1 v1 k2 v2",desc:"Mehrere Strings gleichzeitig"},{flag:"INCR counter",desc:"Atomarer Zähler"},{flag:"LPUSH list item",desc:"Am Anfang der Liste einfügen"},{flag:"RPUSH list item",desc:"Am Ende der Liste einfügen"},{flag:"LRANGE list 0 -1",desc:"Alle Elemente der Liste"},{flag:"HSET hash field value",desc:"Hash-Feld setzen"},{flag:"HGETALL hash",desc:"Alle Hash-Felder"},{flag:"SADD set member",desc:"Set-Mitglied hinzufügen"},{flag:"SMEMBERS set",desc:"Alle Set-Mitglieder"}], examples:[{title:"Caching-Pattern (String)",code:"<span class='output'>127.0.0.1:6379> </span>SET cache:user:42 '{\"name\":\"Max\",\"email\":\"max@beispiel.de\"}' EX 3600\n<span class='output'>OK</span>\n<span class='output'>127.0.0.1:6379> </span>GET cache:user:42\n<span class='output'>\"{\"name\":\"Max\",\"email\":\"max@beispiel.de\"}\"</span>\n<span class='output'>127.0.0.1:6379> </span>TTL cache:user:42\n<span class='output'>(integer) 3598</span>\n\n<span class='comment'># Zähler (z.B. Seitenaufrufe):</span>\n<span class='output'>127.0.0.1:6379> </span>INCR pageviews:index\n<span class='output'>(integer) 1</span>\n<span class='output'>127.0.0.1:6379> </span>INCR pageviews:index\n<span class='output'>(integer) 2</span>",note:"INCR ist atomar — sicher für Zähler in Multi-Threading-Umgebungen."},{title:"Hash für Objekte, List für Queue",code:"<span class='comment'># Hash für strukturierte Daten:</span>\n<span class='output'>127.0.0.1:6379> </span>HSET user:42 name Max email max@beispiel.de login_count 5\n<span class='output'>127.0.0.1:6379> </span>HGETALL user:42\n<span class='output'>1) \"name\"\n2) \"Max\"\n3) \"email\"\n4) \"max@beispiel.de\"\n5) \"login_count\"\n6) \"5\"</span>\n\n<span class='comment'># List als einfache Queue (FIFO):</span>\n<span class='output'>127.0.0.1:6379> </span>RPUSH queue:emails 'mail1' 'mail2' 'mail3'\n<span class='output'>127.0.0.1:6379> </span>LPOP queue:emails\n<span class='output'>\"mail1\"</span>",note:"RPUSH + LPOP = Queue (FIFO). RPUSH + RPOP = Stack (LIFO)."}], tags:["Redis","Datentypen","Cache","Datenbank"] },

      { name:"Redis Persistenz & Pub/Sub", short:"Daten sichern und Nachrichten senden", desc:"Redis ist In-Memory, aber kann Daten auf Disk speichern (RDB-Snapshots oder AOF-Log). Pub/Sub ermöglicht Echtzeit-Messaging zwischen Anwendungen.", syntax:"<b>SAVE / BGSAVE</b>  |  <b>PUBLISH / SUBSCRIBE</b>", options:[{flag:"SAVE",desc:"Synchroner Snapshot (blockiert)"},{flag:"BGSAVE",desc:"Hintergrund-Snapshot (empfohlen)"},{flag:"BGREWRITEAOF",desc:"AOF-Datei neu schreiben"},{flag:"LASTSAVE",desc:"Zeitstempel des letzten Saves"},{flag:"PUBLISH channel message",desc:"Nachricht auf Channel veröffentlichen"},{flag:"SUBSCRIBE channel",desc:"Channel abonnieren"},{flag:"PSUBSCRIBE muster*",desc:"Channels per Muster abonnieren"},{flag:"save 900 1",desc:"(redis.conf) Snapshot wenn 1 Änderung in 900s"}], examples:[{title:"Persistenz konfigurieren",code:"<span class='comment'># /etc/redis/redis.conf</span>\n<span class='comment'># RDB-Snapshots:</span>\nsave 900 1      <span class='comment'># Snapshot wenn ≥1 Änderung in 15 min</span>\nsave 300 10     <span class='comment'># Snapshot wenn ≥10 Änderungen in 5 min</span>\nsave 60  10000  <span class='comment'># Snapshot wenn ≥10000 Änderungen in 1 min</span>\ndbfilename dump.rdb\ndir /var/lib/redis/\n\n<span class='comment'># AOF (Append Only File) — sicherer:</span>\nappendonly yes\nappendfilename 'appendonly.aof'\nappendfsync everysec  <span class='comment'># Sync jede Sekunde</span>\n\n<span class='comment'># Manueller Snapshot:</span>\n<span class='prompt'>$ </span>redis-cli BGSAVE\n<span class='output'>Background saving started</span>\n<span class='prompt'>$ </span>redis-cli LASTSAVE\n<span class='output'>(integer) 1746878400</span>",note:"AOF + RDB zusammen: AOF für Konsistenz, RDB für schnellen Restart."},{title:"Pub/Sub für Echtzeit-Messaging",code:"<span class='comment'># Terminal 1 — abonnieren:</span>\n<span class='prompt'>$ </span>redis-cli SUBSCRIBE notifications\n<span class='output'>Reading messages... (press Ctrl-C to quit)\n1) \"subscribe\"\n2) \"notifications\"\n3) (integer) 1</span>\n\n<span class='comment'># Terminal 2 — veröffentlichen:</span>\n<span class='prompt'>$ </span>redis-cli PUBLISH notifications 'Neue Bestellung #42'\n<span class='output'>(integer) 1  ← 1 Empfänger</span>\n\n<span class='comment'># Terminal 1 empfängt sofort:</span>\n<span class='output'>1) \"message\"\n2) \"notifications\"\n3) \"Neue Bestellung #42\"</span>",note:"Pub/Sub ist fire-and-forget — keine Persistenz, kein Retry. Für zuverlässige Queues: Redis Streams oder BullMQ."}], tip:"redis-cli --stat zeigt live Operationen pro Sekunde, Speicher und verbundene Clients — gut für Monitoring.", tags:["Redis","Pub/Sub","Persistenz","Messaging"] }
    ]
  },

  "Praxis-Workflows": {
    icon: "🚀",
    commands: [
      { name:"Neuen Server einrichten", short:"Kompletter Setup-Ablauf von Anfang bis Ende", desc:"Von der frischen Ubuntu-Installation zum abgesicherten, produktionsbereiten Server — Schritt für Schritt in der richtigen Reihenfolge.", syntax:"<b>Kompletter Workflow</b> — ca. 15–30 Minuten", options:[{flag:"Schritt 1",desc:"System updaten"},{flag:"Schritt 2",desc:"Benutzer anlegen und absichern"},{flag:"Schritt 3",desc:"SSH härten"},{flag:"Schritt 4",desc:"Firewall einrichten"},{flag:"Schritt 5",desc:"Automatische Updates aktivieren"},{flag:"Schritt 6",desc:"fail2ban installieren"}], examples:[{title:"Schritt 1–3: System und Benutzer",code:"<span class='comment'>### SCHRITT 1: Als root einloggen, sofort updaten ###</span>\n<span class='prompt'># </span>apt update && apt upgrade -y\n<span class='prompt'># </span>hostnamectl set-hostname mein-server\n<span class='prompt'># </span>timedatectl set-timezone Europe/Berlin\n\n<span class='comment'>### SCHRITT 2: Admin-User anlegen ###</span>\n<span class='prompt'># </span>adduser admin\n<span class='prompt'># </span>usermod -aG sudo admin\n\n<span class='comment'>### SCHRITT 3: SSH-Key einrichten (auf lokalem PC ausführen) ###</span>\n<span class='prompt'>lokal$ </span>ssh-keygen -t ed25519 -C 'mein-server'\n<span class='prompt'>lokal$ </span>ssh-copy-id admin@SERVER_IP\n\n<span class='comment'># Testen — OHNE Session zu schließen!</span>\n<span class='prompt'>lokal$ </span>ssh admin@SERVER_IP\n<span class='prompt'>admin$ </span>sudo whoami\n<span class='output'>root</span>",note:"SSH-Key-Login IMMER testen bevor Passwort-Login deaktiviert wird — sonst ausgesperrt!"},{title:"Schritt 4–6: Absicherung",code:"<span class='comment'>### SCHRITT 4: SSH-Config absichern ###</span>\n<span class='prompt'>admin$ </span>sudo nano /etc/ssh/sshd_config\n<span class='comment'># Setze:</span>\n<span class='comment'># PermitRootLogin no</span>\n<span class='comment'># PasswordAuthentication no</span>\n<span class='comment'># MaxAuthTries 3</span>\n<span class='prompt'>admin$ </span>sudo sshd -t && sudo systemctl reload sshd\n\n<span class='comment'>### SCHRITT 5: Firewall ###</span>\n<span class='prompt'>admin$ </span>sudo ufw allow OpenSSH\n<span class='prompt'>admin$ </span>sudo ufw enable\n<span class='prompt'>admin$ </span>sudo ufw status\n\n<span class='comment'>### SCHRITT 6: Automatische Updates + fail2ban ###</span>\n<span class='prompt'>admin$ </span>sudo apt install unattended-upgrades fail2ban -y\n<span class='prompt'>admin$ </span>sudo systemctl enable --now fail2ban\n<span class='prompt'>admin$ </span>sudo dpkg-reconfigure --priority=low unattended-upgrades\n\n<span class='comment'># ✅ Server ist bereit!</span>",note:"Reihenfolge ist entscheidend: erst Key testen, dann Passwort sperren. Erst SSH freigeben, dann UFW aktivieren."}], tip:"Speichere diese Sequenz als Shell-Skript — dann dauert die Ersteinrichtung nur noch 2 Minuten.", tags:["Workflow","Server","Setup","Sicherheit"] },

      { name:"Webseite live schalten", short:"Domain → Nginx → SSL → Deploy", desc:"Kompletter Ablauf um eine neue Webseite auf einem laufenden Server live zu schalten: Nginx-Config, SSL-Zertifikat und ersten Deployment.", syntax:"<b>Workflow</b> — Domain muss vorher auf Server zeigen", options:[{flag:"Schritt 1",desc:"Nginx Virtual Host erstellen"},{flag:"Schritt 2",desc:"Web-Root und Inhalt anlegen"},{flag:"Schritt 3",desc:"Nginx testen und aktivieren"},{flag:"Schritt 4",desc:"Firewall für HTTP/HTTPS öffnen"},{flag:"Schritt 5",desc:"SSL-Zertifikat mit Certbot holen"},{flag:"Schritt 6",desc:"Automatischen Deploy einrichten"}], examples:[{title:"Schritt 1–3: Nginx konfigurieren",code:"<span class='comment'>### SCHRITT 1: Virtual Host erstellen ###</span>\n<span class='prompt'>$ </span>sudo nano /etc/nginx/sites-available/meinsite.de\n\nserver {\n    listen 80;\n    server_name meinsite.de www.meinsite.de;\n    root /var/www/meinsite.de;\n    index index.html index.php;\n    location / { try_files $uri $uri/ =404; }\n}\n\n<span class='comment'>### SCHRITT 2: Web-Root anlegen und aktivieren ###</span>\n<span class='prompt'>$ </span>sudo mkdir -p /var/www/meinsite.de\n<span class='prompt'>$ </span>sudo chown -R $USER:$USER /var/www/meinsite.de\n<span class='prompt'>$ </span>echo '&lt;h1&gt;Hallo Welt&lt;/h1&gt;' > /var/www/meinsite.de/index.html\n<span class='prompt'>$ </span>sudo ln -s /etc/nginx/sites-available/meinsite.de /etc/nginx/sites-enabled/\n\n<span class='comment'>### SCHRITT 3: Testen und neu laden ###</span>\n<span class='prompt'>$ </span>sudo nginx -t\n<span class='output'>nginx: configuration file test is successful</span>\n<span class='prompt'>$ </span>sudo systemctl reload nginx",note:"nginx -t vor JEDEM reload — ein Fehler in der Config macht Nginx komplett unerreichbar."},{title:"Schritt 4–6: SSL und Deploy",code:"<span class='comment'>### SCHRITT 4: Firewall öffnen ###</span>\n<span class='prompt'>$ </span>sudo ufw allow 'Nginx Full'\n<span class='comment'># → öffnet Port 80 und 443</span>\n\n<span class='comment'>### SCHRITT 5: SSL-Zertifikat holen ###</span>\n<span class='prompt'>$ </span>sudo apt install certbot python3-certbot-nginx -y\n<span class='prompt'>$ </span>sudo certbot --nginx -d meinsite.de -d www.meinsite.de\n<span class='output'>Congratulations! HTTPS is now enabled for meinsite.de</span>\n\n<span class='comment'>### SCHRITT 6: Echten Inhalt deployen ###</span>\n<span class='prompt'>$ </span>cd /var/www/meinsite.de\n<span class='prompt'>$ </span>git clone https://github.com/user/meinsite.de.git .\n<span class='comment'># oder via rsync:</span>\n<span class='prompt'>lokal$ </span>rsync -avz ./dist/ admin@server:/var/www/meinsite.de/\n\n<span class='comment'># ✅ https://meinsite.de ist live!</span>",note:"Certbot konfiguriert Nginx automatisch für HTTPS und richtet HTTP→HTTPS Redirect ein."}], tags:["Workflow","Nginx","SSL","Deploy","Web"] },

      { name:"Server-Diagnose bei Problemen", short:"Performance-Probleme systematisch finden", desc:"Server langsam, hohe Last oder Dienst ausgefallen? Diese Befehlssequenz deckt die häufigsten Ursachen in 5 Minuten auf — von CPU über RAM bis Disk und Netzwerk.", syntax:"<b>Workflow</b> — Diagnose von oben nach unten", options:[{flag:"Schritt 1",desc:"Allgemeinen Zustand erfassen"},{flag:"Schritt 2",desc:"CPU und Prozesse prüfen"},{flag:"Schritt 3",desc:"RAM-Verbrauch analysieren"},{flag:"Schritt 4",desc:"Disk-Auslastung prüfen"},{flag:"Schritt 5",desc:"Netzwerk-Verbindungen inspizieren"},{flag:"Schritt 6",desc:"Logs auf Fehler durchsuchen"}], examples:[{title:"Schritt 1–3: CPU und RAM",code:"<span class='comment'>### SCHRITT 1: Schnellüberblick ###</span>\n<span class='prompt'>$ </span>uptime\n<span class='output'> 14:23:01 up 42 days,  load average: 8.23, 7.91, 6.54</span>\n<span class='comment'># Load > Anzahl CPU-Kerne → Überlastung!</span>\n<span class='prompt'>$ </span>nproc\n<span class='output'>4</span>\n<span class='comment'># Load 8.23 bei 4 Kernen = doppelte Auslastung!</span>\n\n<span class='comment'>### SCHRITT 2: Welcher Prozess frisst CPU? ###</span>\n<span class='prompt'>$ </span>ps aux --sort=-%cpu | head -10\n<span class='output'>USER  PID  %CPU  %MEM  COMMAND\nwww    1234  89.2   2.1  php-fpm: worker\nwww    1235  85.1   1.9  php-fpm: worker</span>\n<span class='comment'># → php-fpm in Endlosschleife?</span>\n<span class='prompt'>$ </span>strace -p 1234\n<span class='comment'># Zeigt was der Prozess gerade tut</span>\n\n<span class='comment'>### SCHRITT 3: RAM-Situation ###</span>\n<span class='prompt'>$ </span>free -h\n<span class='output'>              total   used   free   available\nMem:           3.8G   3.7G    12M         50M</span>\n<span class='comment'># → 50M available = kritisch!</span>\n<span class='prompt'>$ </span>ps aux --sort=-%mem | head -5\n<span class='comment'># Wer verbraucht am meisten RAM?</span>",note:"Load Average über längere Zeit (15min) ist aussagekräftiger als der aktuelle Wert."},{title:"Schritt 4–6: Disk, Netzwerk und Logs",code:"<span class='comment'>### SCHRITT 4: Disk-Auslastung ###</span>\n<span class='prompt'>$ </span>df -h\n<span class='output'>Filesystem  Size  Used Avail Use%\n/dev/sda1    50G   49G  0.5G  99%  ← voll!</span>\n\n<span class='comment'># Welche Verzeichnisse belegen am meisten Platz?</span>\n<span class='prompt'>$ </span>du -sh /* 2>/dev/null | sort -rh | head -10\n<span class='output'>38G  /var\n 4G  /usr\n 2G  /home</span>\n<span class='prompt'>$ </span>du -sh /var/* | sort -rh | head -5\n<span class='output'>22G  /var/log   ← Logs nicht rotiert!</span>\n<span class='prompt'>$ </span>ls -lSh /var/log/ | head\n\n<span class='comment'>### SCHRITT 5: Offene Ports und Verbindungen ###</span>\n<span class='prompt'>$ </span>ss -tlnp\n<span class='comment'># Welcher Dienst hört auf welchem Port?</span>\n<span class='prompt'>$ </span>ss -s\n<span class='comment'># Viele CLOSE_WAIT → Verbindungsleck in der App</span>\n\n<span class='comment'>### SCHRITT 6: Logs auf Fehler ###</span>\n<span class='prompt'>$ </span>journalctl -p err -n 50 --no-pager\n<span class='prompt'>$ </span>grep -i 'error\\|crit\\|fatal' /var/log/nginx/error.log | tail -20\n<span class='prompt'>$ </span>tail -f /var/log/syslog",note:"journalctl -p err filtert nur Fehler — viel übersichtlicher als alle Logs zu durchsuchen."}], tip:"Schreibe dir ein Alias: alias diagnose='uptime; free -h; df -h; ss -s' — ein Befehl gibt sofort den Überblick.", tags:["Workflow","Diagnose","Performance","Debugging"] },

      { name:"Log-Analyse mit Pipe-Ketten", short:"Nginx-Logs, Fehler und Muster auswerten", desc:"Professionelle Log-Analyse durch clevere Kombination von grep, awk, sort und uniq. Findet Top-IPs, häufigste Fehler und verdächtige Zugriffe in Sekunden.", syntax:"<b>grep | awk | sort | uniq | head</b> — Die Analyse-Pipeline", options:[{flag:"grep",desc:"Zeilen filtern"},{flag:"awk",desc:"Spalten extrahieren"},{flag:"sort",desc:"Sortieren (alphabetisch oder numerisch)"},{flag:"uniq -c",desc:"Duplikate zählen"},{flag:"sort -rn",desc:"Numerisch absteigend sortieren"},{flag:"head -20",desc:"Top 20 ausgeben"}], examples:[{title:"Top-IPs und häufigste Seiten",code:"<span class='comment'># Top 10 IPs mit den meisten Anfragen:</span>\n<span class='prompt'>$ </span>awk '{print $1}' /var/log/nginx/access.log \\\n  | sort | uniq -c | sort -rn | head -10\n<span class='output'>   4521  185.234.12.99\n   1203  10.0.0.5\n    892  203.0.113.42</span>\n\n<span class='comment'># Top 10 angefragte URLs:</span>\n<span class='prompt'>$ </span>awk '{print $7}' /var/log/nginx/access.log \\\n  | sort | uniq -c | sort -rn | head -10\n<span class='output'>  18234  /\n   4521  /api/products\n   2103  /wp-login.php   ← WordPress-Angriff!\n   1892  /admin</span>\n\n<span class='comment'># Nur 404-Fehler analysieren:</span>\n<span class='prompt'>$ </span>grep ' 404 ' /var/log/nginx/access.log \\\n  | awk '{print $7}' | sort | uniq -c | sort -rn | head\n<span class='output'>    892  /wp-login.php\n    234  /.env\n    198  /config.php</span>",note:"Viele Anfragen auf /.env, /config.php, /wp-login.php = aktiver Scan-Angriff."},{title:"Fehler-Analyse und Zeitraum filtern",code:"<span class='comment'># Alle 5xx-Fehler der letzten Stunde:</span>\n<span class='prompt'>$ </span>grep '$(date +\"%d/%b/%Y:%H\")' /var/log/nginx/access.log \\\n  | grep ' 5[0-9][0-9] '\n\n<span class='comment'># Reaktionszeiten analysieren (Spalte $NF = letzte Spalte):</span>\n<span class='prompt'>$ </span>awk '{print $NF}' /var/log/nginx/access.log \\\n  | sort -n | awk 'BEGIN{i=0} {a[i++]=$1}\n  END{print \"Min:\",a[0],\"Max:\",a[i-1],\"Median:\",a[int(i/2)]}'\n<span class='output'>Min: 0.001 Max: 45.231 Median: 0.023</span>\n\n<span class='comment'># IP sperren die zu viele Fehler macht:</span>\n<span class='prompt'>$ </span>grep ' 404 ' /var/log/nginx/access.log \\\n  | awk '{print $1}' | sort | uniq -c | sort -rn \\\n  | awk '$1 > 100 {print $2}' \\\n  | xargs -I{} sudo ufw deny from {}\n<span class='comment'># Sperrt alle IPs mit mehr als 100 404-Fehlern automatisch</span>",note:"Die letzte Pipe-Kette filtert, aggregiert und sperrt in einem Schritt — klassische Linux-Stärke."}], tags:["Workflow","Log-Analyse","grep","awk","Nginx"] },

      { name:"Git-Tagesablauf", short:"Typischer Entwickler-Workflow", desc:"Der komplette tägliche Git-Workflow — vom Morgen-Pull über Feature-Entwicklung und Code-Review bis zum Merge. Vermeidet typische Fallstricke.", syntax:"<b>pull → branch → work → push → merge</b>", options:[{flag:"Morgens",desc:"Stand holen und synchronisieren"},{flag:"Feature",desc:"Neuen Branch für jede Änderung"},{flag:"Commit",desc:"Kleine, häufige, beschreibende Commits"},{flag:"Push",desc:"Branch auf Remote sichern"},{flag:"PR/MR",desc:"Code-Review anfordern"},{flag:"Merge",desc:"In main/master integrieren"}], examples:[{title:"Morgen-Routine und Feature-Start",code:"<span class='comment'>### MORGENS: Aktuellen Stand holen ###</span>\n<span class='prompt'>$ </span>git checkout main\n<span class='prompt'>$ </span>git pull\n<span class='output'>Already up to date.</span>\n<span class='comment'># oder: Neue Commits von Kollegen</span>\n<span class='output'>3 files changed, 45 insertions(+)</span>\n\n<span class='comment'>### Neues Feature beginnen ###</span>\n<span class='prompt'>$ </span>git checkout -b feature/login-verbesserung\n<span class='comment'># Entwickeln, testen...</span>\n\n<span class='comment'>### Kleine, häufige Commits ###</span>\n<span class='prompt'>$ </span>git add src/login.js src/login.test.js\n<span class='prompt'>$ </span>git commit -m 'Login: Passwort-Validierung verbessert'\n<span class='comment'># Weiterentwickeln...</span>\n<span class='prompt'>$ </span>git add .\n<span class='prompt'>$ </span>git commit -m 'Login: Fehlermeldungen auf Deutsch'",note:"Ein Commit pro logische Änderung — macht git log lesbar und git bisect möglich."},{title:"Push, Review und Merge",code:"<span class='comment'>### Branch auf Remote sichern ###</span>\n<span class='prompt'>$ </span>git push -u origin feature/login-verbesserung\n<span class='output'>Branch 'feature/login-verbesserung' set up to track remote branch</span>\n\n<span class='comment'>### Vor dem Merge: main holen und rebasen ###</span>\n<span class='prompt'>$ </span>git fetch origin\n<span class='prompt'>$ </span>git rebase origin/main\n<span class='comment'># Falls Konflikte: lösen, dann:</span>\n<span class='prompt'>$ </span>git add . && git rebase --continue\n\n<span class='comment'>### Merge in main ###</span>\n<span class='prompt'>$ </span>git checkout main\n<span class='prompt'>$ </span>git merge --no-ff feature/login-verbesserung\n<span class='prompt'>$ </span>git push\n\n<span class='comment'>### Branch aufräumen ###</span>\n<span class='prompt'>$ </span>git branch -d feature/login-verbesserung\n<span class='prompt'>$ </span>git push origin --delete feature/login-verbesserung",note:"--no-ff erzwingt einen Merge-Commit — der Feature-Branch bleibt in der Historie sichtbar."}], tags:["Workflow","Git","Entwicklung","Tagesablauf"] },

      { name:"Dateien suchen und verarbeiten", short:"find + grep + xargs — Die Suche-Pipe", desc:"Dateien finden, deren Inhalt durchsuchen und in einem Zug verarbeiten. Ersetzt stundenlange manuelle Suche durch eine einzeilige Pipe-Kette.", syntax:"<b>find / fd | grep / rg | xargs | sed</b>", options:[{flag:"find -name",desc:"Nach Dateiname suchen"},{flag:"find -mtime -1",desc:"In letzten 24h geändert"},{flag:"find -size +100M",desc:"Größer als 100MB"},{flag:"grep -rl",desc:"Rekursiv in Dateien suchen (nur Dateinamen)"},{flag:"xargs",desc:"Ergebnisse an Befehl weitergeben"},{flag:"xargs -P4",desc:"4 parallele Prozesse"}], examples:[{title:"Dateien finden und verarbeiten",code:"<span class='comment'># Alle PHP-Dateien die 'eval(' enthalten (Webshell-Suche):</span>\n<span class='prompt'>$ </span>grep -rl 'eval(' /var/www --include='*.php'\n<span class='output'>/var/www/shop/uploads/img.php\n/var/www/shop/uploads/x.php</span>\n<span class='comment'># → verdächtige Dateien!</span>\n\n<span class='comment'># Alle Dateien > 100MB finden:</span>\n<span class='prompt'>$ </span>find /var -size +100M -type f -exec ls -lh {} \\;\n<span class='output'>-rw-r--r-- 1 root root 4.2G /var/log/kern.log</span>\n\n<span class='comment'># Log-Dateien älter als 30 Tage löschen:</span>\n<span class='prompt'>$ </span>find /var/log -name '*.log' -mtime +30 -delete\n\n<span class='comment'># Alle Config-Dateien sichern:</span>\n<span class='prompt'>$ </span>find /etc -name '*.conf' | xargs tar -czf /backup/configs.tar.gz",note:"grep -rl sucht rekursiv und gibt nur Dateinamen aus — ideal für xargs."},{title:"Massenverarbeitung und Umbennen",code:"<span class='comment'># In allen JS-Dateien Text ersetzen:</span>\n<span class='prompt'>$ </span>grep -rl 'localhost:3000' . --include='*.js' \\\n  | xargs sed -i 's/localhost:3000/api.meinsite.de/g'\n\n<span class='comment'># Bilder verkleinern (parallel, 4 Prozesse):</span>\n<span class='prompt'>$ </span>find ./bilder -name '*.jpg' \\\n  | xargs -P4 -I{} convert {} -quality 85 -resize '1920x>' {}\n\n<span class='comment'># Dateien nach Erstellungsdatum umbenennen:</span>\n<span class='prompt'>$ </span>for f in *.jpg; do\n    datum=$(stat -c %y \"$f\" | cut -d' ' -f1)\n    mv \"$f\" \"${datum}_${f}\"\n  done\n\n<span class='comment'># Alle leeren Verzeichnisse löschen:</span>\n<span class='prompt'>$ </span>find . -type d -empty -delete",note:"xargs -P4 führt 4 Prozesse parallel aus — bei CPU-intensiven Tasks enorme Zeitersparnis."}], tags:["Workflow","find","xargs","Dateiverarbeitung"] },

      { name:"Sicherheits-Audit", short:"Server in 10 Minuten auf Probleme prüfen", desc:"Schnelle Sicherheitsprüfung eines Linux-Servers: offene Ports, verdächtige Prozesse, fehlgeschlagene Logins, geänderte System-Dateien und SUID-Binaries.", syntax:"<b>Sicherheits-Checkliste</b> — regelmäßig ausführen", options:[{flag:"Schritt 1",desc:"Offene Ports und lauschende Dienste"},{flag:"Schritt 2",desc:"Angemeldete und zuletzt aktive User"},{flag:"Schritt 3",desc:"Fehlgeschlagene SSH-Logins"},{flag:"Schritt 4",desc:"Unbekannte SUID-Dateien"},{flag:"Schritt 5",desc:"Cron-Jobs und Autostart prüfen"},{flag:"Schritt 6",desc:"System-Integrität prüfen"}], examples:[{title:"Schritt 1–3: Ports, User und Logins",code:"<span class='comment'>### SCHRITT 1: Was lauscht von außen? ###</span>\n<span class='prompt'>$ </span>ss -tlnp\n<span class='output'>State  Local Address:Port  Process\nLISTEN 0.0.0.0:22          sshd\nLISTEN 0.0.0.0:80          nginx\nLISTEN 0.0.0.0:3306        mysqld  ← Datenbank von außen erreichbar!</span>\n\n<span class='comment'>### SCHRITT 2: Wer ist gerade eingeloggt? ###</span>\n<span class='prompt'>$ </span>w\n<span class='output'>USER     TTY  FROM           LOGIN@  IDLE\nadmin    pts/0 192.168.1.5   14:00  0:01\nwww-data pts/1 185.234.12.99  13:55  5:23  ← Unbekannte IP!</span>\n<span class='prompt'>$ </span>last | head -20\n<span class='comment'># Alle letzten Logins — unbekannte Nutzer?</span>\n\n<span class='comment'>### SCHRITT 3: SSH-Brute-Force-Versuche ###</span>\n<span class='prompt'>$ </span>grep 'Failed password' /var/log/auth.log \\\n  | awk '{print $11}' | sort | uniq -c | sort -rn | head\n<span class='output'>   4521  185.234.12.99\n    892  203.0.113.42</span>\n<span class='comment'># → Top-Angreifer blockieren:</span>\n<span class='prompt'>$ </span>sudo ufw deny from 185.234.12.99",note:"www-data sollte NIEMALS eine interaktive SSH-Session haben — sofort untersuchen!"},{title:"Schritt 4–6: SUID, Cron und Integrität",code:"<span class='comment'>### SCHRITT 4: SUID-Binaries prüfen (können Root-Rechte geben) ###</span>\n<span class='prompt'>$ </span>find / -perm -4000 -type f 2>/dev/null | sort\n<span class='comment'># Standard: passwd, sudo, ping, su, mount...</span>\n<span class='comment'># Unbekannte Einträge = Alarm!</span>\n\n<span class='comment'>### SCHRITT 5: Cron-Jobs und Autostart ###</span>\n<span class='prompt'>$ </span>crontab -l; sudo crontab -l\n<span class='prompt'>$ </span>ls -la /etc/cron* /etc/systemd/system/*.service 2>/dev/null\n<span class='prompt'>$ </span>cat /etc/rc.local 2>/dev/null\n\n<span class='comment'>### SCHRITT 6: Kürzlich geänderte System-Dateien ###</span>\n<span class='prompt'>$ </span>find /etc /usr/bin /usr/sbin -mtime -1 -type f 2>/dev/null\n<span class='comment'># Was wurde in den letzten 24h verändert?</span>\n\n<span class='comment'># Paket-Integrität prüfen (Debian/Ubuntu):</span>\n<span class='prompt'>$ </span>dpkg --verify 2>/dev/null | head -20\n<span class='comment'># Ausgabe = geänderte Dateien (vom Originalpaket abweichend)</span>",note:"SUID-Binaries + geänderte System-Dateien sind die häufigsten Zeichen eines kompromittierten Systems."}], tip:"Lege dir ein Monitoring-Skript an das diese Prüfungen täglich ausführt und per E-Mail berichtet.", tags:["Workflow","Sicherheit","Audit","Forensik"] },

      { name:"Backup erstellen und prüfen", short:"3-Schritte: Sichern, Verifizieren, Restaurieren", desc:"Ein Backup ist nur so gut wie sein letzter erfolgreicher Restore-Test. Dieser Workflow sichert, prüft die Integrität und testet den Restore — vollautomatisiert.", syntax:"<b>Sichern → Prüfen → Test-Restore</b>", options:[{flag:"Schritt 1",desc:"Datenbank-Backup"},{flag:"Schritt 2",desc:"Dateisystem-Backup"},{flag:"Schritt 3",desc:"Backup-Integrität prüfen"},{flag:"Schritt 4",desc:"Test-Restore auf temporäres Verzeichnis"},{flag:"Schritt 5",desc:"Backup-Log prüfen"}], examples:[{title:"Vollständiges Backup-Skript",code:"<span class='comment'>#!/bin/bash</span>\n<span class='comment'># /usr/local/bin/daily-backup.sh</span>\n\nDATE=$(date +%Y-%m-%d)\nBACKUP_DIR=/backups/$DATE\nmkdir -p $BACKUP_DIR\n\n<span class='comment'>### SCHRITT 1: Datenbank ###</span>\nmysqldump --all-databases | gzip > $BACKUP_DIR/mysql_$DATE.sql.gz\necho \"MySQL: $(du -sh $BACKUP_DIR/mysql_$DATE.sql.gz | cut -f1)\"\n\n<span class='comment'>### SCHRITT 2: Dateien ###</span>\nrsync -az --delete \\\n  --exclude=node_modules \\\n  --exclude='.git' \\\n  /var/www/ $BACKUP_DIR/www/\n\n<span class='comment'>### SCHRITT 3: Integrität prüfen ###</span>\ngzip -t $BACKUP_DIR/mysql_$DATE.sql.gz\nif [ $? -eq 0 ]; then\n  echo \"✅ Datenbank-Backup OK\"\nelse\n  echo \"❌ FEHLER: Backup beschädigt!\" | mail -s 'Backup-Fehler' admin@server.de\nfi\n\n<span class='comment'>### SCHRITT 4: Test-Restore ###</span>\nmkdir -p /tmp/restore-test\nzcat $BACKUP_DIR/mysql_$DATE.sql.gz | head -100 > /dev/null\necho \"✅ Restore-Test OK\"\n\n<span class='comment'># Alte Backups löschen (30 Tage):</span>\nfind /backups -maxdepth 1 -mtime +30 -type d -exec rm -rf {} \\;\n\necho \"✅ Backup $DATE abgeschlossen\"",note:"gzip -t prüft ob die Datei beschädigt ist — ohne echten Restore-Test oft übersehen."},{title:"Backup-Logs auswerten",code:"<span class='comment'># Letzte Backup-Größen im Trend:</span>\n<span class='prompt'>$ </span>du -sh /backups/*/mysql_*.sql.gz | sort\n<span class='output'>234M  /backups/2025-05-08/mysql_2025-05-08.sql.gz\n235M  /backups/2025-05-09/mysql_2025-05-09.sql.gz\n  1K  /backups/2025-05-10/mysql_2025-05-10.sql.gz  ← Alarm! Zu klein!</span>\n\n<span class='comment'># Backup-Alter prüfen:</span>\n<span class='prompt'>$ </span>find /backups -name '*.sql.gz' -mtime +2\n<span class='comment'># Ausgabe = Backups älter als 2 Tage → Cronjob ausgefallen?</span>\n\n<span class='comment'># Letzten Backup-Log ansehen:</span>\n<span class='prompt'>$ </span>tail -20 /var/log/backup.log",note:"Backup-Größe im Trend prüfen — ein plötzlich kleines Backup ist ein Warnsignal."}], tags:["Workflow","Backup","Recovery","Automatisierung"] },

      { name:"Docker-App deployen", short:"Image bauen, pushen und live schalten", desc:"Kompletter Docker-Deploy-Workflow: lokales Image bauen, in Registry pushen, auf dem Server aktualisieren und prüfen — ohne Downtime.", syntax:"<b>build → push → pull → up</b>", options:[{flag:"Schritt 1",desc:"Image lokal bauen und testen"},{flag:"Schritt 2",desc:"In Registry pushen"},{flag:"Schritt 3",desc:"Auf Server deployen"},{flag:"Schritt 4",desc:"Health-Check und Logs"},{flag:"Schritt 5",desc:"Rollback bei Fehlern"}], examples:[{title:"Schritt 1–3: Bauen und Pushen",code:"<span class='comment'>### SCHRITT 1: Lokal bauen und testen ###</span>\n<span class='prompt'>lokal$ </span>docker build -t meinapp:latest .\n<span class='output'>Successfully built a1b2c3d4e5f6</span>\n<span class='prompt'>lokal$ </span>docker run -d -p 3000:3000 --name test meinapp:latest\n<span class='prompt'>lokal$ </span>curl http://localhost:3000/health\n<span class='output'>{\"status\": \"ok\"}</span>\n<span class='prompt'>lokal$ </span>docker stop test && docker rm test\n\n<span class='comment'>### SCHRITT 2: Taggen und in Registry pushen ###</span>\n<span class='prompt'>lokal$ </span>docker tag meinapp:latest ghcr.io/username/meinapp:v1.2.0\n<span class='prompt'>lokal$ </span>docker tag meinapp:latest ghcr.io/username/meinapp:latest\n<span class='prompt'>lokal$ </span>docker push ghcr.io/username/meinapp:latest\n<span class='output'>latest: digest: sha256:abc123... size: 1234\nPushed in 12s</span>\n\n<span class='comment'>### SCHRITT 3: Auf Server deployen ###</span>\n<span class='prompt'>lokal$ </span>ssh admin@server\n<span class='prompt'>server$ </span>cd /opt/meinapp\n<span class='prompt'>server$ </span>docker compose pull\n<span class='prompt'>server$ </span>docker compose up -d",note:"Erst lokal testen, dann pushen, dann deployen — nie direkt auf dem Server bauen."},{title:"Schritt 4–5: Prüfen und Rollback",code:"<span class='comment'>### SCHRITT 4: Health-Check nach Deploy ###</span>\n<span class='prompt'>server$ </span>docker compose ps\n<span class='output'>NAME      STATUS     PORTS\nmeinapp   Up 30s     0.0.0.0:3000->3000/tcp</span>\n\n<span class='prompt'>server$ </span>docker compose logs --tail=50 meinapp\n<span class='prompt'>server$ </span>curl http://localhost:3000/health\n<span class='output'>{\"status\": \"ok\", \"version\": \"1.2.0\"}</span>\n\n<span class='comment'>### SCHRITT 5: Rollback wenn etwas schiefläuft ###</span>\n<span class='prompt'>server$ </span>docker compose down\n<span class='comment'># docker-compose.yml auf vorherige Version ändern:</span>\n<span class='prompt'>server$ </span>sed -i 's/meinapp:latest/meinapp:v1.1.0/' docker-compose.yml\n<span class='prompt'>server$ </span>docker compose up -d\n<span class='output'>[+] Running 1/1\n ✔ Container meinapp  Started</span>",note:"Immer eine Version zurückhalten — dann ist Rollback eine Frage von Sekunden."}], tags:["Workflow","Docker","Deploy","DevOps"] },

      { name:"Datenbank migrieren", short:"DB von Server A nach Server B umziehen", desc:"Kompletter Ablauf einer Datenbankmigrierung: Backup, Transfer, Restore, Prüfung und Umschaltung — mit minimalem Ausfall.", syntax:"<b>dump → transfer → restore → verify → switch</b>", options:[{flag:"MySQL/MariaDB",desc:"mysqldump + mysql"},{flag:"PostgreSQL",desc:"pg_dump + pg_restore"},{flag:"Transfer",desc:"rsync oder scp"},{flag:"Prüfung",desc:"Tabellenzahlen und Größen vergleichen"},{flag:"DNS-Umschaltung",desc:"Minimales Downtime-Fenster"}], examples:[{title:"MySQL-Migration",code:"<span class='comment'>### AUF ALTER SERVER ###</span>\n\n<span class='comment'># 1. Backup erstellen:</span>\n<span class='prompt'>alt$ </span>mysqldump --all-databases --single-transaction \\\n  | gzip > /tmp/migration_$(date +%Y%m%d).sql.gz\n\n<span class='comment'># 2. Größe prüfen:</span>\n<span class='prompt'>alt$ </span>du -sh /tmp/migration_*.sql.gz\n<span class='output'>2.3G  /tmp/migration_20250510.sql.gz</span>\n\n<span class='comment'># 3. Auf neuen Server übertragen:</span>\n<span class='prompt'>alt$ </span>rsync -avP /tmp/migration_20250510.sql.gz \\\n  admin@neuer-server:/tmp/\n\n<span class='comment'>### AUF NEUEM SERVER ###</span>\n\n<span class='comment'># 4. Restore:</span>\n<span class='prompt'>neu$ </span>zcat /tmp/migration_20250510.sql.gz | mysql -u root -p\n\n<span class='comment'># 5. Prüfen:</span>\n<span class='prompt'>neu$ </span>mysql -u root -p -e 'SHOW DATABASES;'\n<span class='prompt'>neu$ </span>mysql -u root -p meinapp -e 'SELECT COUNT(*) FROM users;'\n<span class='output'>COUNT(*)\n   4521</span>\n<span class='comment'># Gleiche Zahl wie auf altem Server? ✅</span>",note:"--single-transaction bei InnoDB: Konsistentes Backup ohne Tabellen zu sperren."},{title:"Umschaltung mit minimalem Ausfall",code:"<span class='comment'># UMSCHALTUNGS-FENSTER (z.B. nachts um 3 Uhr):\n\n# 1. App auf altem Server stoppen:\nalt$ sudo systemctl stop meinapp\n\n# 2. Finales Delta-Backup (nur Änderungen seit Migrations-Backup):\nalt$ mysqldump meinapp --single-transaction \\\n  | gzip > /tmp/final_delta.sql.gz\nalt$ rsync /tmp/final_delta.sql.gz admin@neuer-server:/tmp/\n\n# 3. Delta auf neuem Server einspielen:\nneu$ zcat /tmp/final_delta.sql.gz | mysql -u root -p meinapp\n\n# 4. App auf neuem Server starten:\nneu$ sudo systemctl start meinapp\nneu$ curl http://localhost:3000/health\n\n# 5. DNS umzeigen:\n# → A-Record von alter IP auf neue IP ändern\n# TTL vorher auf 60s setzen (schnelle Propagierung)\n\n# 6. Alten Server noch 24h bereithalten</span>",note:"TTL vorher auf 60s reduzieren (mindestens 24h vor Migration) — dann ist DNS-Umschaltung in 1 Minute weltweit aktiv."}], tags:["Workflow","Datenbank","Migration","MySQL","PostgreSQL"] },

      { name:"Ordnerstruktur anlegen", short:"Projekte und Verzeichnisse schnell aufbauen", desc:"Wie man Ordner-Strukturen effizient anlegt, mit Inhalt befüllt, übersichtlich hält und wieder sauber aufräumt — alles mit praktischen Beispielen aus dem Alltag.", syntax:"<b>mkdir -p</b>  |  <b>touch</b>  |  <b>cp / mv</b>  |  <b>rm -r</b>", options:[{flag:"mkdir -p pfad/unterordner",desc:"Kompletten Pfad auf einmal anlegen"},{flag:"mkdir -p {a,b,c}",desc:"Mehrere Ordner gleichzeitig"},{flag:"touch datei.txt",desc:"Leere Datei anlegen"},{flag:"tree",desc:"Verzeichnisbaum anzeigen"},{flag:"cp -r quelle/ ziel/",desc:"Ordner rekursiv kopieren"},{flag:"rm -ri ordner/",desc:"Ordner interaktiv löschen (fragt nach)"}], examples:[{title:"Projekt-Struktur in einem Befehl anlegen",code:"<span class='comment'># Komplette Webprojekt-Struktur auf einmal:</span>\n<span class='prompt'>$ </span>mkdir -p meinprojekt/{src/{js,css,img},public,docs,tests,config}\n\n<span class='comment'># Ergebnis anzeigen:</span>\n<span class='prompt'>$ </span>tree meinprojekt\n<span class='output'>meinprojekt/\n├── config/\n├── docs/\n├── public/\n├── src/\n│   ├── css/\n│   ├── img/\n│   └── js/\n└── tests/</span>\n\n<span class='comment'># Monatliche Archiv-Struktur (z.B. für Fotos/Belege):</span>\n<span class='prompt'>$ </span>mkdir -p archiv/2025/{01..12}\n<span class='prompt'>$ </span>tree archiv\n<span class='output'>archiv/\n└── 2025/\n    ├── 01/ ├── 02/ ... └── 12/</span>",note:"{01..12} ist Brace Expansion — erzeugt 12 Ordner mit einem Befehl."},{title:"Datei-Vorlage für Jahresablage",code:"<span class='comment'># Büro-Struktur für ein ganzes Jahr anlegen:</span>\n<span class='prompt'>$ </span>mkdir -p ~/Dokumente/2025/{Rechnungen/{Eingang,Ausgang},Vertraege,Steuern/{Belege,Bescheide},Projekte}\n\n<span class='prompt'>$ </span>tree ~/Dokumente/2025\n<span class='output'>2025/\n├── Projekte/\n├── Rechnungen/\n│   ├── Ausgang/\n│   └── Eingang/\n├── Steuern/\n│   ├── Belege/\n│   └── Bescheide/\n└── Vertraege/</span>",note:"Diese Struktur einmal anlegen, dann als Template kopieren: cp -r 2025 2026"}], tags:["Workflow","Ordner","Dateiverwaltung","Alltag"] },
