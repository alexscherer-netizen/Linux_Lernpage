<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Lernpage</title>
<style>
  :root {
    --bg: #f0f5eb;
    --sidebar-bg: #e2edcf;
    --card-bg: #ffffff;
    --border: #c0d8a0;
    --accent: #3d7a28;
    --accent2: #2e6b1e;
    --accent3: #b83c1e;
    --accent4: #6b4fa8;
    --text: #1a2914;
    --text-muted: #547050;
    --code-bg: #1a2614;
    --code-text: #a0d068;
    --tag-bg: #ddeecb;
    --hover: #cfe3b8;
    --header-bg: #2e6b1e;
    --active-bg: #c8e0ae;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--header-bg); border-bottom: 2px solid #255018; padding: 11px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .logo { font-size: 21px; font-weight: 800; color: #d8f0b8; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
  .logo span { color: #a8e060; }
  .search-wrap { flex: 1; max-width: 420px; position: relative; }
  .search-wrap input { width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 12px 8px 36px; border-radius: 8px; font-size: 14px; outline: none; transition: all 0.2s; }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.55); }
  .search-wrap input:focus { background: rgba(255,255,255,0.22); border-color: #a8e060; }
  .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.7); font-size: 14px; }
  .badge { background: #a8e060; color: #1a2914; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; margin-left: auto; white-space: nowrap; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 215px; background: var(--sidebar-bg); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #b0cc90; border-radius: 4px; }
  .cat-header { padding: 13px 15px 5px; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }
  .cat-item { display: flex; align-items: center; gap: 9px; padding: 8px 15px; cursor: pointer; font-size: 13px; color: #3a5a30; transition: all 0.15s; border-left: 3px solid transparent; font-weight: 500; }
  .cat-item:hover { background: var(--hover); color: var(--text); }
  .cat-item.active { background: var(--active-bg); color: var(--accent2); border-left-color: var(--accent); font-weight: 700; }
  .cat-item .cat-icon { font-size: 15px; width: 20px; text-align: center; }
  .cat-count { margin-left: auto; background: #c8ddb0; color: #3a5a30; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
  .cmd-list { width: 210px; background: #f8fbf4; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .cmd-list::-webkit-scrollbar { width: 4px; }
  .cmd-list::-webkit-scrollbar-thumb { background: #b0cc90; border-radius: 4px; }
  .cmd-list-header { padding: 12px 13px 9px; font-size: 11px; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.8px; }
  .cmd-item { padding: 9px 13px; cursor: pointer; border-bottom: 1px solid #eaf3e0; transition: all 0.13s; }
  .cmd-item:hover { background: var(--hover); }
  .cmd-item.active { background: var(--active-bg); border-left: 3px solid var(--accent); }
  .cmd-name { font-family: 'Consolas','Courier New',monospace; font-size: 14px; font-weight: 700; color: var(--accent2); }
  .cmd-item.active .cmd-name { color: var(--accent); }
  .cmd-short { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .no-results { padding: 20px 13px; color: var(--text-muted); font-size: 13px; text-align: center; }
  .detail { flex: 1; overflow-y: auto; padding: 26px 34px; background: var(--bg); }
  .detail::-webkit-scrollbar { width: 6px; }
  .detail::-webkit-scrollbar-thumb { background: #b8cfa0; border-radius: 4px; }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; gap: 12px; }
  .welcome .big { font-size: 64px; }
  .welcome h2 { font-size: 22px; color: var(--text); font-weight: 700; }
  .welcome p { font-size: 14px; max-width: 340px; line-height: 1.7; }
  .detail-header { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 2px solid var(--border); }
  .detail-cmd { font-family: 'Consolas',monospace; font-size: 34px; font-weight: 800; color: var(--accent2); }
  .detail-category { display: inline-block; margin-top: 6px; font-size: 11px; background: var(--tag-bg); color: var(--accent2); padding: 3px 10px; border-radius: 12px; font-weight: 700; border: 1px solid var(--border); }
  .detail-desc { margin-top: 13px; font-size: 15px; color: var(--text); line-height: 1.75; }
  .section { margin-top: 26px; }
  .section-title { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent2); margin-bottom: 11px; padding-bottom: 5px; border-bottom: 2px solid var(--border); }
  .syntax-box { background: var(--code-bg); border: 1px solid #2e4820; border-radius: 9px; padding: 13px 18px; font-family: 'Consolas',monospace; font-size: 15px; color: #c8e890; overflow-x: auto; }
  .syntax-box .opt-part { color: #90c8f0; }
  .syntax-box .arg-part { color: #f0b870; }
  .options-grid { display: flex; flex-direction: column; gap: 7px; }
  .option-row { display: flex; align-items: flex-start; gap: 13px; padding: 9px 13px; background: var(--card-bg); border-radius: 7px; border: 1px solid var(--border); }
  .option-flag { font-family: 'Consolas',monospace; font-size: 13px; color: var(--accent4); min-width: 110px; font-weight: 700; }
  .option-desc { font-size: 13px; color: var(--text); line-height: 1.5; }
  .examples { display: flex; flex-direction: column; gap: 13px; }
  .example-block { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .example-title { background: var(--tag-bg); padding: 7px 13px; font-size: 12px; color: var(--accent2); font-weight: 700; border-bottom: 1px solid var(--border); }
  .example-code { background: var(--code-bg); padding: 13px 17px; font-family: 'Consolas',monospace; font-size: 13px; color: var(--code-text); line-height: 1.85; overflow-x: auto; }
  .example-code .prompt { color: #68a840; user-select: none; }
  .example-code .output { color: #c8ddb8; font-size: 12px; }
  .example-code .comment { color: #5a7a48; }
  .example-note { padding: 9px 13px; font-size: 12px; color: var(--text-muted); background: #f4f9ef; border-top: 1px solid var(--border); line-height: 1.6; }
  .tip-box { margin-top: 18px; background: #eaf5da; border: 1px solid #aad080; border-radius: 9px; padding: 12px 16px; display: flex; gap: 11px; }
  .tip-box .tip-text { font-size: 13px; color: #2e5a1a; line-height: 1.65; }
  .warn-box { margin-top: 10px; background: #fdf0ec; border: 1px solid #e8a090; border-radius: 9px; padding: 12px 16px; display: flex; gap: 11px; }
  .warn-box .tip-text { font-size: 13px; color: #8a2010; line-height: 1.65; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
  .tag { background: var(--tag-bg); color: var(--accent2); font-size: 11px; padding: 3px 9px; border-radius: 12px; border: 1px solid var(--border); font-weight: 600; }

  /* === Mobile Nav Bar (hidden on desktop) === */
  .mobile-nav { display: none; background: var(--header-bg); border-top: 2px solid #1a4810; flex-shrink: 0; }
  .mobile-nav-btn { flex: 1; padding: 8px 4px 6px; cursor: pointer; color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 600; border: none; background: none; display: flex; flex-direction: column; align-items: center; gap: 3px; border-top: 3px solid transparent; transition: all 0.15s; }
  .mobile-nav-btn .nav-icon { font-size: 20px; }
  .mobile-nav-btn.active { color: #a8e060; border-top-color: #a8e060; }

  /* === Tablet (769–1100px): schmalere Spalten === */
  @media (max-width: 1100px) {
    .sidebar { width: 175px; }
    .cmd-list { width: 175px; }
    .detail { padding: 20px 22px; }
    .detail-cmd { font-size: 28px; }
  }

  /* === Smartphone & kleines Tablet (≤768px): Ein-Panel-Modus === */
  @media (max-width: 768px) {
    body { overflow: hidden; }
    header { padding: 9px 12px; gap: 10px; }
    .logo { font-size: 16px; }
    .search-wrap { max-width: none; }
    .badge { font-size: 10px; padding: 2px 7px; }
    .main { position: relative; overflow: hidden; }
    .sidebar, .cmd-list, .detail {
      position: absolute; inset: 0; width: 100%;
      display: none; border-right: none; overflow-y: auto;
    }
    .sidebar.panel-active, .cmd-list.panel-active, .detail.panel-active { display: block; }
    .detail { padding: 14px 13px; }
    .detail-cmd { font-size: 24px; }
    .detail-desc { font-size: 14px; }
    .option-row { flex-wrap: wrap; gap: 4px; }
    .option-flag { min-width: unset; font-size: 12px; }
    .option-desc { font-size: 12px; }
    .example-code { font-size: 12px; padding: 10px 12px; }
    .syntax-box { font-size: 13px; padding: 10px 13px; }
    .welcome .big { font-size: 48px; }
    .welcome h2 { font-size: 18px; }
    .mobile-nav { display: flex !important; }
  }

  /* === Zurück-Button (nur Mobile) === */
  .mobile-back-btn { display: none; align-items: center; gap: 5px; background: none; border: none; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer; padding: 0; margin-bottom: 4px; }
  .mobile-back-btn:active { opacity: 0.7; }
  @media (max-width: 768px) {
    .mobile-back-btn { display: inline-flex; }
    .cmd-list-header { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; }
    .mobile-back-detail { margin: 0 0 10px 0; padding: 10px 0 8px; border-bottom: 1px solid var(--border); width: 100%; }
  }

  /* === Extra-klein (≤420px) === */
  @media (max-width: 420px) {
    .logo .logo-text { display: none; }
    .badge { display: none; }
    .search-wrap input { font-size: 13px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">🌿 Linux<span>Lernen</span></div>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Befehl suchen... (z.B. grep, chmod, useradd)">
  </div>
  <div class="badge" id="totalBadge">…</div>
</header>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="cmd-list" id="cmdList"></div>
  <div class="detail" id="detail">
    <div class="welcome">
      <div class="big">🌿</div>
      <h2>Willkommen zur Linux-Lernpage</h2>
      <p>Wähle links eine Kategorie, dann klicke auf einen Befehl für eine ausführliche Erklärung mit Beispielen.</p>
    </div>
  </div>
</div>
<div class="mobile-nav" id="mobileNav">
  <button class="mobile-nav-btn active" id="mnavCat" onclick="showMobilePanel('sidebar')"><span class="nav-icon">📂</span><span>Kategorien</span></button>
  <button class="mobile-nav-btn" id="mnavCmd" onclick="showMobilePanel('cmdList')"><span class="nav-icon">📋</span><span>Befehle</span></button>
  <button class="mobile-nav-btn" id="mnavDet" onclick="showMobilePanel('detail')"><span class="nav-icon">📖</span><span>Detail</span></button>
</div>

  "Logs & Monitoring": {
    icon:"📊", commands:[
      { name:"journalctl", short:"Systemd-Logs durchsuchen", desc:"Liest und durchsucht die systemd Journal-Logs. Zentrale Anlaufstelle für alle Systemlogs.", syntax:"<b>journalctl</b> <span class='opt-part'>[Optionen]</span>", options:[{flag:"-f",desc:"Live-Modus — neue Einträge anzeigen"},{flag:"-n N",desc:"Letzte N Einträge"},{flag:"-u DIENST",desc:"Logs eines bestimmten Dienstes"},{flag:"-p err",desc:"Nur Fehler (err, warn, info, debug)"},{flag:"--since '1h ago'",desc:"Ab bestimmtem Zeitpunkt"},{flag:"--until '10:00'",desc:"Bis bestimmten Zeitpunkt"},{flag:"-b",desc:"Logs seit letztem Boot"},{flag:"-k",desc:"Nur Kernel-Meldungen"},{flag:"--no-pager",desc:"Ohne Pager (für Pipes)"}], examples:[{title:"Nginx-Logs live verfolgen",code:"<span class='prompt'>$ </span>journalctl -u nginx -f\n<span class='comment'># Neue Log-Einträge erscheinen sofort</span>",note:"-u = unit (Dienst), -f = follow."},{title:"Nur Fehler der letzten Stunde",code:"<span class='prompt'>$ </span>journalctl -p err --since '1 hour ago'\n<span class='output'>Mai 07 10:15:03 kernel: ERROR: Disk I/O error</span>",note:"-p err = nur Fehler-Level und höher."},{title:"Logs seit letztem Boot",code:"<span class='prompt'>$ </span>journalctl -b\n<span class='comment'># Alle Logs seit dem letzten Neustart</span>",note:"-b 0 = aktueller Boot, -b -1 = vorheriger Boot."},{title:"Nach Zeitraum suchen",code:"<span class='prompt'>$ </span>journalctl --since '2024-05-07 09:00' --until '2024-05-07 10:00'",note:"Nützlich bei der Fehleranalyse zu bestimmter Zeit."}], tip:"journalctl -f -u ssh zeigt SSH-Login-Versuche in Echtzeit — gut zur Sicherheitsüberwachung.", tags:["Logs","Monitoring","System"] },
      { name:"dmesg", short:"Kernel-Meldungen anzeigen", desc:"Zeigt den Kernel-Ring-Buffer. Wichtig bei Hardware-Problemen, Boot-Fehlern und Treiber-Problemen.", syntax:"<b>dmesg</b> <span class='opt-part'>[Optionen]</span>", options:[{flag:"-H",desc:"Menschenlesbar mit Zeitstempeln"},{flag:"-w",desc:"Neue Meldungen live verfolgen"},{flag:"--level=err",desc:"Nur Fehler anzeigen"},{flag:"-T",desc:"Zeitstempel lesbar darstellen"},{flag:"| tail -20",desc:"Letzte 20 Kernel-Meldungen"}], examples:[{title:"Fehler und Warnungen",code:"<span class='prompt'>$ </span>dmesg --level=err,warn\n<span class='output'>[12345.678] ata1: SATA link down\n[12346.001] EXT4-fs error on sda1</span>",note:"Zeigt nur kritische Kernel-Meldungen."},{title:"USB-Gerät erkennen",code:"<span class='prompt'>$ </span>dmesg -w\n<span class='comment'># USB einstecken — Meldungen erscheinen sofort</span>",note:"-w = watch: wartet auf neue Kernel-Meldungen."},{title:"Neueste Meldungen",code:"<span class='prompt'>$ </span>dmesg -T | tail -30",note:"-T = lesbarer Zeitstempel statt Sekunden seit Boot."}], tip:"Wenn Hardware nicht erkannt wird, ist dmesg der erste Ort zum Suchen.", tags:["Logs","Hardware","Kernel"] },
      { name:"tail -f", short:"Log-Datei live beobachten", desc:"Verfolgt Log-Dateien in Echtzeit. Grundlage für jedes Debugging auf Linux-Systemen.", syntax:"<b>tail -f</b> <span class='arg-part'>Logdatei</span>", options:[{flag:"-f",desc:"Follow — neue Zeilen erscheinen automatisch"},{flag:"-F",desc:"Auch bei Log-Rotation weiterverfolgen"},{flag:"-n N",desc:"Erste N Zeilen vor dem Folgen anzeigen"}], examples:[{title:"Apache-Fehler verfolgen",code:"<span class='prompt'>$ </span>tail -f /var/log/apache2/error.log",note:"Jeder neue Fehler erscheint sofort."},{title:"Mehrere Logs gleichzeitig",code:"<span class='prompt'>$ </span>tail -f /var/log/nginx/access.log \\\n         /var/log/nginx/error.log",note:"Mehrere Dateien gleichzeitig verfolgen — Dateiname wird jeweils angezeigt."},{title:"Mit grep filtern",code:"<span class='prompt'>$ </span>tail -f /var/log/auth.log | grep 'Failed'",note:"Zeigt nur fehlgeschlagene SSH-Logins in Echtzeit."}], tip:"tail -F (großes F) ist besser als -f: funktioniert auch wenn die Datei rotiert wird.", tags:["Logs","Monitoring"] },
      { name:"logger", short:"Meldungen ins Syslog schreiben", desc:"Schreibt Meldungen in das System-Log (/var/log/syslog). Nützlich in Skripten.", syntax:"<b>logger</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>'Nachricht'</span>", options:[{flag:"-t TAG",desc:"Tag/Identifier für die Meldung"},{flag:"-p PRIORITÄT",desc:"Priorität setzen (user.info, user.error)"},{flag:"-s",desc:"Auch auf stderr ausgeben"}], examples:[{title:"Einfache Meldung loggen",code:"<span class='prompt'>$ </span>logger 'Backup abgeschlossen'\n<span class='prompt'>$ </span>tail -1 /var/log/syslog\n<span class='output'>Mai  7 12:00:00 meinpc max: Backup abgeschlossen</span>",note:"Meldung landet in /var/log/syslog."},{title:"In Skript verwenden",code:"<span class='prompt'>$ </span>logger -t 'mein-skript' -p user.error 'Fehler beim Backup!'",note:"-t setzt einen erkennbaren Tag für grep."}], tip:"logger ist ideal in Cron-Jobs und Skripten um Status ins Syslog zu schreiben.", tags:["Logs","Skripting"] },
      { name:"logrotate", short:"Log-Dateien rotieren", desc:"Verwaltet und rotiert Log-Dateien automatisch — verhindert dass Logs zu groß werden.", syntax:"<b>logrotate</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Konfigdatei</span>", options:[{flag:"-v",desc:"Verbose — zeigt was passiert"},{flag:"-d",desc:"Debug/Simulation — keine echten Änderungen"},{flag:"-f",desc:"Rotation erzwingen (force)"}], examples:[{title:"Konfiguration testen",code:"<span class='prompt'>$ </span>sudo logrotate -d /etc/logrotate.conf\n<span class='comment'># Simuliert Rotation ohne echte Änderungen</span>",note:"-d = dry run: sicher zum Testen."},{title:"Rotation erzwingen",code:"<span class='prompt'>$ </span>sudo logrotate -f /etc/logrotate.d/nginx",note:"-f erzwingt sofortige Rotation."},{title:"Typische Konfiguration",code:"<span class='comment'># /etc/logrotate.d/mein-app</span>\n/var/log/mein-app/*.log {\n    daily\n    rotate 14\n    compress\n    missingok\n    notifempty\n}",note:"daily=täglich, rotate 14=14 Versionen behalten, compress=komprimieren."}], tip:"Logrotate wird täglich automatisch von cron ausgeführt — meist keine manuelle Aktion nötig.", tags:["Logs","Verwaltung"] },
      { name:"iostat", short:"Disk I/O Statistiken", desc:"Zeigt CPU- und Festplatten-I/O-Statistiken. Teil des sysstat-Pakets.", syntax:"<b>iostat</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>[Intervall] [Anzahl]</span>", options:[{flag:"-x",desc:"Erweiterte Statistiken"},{flag:"-d",desc:"Nur Disk-Statistiken"},{flag:"-c",desc:"Nur CPU-Statistiken"},{flag:"-h",desc:"Lesbare Größen"},{flag:"-m",desc:"In Megabytes anzeigen"}], examples:[{title:"Disk-Auslastung",code:"<span class='prompt'>$ </span>iostat -x 2 5\n<span class='output'>Device  r/s  w/s  rkB/s  wkB/s  await  util%\nsda     0.5  2.1   20.0   84.0   1.23   5.2%</span>",note:"Alle 2 Sekunden, 5 Mal wiederholen."},{title:"Installation",code:"<span class='prompt'>$ </span>sudo apt install sysstat",note:"iostat ist Teil des sysstat-Pakets."}], tip:"util% nahe 100% zeigt dass die Festplatte ein Bottleneck ist.", tags:["Monitoring","Performance","Disk"] },
      { name:"vmstat", short:"Speicher und CPU Statistiken", desc:"Zeigt Statistiken über virtuellen Speicher, Prozesse, I/O, CPU. VM = Virtual Memory.", syntax:"<b>vmstat</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>[Intervall] [Anzahl]</span>", options:[{flag:"-s",desc:"Statistiken als Tabelle"},{flag:"-d",desc:"Disk-Statistiken"},{flag:"-t",desc:"Zeitstempel anzeigen"},{flag:"-w",desc:"Breite Ausgabe"}], examples:[{title:"System-Überblick",code:"<span class='prompt'>$ </span>vmstat 2 5\n<span class='output'>procs -memory- --swap- ---io-- -cpu-\n r  b  swpd  free  si  so  bi  bo  us sy id wa\n 1  0     0 4096M   0   0   5  10   2  1 97  0</span>",note:"id=idle%, wa=IO-wait%, us=user%, sy=system%."},{title:"Speicher-Übersicht",code:"<span class='prompt'>$ </span>vmstat -s\n<span class='output'>16384000 K Gesamtspeicher\n 4096000 K freier Speicher\n 8192000 K Puffer/Cache</span>",note:"-s zeigt Speicher-Zusammenfassung."}], tip:"wa (IO-wait) über 20% deutet auf ein Festplatten-Problem hin.", tags:["Monitoring","Performance","RAM"] },
      { name:"lsof", short:"Geöffnete Dateien anzeigen", desc:"Listet alle geöffneten Dateien und Netzwerkverbindungen. LSOF = LiSt Open Files.", syntax:"<b>lsof</b> <span class='opt-part'>[Optionen]</span>", options:[{flag:"-u Benutzer",desc:"Dateien eines bestimmten Benutzers"},{flag:"-p PID",desc:"Dateien eines bestimmten Prozesses"},{flag:"-i :PORT",desc:"Prozess auf bestimmtem Port finden"},{flag:"-i TCP",desc:"Alle TCP-Verbindungen"},{flag:"+D ORDNER",desc:"Geöffnete Dateien in Ordner"},{flag:"-n",desc:"Keine DNS-Auflösung (schneller)"}], examples:[{title:"Wer nutzt Port 80?",code:"<span class='prompt'>$ </span>sudo lsof -i :80\n<span class='output'>COMMAND  PID     USER  TYPE  NODE NAME\nnginx    1234 www-data  IPv4  TCP *:http (LISTEN)</span>",note:"Zeigt welcher Prozess auf Port 80 lauscht."},{title:"Dateien eines Prozesses",code:"<span class='prompt'>$ </span>lsof -p 1234\n<span class='comment'># Alle von PID 1234 geöffneten Dateien</span>",note:"Nützlich beim Debuggen von Prozessen."},{title:"Gelöschte aber noch offene Dateien",code:"<span class='prompt'>$ </span>lsof | grep deleted\n<span class='comment'># Zeigt gelöschte Dateien die noch genutzt werden</span>",note:"Wichtig wenn df vollen Disk zeigt aber du keine Dateien findest."}], tip:"lsof +D /var/log zeigt alle Prozesse die gerade in /var/log schreiben.", tags:["Monitoring","Netzwerk","Prozesse"] },
      { name:"strace", short:"Systemaufrufe verfolgen", desc:"Verfolgt alle Systemaufrufe (syscalls) eines Prozesses. Unverzichtbar beim tiefen Debugging.", syntax:"<b>strace</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Befehl | -p PID</span>", options:[{flag:"-p PID",desc:"An laufenden Prozess anhängen"},{flag:"-e trace=open",desc:"Nur bestimmte Syscalls (open, read, write...)"},{flag:"-o Datei",desc:"Ausgabe in Datei schreiben"},{flag:"-f",desc:"Kindprozesse mitverfolgen"},{flag:"-c",desc:"Statistik statt Trace"}], examples:[{title:"Programm beim Start verfolgen",code:"<span class='prompt'>$ </span>strace ls /etc 2>&1 | head -20\n<span class='output'>execve('/bin/ls', ...) = 0\nopenat(AT_FDCWD, '/etc', ...) = 3\nread(3, ...) = 4096</span>",note:"Zeigt jeden Systemaufruf den ls macht."},{title:"Nur Datei-Öffnungen",code:"<span class='prompt'>$ </span>strace -e trace=openat python3 app.py 2>&1 | grep -v ENOENT",note:"Zeigt welche Dateien ein Programm öffnet."},{title:"An laufenden Prozess",code:"<span class='prompt'>$ </span>sudo strace -p 1234 -o /tmp/trace.txt",note:"Hängt sich an laufenden Prozess an."}], tip:"strace -c zeigt eine Zusammenfassung — nützlich um langsame Syscalls zu finden.", tags:["Monitoring","Debugging","Erweitert"] },

      { name:"nmap", short:"Netzwerk und Ports scannen", desc:"Network Mapper — scannt Hosts, offene Ports, Dienste und Betriebssysteme. Mächtiges Sicherheits-Tool.", syntax:"<b>nmap</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Ziel</span>", options:[{flag:"-sS",desc:"SYN-Scan (schnell, Standard mit Root)"},{flag:"-sV",desc:"Dienst-Versionen erkennen"},{flag:"-O",desc:"Betriebssystem erkennen"},{flag:"-p PORT",desc:"Bestimmten Port scannen"},{flag:"-p-",desc:"Alle 65535 Ports scannen"},{flag:"-A",desc:"Aggressiv: OS + Versionen + Scripts"},{flag:"--open",desc:"Nur offene Ports anzeigen"},{flag:"-v",desc:"Verbose — mehr Details"}], examples:[{title:"Einfacher Port-Scan",code:"<span class='prompt'>$ </span>nmap 192.168.1.1\n<span class='output'>PORT    STATE  SERVICE\n22/tcp  open   ssh\n80/tcp  open   http\n443/tcp open   https</span>",note:"Zeigt offene Ports auf dem Ziel-Host."},{title:"Dienste und Versionen",code:"<span class='prompt'>$ </span>nmap -sV 192.168.1.1\n<span class='output'>22/tcp open  ssh     OpenSSH 8.9\n80/tcp open  http    nginx 1.18.0</span>",note:"-sV erkennt Dienst-Versionen."},{title:"Ganzes Netzwerk scannen",code:"<span class='prompt'>$ </span>nmap -sn 192.168.1.0/24\n<span class='comment'># Zeigt alle aktiven Hosts im Netz</span>",note:"-sn = Ping-Scan: keine Ports, nur aktive Hosts."},{title:"Bestimmten Port auf allen Hosts",code:"<span class='prompt'>$ </span>nmap -p 22 192.168.1.0/24 --open",note:"Zeigt alle Hosts im Netz mit offenem Port 22."}], warn:"Nmap nur auf eigenen Systemen oder mit ausdrücklicher Erlaubnis nutzen — unerlaubtes Scannen ist illegal!", tags:["Netzwerk","Sicherheit","Scanner"] },
      { name:"dig", short:"DNS-Abfragen durchführen", desc:"Domain Information Groper — führt DNS-Abfragen durch und zeigt detaillierte Antworten. Besser als nslookup.", syntax:"<b>dig</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Domain [@Server]</span>", options:[{flag:"+short",desc:"Nur das Ergebnis, kein Rauschen"},{flag:"-t MX",desc:"Mail-Server abfragen"},{flag:"-t NS",desc:"Nameserver abfragen"},{flag:"-t TXT",desc:"TXT-Einträge (SPF, DKIM...)"},{flag:"-t AAAA",desc:"IPv6-Adresse abfragen"},{flag:"-x IP",desc:"Reverse-Lookup (IP → Domain)"},{flag:"@8.8.8.8",desc:"Bestimmten DNS-Server verwenden"}], examples:[{title:"IP-Adresse einer Domain",code:"<span class='prompt'>$ </span>dig google.com +short\n<span class='output'>142.250.74.46</span>",note:"+short gibt nur das Ergebnis ohne Details."},{title:"Mail-Server abfragen",code:"<span class='prompt'>$ </span>dig -t MX gmail.com +short\n<span class='output'>10 alt1.gmail-smtp-in.l.google.com.\n20 alt2.gmail-smtp-in.l.google.com.</span>",note:"MX-Records zeigen welche Server E-Mails empfangen."},{title:"Reverse-Lookup",code:"<span class='prompt'>$ </span>dig -x 8.8.8.8 +short\n<span class='output'>dns.google.</span>",note:"-x = IP zu Hostname auflösen."},{title:"Anderen DNS-Server nutzen",code:"<span class='prompt'>$ </span>dig @1.1.1.1 example.com +short\n<span class='comment'># @1.1.1.1 = Cloudflare DNS</span>",note:"Nützlich um DNS-Probleme zu diagnostizieren."}], tip:"dig +trace domain.com zeigt den kompletten DNS-Auflösungsweg vom Root-Server an.", tags:["Netzwerk","DNS","Diagnose"] },
      { name:"nslookup", short:"DNS schnell abfragen", desc:"Einfacheres DNS-Tool als dig. Auf allen Systemen verfügbar — gut für schnelle Lookups.", syntax:"<b>nslookup</b> <span class='arg-part'>Domain [Server]</span>", options:[{flag:"nslookup domain",desc:"A-Record (IPv4) abfragen"},{flag:"nslookup -type=MX",desc:"Mail-Server abfragen"},{flag:"nslookup -type=NS",desc:"Nameserver abfragen"},{flag:"nslookup IP",desc:"Reverse-Lookup"}], examples:[{title:"Domain auflösen",code:"<span class='prompt'>$ </span>nslookup google.com\n<span class='output'>Server:  192.168.1.1\nName:    google.com\nAddress: 142.250.74.46</span>",note:"Zeigt auch welcher DNS-Server gefragt wurde."},{title:"Mit bestimmtem DNS-Server",code:"<span class='prompt'>$ </span>nslookup google.com 8.8.8.8\n<span class='comment'># Fragt Googles DNS direkt</span>",note:"Gut um lokale DNS-Probleme auszuschließen."}], tip:"nslookup ist auf Windows und Linux verfügbar — praktisch für schnelle Checks.", tags:["Netzwerk","DNS"] },
      { name:"mtr", short:"Traceroute + Ping kombiniert", desc:"My Traceroute — kombiniert traceroute und ping in einem Live-Tool. Zeigt Paketverlust pro Hop.", syntax:"<b>mtr</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Host</span>", options:[{flag:"--report",desc:"Bericht-Modus (nicht interaktiv)"},{flag:"-n",desc:"Keine DNS-Auflösung"},{flag:"-c N",desc:"N Pakete senden dann stoppen"},{flag:"--tcp",desc:"TCP statt ICMP verwenden"},{flag:"-P PORT",desc:"Bestimmten Port nutzen"}], examples:[{title:"Interaktiver Modus",code:"<span class='prompt'>$ </span>mtr google.com\n<span class='output'>Host              Loss%  Avg\n1. 192.168.1.1     0.0%  1.2\n2. 10.0.0.1        0.0%  5.3\n3. ???           100.0%  --\n10. 142.250.74.46  0.0% 12.4</span>",note:"Live-Anzeige — aktualisiert sich ständig. q zum Beenden."},{title:"Als Bericht",code:"<span class='prompt'>$ </span>mtr --report -c 20 google.com\n<span class='comment'># Sendet 20 Pakete, dann Bericht</span>",note:"--report ist gut für Logs und Tickets."},{title:"Installation",code:"<span class='prompt'>$ </span>sudo apt install mtr",note:"Muss meist installiert werden."}], tip:"Paketverlust nur bei mittleren Hops aber nicht am Ziel = meist kein echtes Problem (Router blockiert ICMP).", tags:["Netzwerk","Diagnose","Monitoring"] },
      { name:"netcat (nc)", short:"Netzwerk-Schweizer-Taschenmesser", desc:"Liest und schreibt Daten über Netzwerkverbindungen. TCP/UDP-Verbindungen testen, Dateien übertragen, einfache Server.", syntax:"<b>nc</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Host Port</span>", options:[{flag:"-l",desc:"Lauschen (Server-Modus)"},{flag:"-v",desc:"Verbose — Verbindungsdetails"},{flag:"-z",desc:"Port-Scan ohne Daten (zero-I/O)"},{flag:"-u",desc:"UDP statt TCP"},{flag:"-w N",desc:"Timeout nach N Sekunden"},{flag:"-k",desc:"Nach Verbindungsende weiter lauschen"}], examples:[{title:"Port-Erreichbarkeit testen",code:"<span class='prompt'>$ </span>nc -zv google.com 443\n<span class='output'>Connection to google.com 443 port [tcp/https] succeeded!</span>",note:"-z prüft nur ob Port offen ist, -v zeigt Details."},{title:"Einfacher Chat (Server)",code:"<span class='prompt'>$ </span>nc -l 1234\n<span class='comment'># Wartet auf Verbindung</span>",note:"Auf Client-Seite: nc server-ip 1234"},{title:"Datei über Netzwerk senden",code:"<span class='comment'># Empfänger:</span>\n<span class='prompt'>$ </span>nc -l 1234 > empfangen.zip\n<span class='comment'># Sender:</span>\n<span class='prompt'>$ </span>nc ziel-ip 1234 < datei.zip",note:"Schnelle Dateiübertragung ohne SSH/SCP."},{title:"Mehrere Ports scannen",code:"<span class='prompt'>$ </span>nc -zv 192.168.1.1 20-25\n<span class='output'>Port 22 [tcp/ssh]: succeeded!</span>",note:"Scannt Port 20 bis 25."}], tip:"nc -zv host PORT ist der schnellste Weg zu prüfen ob ein Port von außen erreichbar ist.", tags:["Netzwerk","Diagnose","Tools"] },
      { name:"tcpdump", short:"Netzwerkpakete aufzeichnen", desc:"Zeichnet Netzwerkpakete auf und analysiert sie. Unverzichtbar für tiefes Netzwerk-Debugging.", syntax:"<b>tcpdump</b> <span class='opt-part'>[Optionen]</span> <span class='opt-part'>[Filter]</span>", options:[{flag:"-i eth0",desc:"Netzwerkinterface auswählen"},{flag:"-i any",desc:"Alle Interfaces mithören"},{flag:"-n",desc:"Keine DNS-Auflösung"},{flag:"-w datei.pcap",desc:"In Datei speichern (für Wireshark)"},{flag:"-r datei.pcap",desc:"Gespeicherte Datei lesen"},{flag:"-c N",desc:"Nur N Pakete aufzeichnen"},{flag:"port 80",desc:"Nur Port 80 filtern"},{flag:"host IP",desc:"Nur bestimmte IP"}], examples:[{title:"HTTP-Verkehr beobachten",code:"<span class='prompt'>$ </span>sudo tcpdump -i eth0 -n port 80\n<span class='output'>12:00:01 IP 192.168.1.5.54321 > 93.184.216.34.80: Flags [S]</span>",note:"Zeigt alle TCP-Pakete auf Port 80."},{title:"Bestimmten Host beobachten",code:"<span class='prompt'>$ </span>sudo tcpdump -i any host 192.168.1.5 -n",note:"Zeigt alle Pakete von/zu dieser IP."},{title:"Für Wireshark speichern",code:"<span class='prompt'>$ </span>sudo tcpdump -i eth0 -w aufzeichnung.pcap\n<span class='comment'># Strg+C zum Stoppen</span>\n<span class='comment'># Dann mit Wireshark öffnen</span>",note:".pcap Dateien können in Wireshark analysiert werden."},{title:"DNS-Abfragen beobachten",code:"<span class='prompt'>$ </span>sudo tcpdump -i any -n port 53",note:"Zeigt alle DNS-Anfragen und Antworten."}], warn:"tcpdump sieht unverschlüsselte Passwörter im Klartext — nur auf eigenen Systemen nutzen!", tags:["Netzwerk","Diagnose","Erweitert"] },
      { name:"host", short:"DNS schnell auflösen", desc:"Einfaches DNS-Lookup-Tool — schneller und knapper als dig.", syntax:"<b>host</b> <span class='opt-part'>[-t Typ]</span> <span class='arg-part'>Domain [Server]</span>", options:[{flag:"-t A",desc:"IPv4-Adresse"},{flag:"-t MX",desc:"Mail-Server"},{flag:"-t NS",desc:"Nameserver"},{flag:"-t TXT",desc:"TXT-Einträge"},{flag:"-a",desc:"Alle Einträge"}], examples:[{title:"Domain auflösen",code:"<span class='prompt'>$ </span>host google.com\n<span class='output'>google.com has address 142.250.74.46\ngoogle.com mail is handled by 10 smtp.google.com.</span>",note:"Gibt A- und MX-Records direkt aus."},{title:"Reverse-Lookup",code:"<span class='prompt'>$ </span>host 8.8.8.8\n<span class='output'>8.8.8.8.in-addr.arpa domain name pointer dns.google.</span>",note:"IP-Adresse zu Hostnamen auflösen."}], tip:"host ist schneller getippt als dig +short — gut für schnelle Checks.", tags:["Netzwerk","DNS"] },
      { name:"whois", short:"Domain-Informationen abfragen", desc:"Gibt Registrierungsinformationen zu Domains und IP-Adressen aus.", syntax:"<b>whois</b> <span class='arg-part'>Domain | IP</span>", options:[{flag:"-h SERVER",desc:"Bestimmten Whois-Server verwenden"}], examples:[{title:"Domain-Infos",code:"<span class='prompt'>$ </span>whois example.com\n<span class='output'>Domain Name: EXAMPLE.COM\nRegistrar: ICANN\nCreation Date: 1995-08-14\nName Server: a.iana-servers.net</span>",note:"Zeigt Registrar, Ablaufdatum, Nameserver."},{title:"IP-Inhaber abfragen",code:"<span class='prompt'>$ </span>whois 8.8.8.8\n<span class='output'>NetRange: 8.8.8.0 - 8.8.8.255\nOrganization: Google LLC</span>",note:"Zeigt wem ein IP-Bereich gehört."}], tip:"whois ist nützlich um verdächtige IPs einem Unternehmen oder Land zuzuordnen.", tags:["Netzwerk","DNS","Info"] },
      { name:"iperf3", short:"Netzwerkbandbreite messen", desc:"Misst die tatsächliche Netzwerkbandbreite zwischen zwei Hosts. Server und Client müssen das Tool haben.", syntax:"<b>iperf3</b> <span class='opt-part'>[-s | -c Host]</span> <span class='opt-part'>[Optionen]</span>", options:[{flag:"-s",desc:"Server-Modus (wartet auf Verbindung)"},{flag:"-c HOST",desc:"Client-Modus (verbindet zu Server)"},{flag:"-t N",desc:"N Sekunden testen (Standard: 10)"},{flag:"-u",desc:"UDP statt TCP"},{flag:"-R",desc:"Umgekehrte Richtung testen (Download)"},{flag:"-P N",desc:"N parallele Verbindungen"}], examples:[{title:"Server starten",code:"<span class='prompt'>$ </span>iperf3 -s\n<span class='output'>Server listening on 5201</span>",note:"Läuft im Vordergrund und wartet auf Clients."},{title:"Bandbreite messen (Client)",code:"<span class='prompt'>$ </span>iperf3 -c 192.168.1.10\n<span class='output'>[ ID] Interval    Transfer  Bitrate\n[  5] 0.0-10.0s   1.09 GB   941 Mbits/sec</span>",note:"Zeigt Upload-Bandbreite zum Server."},{title:"Download-Bandbreite testen",code:"<span class='prompt'>$ </span>iperf3 -c 192.168.1.10 -R",note:"-R kehrt Richtung um — misst Download vom Server."}], tip:"iperf3 -c HOST -u -b 100M testet UDP-Verbindung mit 100 Mbit/s — gut für VoIP/Streaming-Tests.", tags:["Netzwerk","Performance","Diagnose"] },
      { name:"arp", short:"ARP-Tabelle anzeigen", desc:"Zeigt und verwaltet die ARP-Tabelle — Zuordnung von IP-Adressen zu MAC-Adressen im lokalen Netz.", syntax:"<b>arp</b> <span class='opt-part'>[Optionen]</span> <span class='opt-part'>[Host]</span>", options:[{flag:"-a",desc:"ARP-Tabelle anzeigen"},{flag:"-n",desc:"Numerisch (keine Namen)"},{flag:"-d HOST",desc:"ARP-Eintrag löschen"},{flag:"ip neigh",desc:"Moderne Alternative (iproute2)"}], examples:[{title:"ARP-Tabelle anzeigen",code:"<span class='prompt'>$ </span>arp -a\n<span class='output'>gateway (192.168.1.1) at aa:bb:cc:dd:ee:ff [ether] eth0\npc2 (192.168.1.5) at 11:22:33:44:55:66 [ether] eth0</span>",note:"Zeigt alle bekannten Geräte im lokalen Netz."},{title:"Moderne Alternative",code:"<span class='prompt'>$ </span>ip neigh show\n<span class='output'>192.168.1.1 dev eth0 lladdr aa:bb:cc:dd:ee:ff REACHABLE</span>",note:"ip neigh ist die moderne Variante von arp."},{title:"Alle Geräte im Netz finden",code:"<span class='prompt'>$ </span>nmap -sn 192.168.1.0/24\n<span class='prompt'>$ </span>arp -a",note:"nmap erst alle anpingen, dann arp -a für MAC-Adressen."}], tip:"ARP-Spoofing erkennen: Wenn zwei IPs dieselbe MAC haben, stimmt etwas nicht.", tags:["Netzwerk","Diagnose"] }

ohne schriftlichen Auftrag einsetzen!", tags:["Pentesting","Exploitation","Metasploit"] },
      { name:"Hydra", short:"Passwörter brute-forcen", desc:"Online-Passwort-Angreifer für viele Protokolle: SSH, FTP, HTTP, RDP, MySQL u.v.m. Testet automatisch viele Passwörter.", syntax:"<b>hydra</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Ziel Dienst</span>", options:[{flag:"-l USER",desc:"Einzelner Benutzername"},{flag:"-L liste.txt",desc:"Benutzerliste aus Datei"},{flag:"-p PASS",desc:"Einzelnes Passwort"},{flag:"-P liste.txt",desc:"Passwortliste aus Datei"},{flag:"-t N",desc:"N parallele Verbindungen (Standard: 16)"},{flag:"-s PORT",desc:"Anderen Port verwenden"},{flag:"-v",desc:"Verbose — jeden Versuch anzeigen"},{flag:"-o ergebnis.txt",desc:"Gefundene Zugänge speichern"}], examples:[{title:"SSH-Login testen",code:"<span class='prompt'>$ </span>hydra -l root -P /usr/share/wordlists/rockyou.txt \\\n  ssh://192.168.1.5\n<span class='output'>[22][ssh] host: 192.168.1.5 login: root password: toor</span>",note:"rockyou.txt hat 14 Millionen häufige Passwörter."},{title:"HTTP-Login-Formular",code:"<span class='prompt'>$ </span>hydra -l admin -P passliste.txt \\\n  192.168.1.5 http-post-form \\\n  '/login:user=^USER^&pass=^PASS^:Wrong password'",note:"^USER^ und ^PASS^ sind Platzhalter die Hydra ersetzt."},{title:"Passwortliste entpacken (Kali)",code:"<span class='prompt'>$ </span>gunzip /usr/share/wordlists/rockyou.txt.gz",note:"In Kali ist rockyou.txt.gz vorinstalliert."}], legal:"Nur auf eigene Systeme oder mit schriftlicher Genehmigung anwenden. Brute-Force-Angriffe auf fremde Systeme sind strafbar.", tip:"Auf eigenen Systemen testen ob schwache Passwörter existieren — dann verstärken.", tags:["Pentesting","Passwörter","Brute-Force"] },
      { name:"John the Ripper", short:"Passwort-Hashes knacken", desc:"Offline-Passwort-Cracker — knackt Passwort-Hashes aus /etc/shadow, ZIP-Dateien, PDFs und mehr.", syntax:"<b>john</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>Hash-Datei</span>", options:[{flag:"--wordlist=datei.txt",desc:"Wörterbuch-Angriff mit Passwortliste"},{flag:"--rules",desc:"Regeln anwenden (Variationen)"},{flag:"--format=TYPE",desc:"Hash-Format angeben (md5, sha256, bcrypt...)"},{flag:"--show",desc:"Bereits geknackte Hashes anzeigen"},{flag:"john --list=formats",desc:"Alle unterstützten Formate"}], examples:[{title:"/etc/shadow cracken",code:"<span class='prompt'>$ </span>sudo unshadow /etc/passwd /etc/shadow > hashes.txt\n<span class='prompt'>$ </span>john --wordlist=/usr/share/wordlists/rockyou.txt hashes.txt\n<span class='output'>toor             (root)</span>",note:"unshadow kombiniert passwd und shadow für john."},{title:"ZIP-Passwort knacken",code:"<span class='prompt'>$ </span>zip2john geheim.zip > zip.hash\n<span class='prompt'>$ </span>john --wordlist=rockyou.txt zip.hash\n<span class='output'>password123      (geheim.zip)</span>",note:"zip2john extrahiert den Hash aus der ZIP-Datei."},{title:"Hash-Typ erkennen",code:"<span class='prompt'>$ </span>john --list=formats | grep -i sha\n<span class='comment'># john erkennt viele Formate automatisch</span>",note:"john versucht das Format automatisch zu erkennen."}], legal:"Nur auf eigene Hashes oder mit Genehmigung anwenden. Das Knacken fremder Passwörter ist eine Straftat.", tip:"hashcat ist die GPU-beschleunigte Alternative — deutlich schneller bei modernen Grafikkarten.", tags:["Pentesting","Passwörter","Hashes"] },
      { name:"hashcat", short:"GPU-Passwortcracking", desc:"Schnellstes Passwort-Cracking-Tool — nutzt GPU statt CPU. Bis zu 100x schneller als John the Ripper bei komplexen Hashes.", syntax:"<b>hashcat</b> <span class='opt-part'>-m MODE -a ATTACK</span> <span class='arg-part'>hashes.txt wordlist.txt</span>", options:[{flag:"-m 0",desc:"MD5 Hash"},{flag:"-m 100",desc:"SHA1 Hash"},{flag:"-m 1800",desc:"SHA-512 (Linux /etc/shadow)"},{flag:"-m 1000",desc:"NTLM (Windows)"},{flag:"-a 0",desc:"Wörterbuch-Angriff"},{flag:"-a 3",desc:"Brute-Force mit Maske"},{flag:"--show",desc:"Bereits geknackte Hashes anzeigen"},{flag:"-o gefunden.txt",desc:"Ergebnisse speichern"}], examples:[{title:"MD5-Hash mit Wörterbuch",code:"<span class='prompt'>$ </span>hashcat -m 0 -a 0 hash.txt rockyou.txt\n<span class='output'>5f4dcc3b5aa765d61d8327deb882cf99:password</span>\n<span class='output'>Status: Cracked</span>",note:"5f4dcc3b... ist der MD5-Hash von 'password'."},{title:"Hash-Typ bestimmen",code:"<span class='prompt'>$ </span>hashid '5f4dcc3b5aa765d61d8327deb882cf99'\n<span class='output'>[+] MD5\n[+] MD4</span>",note:"hashid errät das Format anhand des Hash-Aussehens."},{title:"Brute-Force mit Maske",code:"<span class='prompt'>$ </span>hashcat -m 0 -a 3 hash.txt '?d?d?d?d?d?d'\n<span class='comment'># Probiert alle 6-stelligen Zahlen (000000-999999)</span>",note:"?d=Ziffer, ?l=Kleinbuchstabe, ?u=Groß, ?s=Sonderzeichen."}], legal:"Nur auf eigene oder freigegebene Hashes anwenden. GPU-Cracking fremder Daten ist strafbar.", tip:"hashcat -m 0 hash.txt rockyou.txt --rules-file /usr/share/hashcat/rules/best64.rule probiert clevere Variationen.", tags:["Pentesting","Passwörter","GPU"] },
      { name:"Nikto", short:"Webserver-Schwachstellen scannen", desc:"Scannt Webserver auf bekannte Sicherheitslücken, veraltete Software, Fehlkonfigurationen und gefährliche Dateien.", syntax:"<b>nikto</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>-h Ziel</span>", options:[{flag:"-h URL",desc:"Ziel-Host oder URL"},{flag:"-p PORT",desc:"Anderen Port scannen"},{flag:"-ssl",desc:"HTTPS erzwingen"},{flag:"-o bericht.html",desc:"Bericht speichern (html, csv, txt)"},{flag:"-Tuning X",desc:"Scan-Typ filtern (1=Dateien, 2=Fehlkonfig...)"},{flag:"-useragent",desc:"Eigenen User-Agent setzen"}], examples:[{title:"Webserver scannen",code:"<span class='prompt'>$ </span>nikto -h http://192.168.1.5\n<span class='output'>+ Server: Apache/2.4.38\n+ /admin/: Admin-Verzeichnis gefunden\n+ /phpinfo.php: phpinfo() gibt sensible Infos preis\n+ OSVDB-3092: /backup/: Backup-Verzeichnis offen!</span>",note:"Nikto findet häufige Fehlkonfigurationen automatisch."},{title:"HTTPS-Scan mit Bericht",code:"<span class='prompt'>$ </span>nikto -h https://192.168.1.5 -ssl -o bericht.html\n<span class='comment'># Bericht als HTML-Datei</span>",note:"HTML-Bericht ist gut für Pentest-Dokumentation."}], legal:"Nur auf eigene oder autorisierte Webserver anwenden. Das Scannen fremder Server ohne Erlaubnis ist illegal.", tip:"Nikto ist laut und hinterlässt viele Logs — für unauffällige Tests gibt es speziellere Tools.", tags:["Pentesting","Web","Scanner"] },
      { name:"SQLmap", short:"SQL-Injection automatisch testen", desc:"Findet und nutzt SQL-Injection-Schwachstellen automatisch. Kann Datenbanken extrahieren, Dateien lesen und Befehle ausführen.", syntax:"<b>sqlmap</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>-u URL</span>", options:[{flag:"-u URL",desc:"Ziel-URL mit Parameter"},{flag:"--dbs",desc:"Datenbanken auflisten"},{flag:"-D DB --tables",desc:"Tabellen einer Datenbank"},{flag:"-D DB -T TABLE --dump",desc:"Tabelleninhalt ausgeben"},{flag:"--forms",desc:"Formulare automatisch finden"},{flag:"--batch",desc:"Alle Fragen automatisch beantworten"},{flag:"--level=5 --risk=3",desc:"Intensivster Scan"},{flag:"--proxy=http://127.0.0.1:8080",desc:"Über Burp Suite routen"}], examples:[{title:"URL auf SQLi testen",code:"<span class='prompt'>$ </span>sqlmap -u 'http://192.168.1.5/item?id=1' --dbs\n<span class='output'>[*] Parameter 'id' is vulnerable!\n[*] Available databases:\n    [0] information_schema\n    [1] webapp_db</span>",note:"Findet SQLi und listet alle Datenbanken auf."},{title:"Daten extrahieren",code:"<span class='prompt'>$ </span>sqlmap -u 'http://192.168.1.5/item?id=1' \\\n  -D webapp_db -T users --dump\n<span class='output'>id | username | password\n 1 | admin    | 5f4dcc3b...\n 2 | max      | $2y$10$...</span>",note:"Komplette Tabelle wird ausgegeben."},{title:"Formulare automatisch scannen",code:"<span class='prompt'>$ </span>sqlmap -u 'http://192.168.1.5/login' --forms --batch",note:"--forms findet Login-Felder automatisch, --batch bestätigt alles."}], legal:"Nur auf eigene oder explizit freigegebene Webapplikationen. SQLmap gegen fremde Webseiten einzusetzen ist eine schwere Straftat.", warn:"SQLmap kann Datenbanken beschädigen — immer zuerst auf Testumgebungen!", tags:["Pentesting","Web","SQL-Injection"] },
      { name:"Aircrack-ng", short:"WLAN-Sicherheit testen", desc:"Suite zum Testen von WLAN-Sicherheit: Pakete aufzeichnen, WPA-Handshakes aufzeichnen und Passwörter testen.", syntax:"<b>aircrack-ng</b> <span class='opt-part'>[Optionen]</span> <span class='arg-part'>capture.cap</span>", options:[{flag:"airmon-ng start wlan0",desc:"Monitor-Modus aktivieren"},{flag:"airodump-ng wlan0mon",desc:"Netzwerke scannen"},{flag:"airodump-ng -c CH --bssid MAC -w datei wlan0mon",desc:"Handshake aufzeichnen"},{flag:"aireplay-ng --deauth 10 -a MAC wlan0mon",desc:"Client trennen (Deauth)"},{flag:"aircrack-ng -w wordlist.txt capture.cap",desc:"Handshake mit Wörterbuch cracken"}], examples:[{title:"WPA2-Test-Ablauf",code:"<span class='comment'># 1. Monitor-Modus aktivieren:</span>\n<span class='prompt'>$ </span>sudo airmon-ng start wlan0\n<span class='comment'># 2. Netzwerke finden:</span>\n<span class='prompt'>$ </span>sudo airodump-ng wlan0mon\n<span class='comment'># 3. Handshake aufzeichnen:</span>\n<span class='prompt'>$ </span>sudo airodump-ng -c 6 --bssid AA:BB:CC:DD:EE:FF -w test wlan0mon\n<span class='comment'># 4. Passwort testen:</span>\n<span class='prompt'>$ </span>aircrack-ng -w rockyou.txt test.cap\n<span class='output'>KEY FOUND! [ meinwlan123 ]</span>",note:"Zeigt ob das eigene WLAN-Passwort in einer Wörterbuchliste steht."},{title:"Monitor-Modus beenden",code:"<span class='prompt'>$ </span>sudo airmon-ng stop wlan0mon\n<span class='prompt'>$ </span>sudo service NetworkManager restart",note:"Nach dem Test wieder in den normalen Modus wechseln."}], legal:"Ausschließlich auf eigene WLAN-Netze anwenden! Das Abhören oder Angreifen fremder WLANs ist nach § 202b StGB strafbar und kann zu Freiheitsstrafe führen.", warn:"WLAN-Adapter muss Monitor-Modus unterstützen — nicht alle Chips unterstützen das.", tags:["Pentesting","WLAN","Wireless"] },
      { name:"Gobuster", short:"Versteckte Webpfade finden", desc:"Findet versteckte Verzeichnisse, Dateien und DNS-Einträge durch Wörterbuch-Angriffe (Directory Busting).", syntax:"<b>gobuster</b> <span class='opt-part'>dir|dns|vhost</span> <span class='opt-part'>-u URL -w wordlist</span>", options:[{flag:"dir",desc:"Verzeichnisse und Dateien suchen"},{flag:"dns",desc:"DNS-Subdomains brute-forcen"},{flag:"-u URL",desc:"Ziel-URL"},{flag:"-w wordlist.txt",desc:"Wörterbuchliste"},{flag:"-x php,html,txt",desc:"Dateiendungen einschließen"},{flag:"-t 50",desc:"50 parallele Threads"},{flag:"-o ergebnis.txt",desc:"Ergebnisse speichern"},{flag:"-s 200,301",desc:"Nur bestimmte HTTP-Codes anzeigen"}], examples:[{title:"Verzeichnisse suchen",code:"<span class='prompt'>$ </span>gobuster dir -u http://192.168.1.5 \\\n  -w /usr/share/wordlists/dirb/common.txt\n<span class='output'>/admin        (Status: 301)\n/backup       (Status: 200)\n/config.php   (Status: 200)\n/uploads      (Status: 403)</span>",note:"Findet Bereiche die nicht verlinkt sind."},{title:"Mit Dateiendungen",code:"<span class='prompt'>$ </span>gobuster dir -u http://192.168.1.5 \\\n  -w common.txt -x php,txt,bak\n<span class='output'>/config.php.bak (Status: 200)</span>",note:"Backup-Dateien (.bak) enthalten oft Klartext-Passwörter."},{title:"Subdomains finden",code:"<span class='prompt'>$ </span>gobuster dns -d example.com \\\n  -w /usr/share/seclists/Discovery/DNS/subdomains-top1million.txt\n<span class='output'>dev.example.com\nstage.example.com\napi.example.com</span>",note:"Versteckte Subdomains sind oft schlechter gesichert."}], legal:"Nur auf eigene oder freigegebene Webseiten anwenden. Directory-Busting fremder Seiten ist illegal.", tip:"SecLists (sudo apt install seclists) hat die besten Wörterlisten für gobuster.", tags:["Pentesting","Web","Reconnaissance"] },
      { name:"Burp Suite", short:"Web-Anwendungen analysieren", desc:"Die Komplettlösung für Web-Pentesting. Fängt HTTP-Anfragen ab, manipuliert sie und findet Schwachstellen (XSS, SQLi, CSRF...).", syntax:"<b>burpsuite</b>  (GUI-Anwendung)", options:[{flag:"Proxy → Intercept",desc:"HTTP-Anfragen abfangen und bearbeiten"},{flag:"Repeater",desc:"Anfragen manuell wiederholen und verändern"},{flag:"Intruder",desc:"Automatisierte Angriffe (Fuzzing, Brute-Force)"},{flag:"Scanner (Pro)",desc:"Automatische Schwachstellen-Suche"},{flag:"Decoder",desc:"Base64, URL-Encoding, HTML kodieren/dekodieren"},{flag:"Comparer",desc:"Zwei Anfragen/Antworten vergleichen"}], examples:[{title:"Proxy einrichten",code:"<span class='comment'># 1. Burp Suite starten</span>\n<span class='comment'># 2. Browser-Proxy auf 127.0.0.1:8080 setzen</span>\n<span class='comment'># 3. Burp CA-Zertifikat installieren</span>\n<span class='comment'># 4. Webseite aufrufen → Anfragen erscheinen in Burp</span>",note:"Firefox + FoxyProxy Extension macht Proxy-Wechsel einfacher."},{title:"Repeater nutzen",code:"<span class='comment'># Anfrage in Proxy-Tab → Rechtsklick\n# → 'Send to Repeater'\n# Parameter ändern → Send\n# Antwort analysieren</span>",note:"Repeater ist ideal um SQL-Injection oder XSS manuell zu testen."},{title:"Intruder für Fuzzing",code:"<span class='comment'># Anfrage → Send to Intruder\n# Position markieren (§ § )\n# Payload-Liste laden (z.B. SQLi-Strings)\n# Start Attack → Antwortlängen vergleichen</span>",note:"Unterschiedliche Antwortlängen deuten auf Schwachstellen hin."}], legal:"Nur auf eigene oder explizit freigegebene Webanwendungen. Burp Suite Community Edition ist kostenlos.", tip:"OWASP WebGoat und DVWA sind legale Übungsumgebungen speziell für Web-Pentesting — perfekt zum Lernen.", tags:["Pentesting","Web","Proxy"] },
      { name:"CTF & Übungsplattformen", short:"Legale Lernumgebungen", desc:"Capture The Flag Competitions und Übungsplattformen bieten legale, kontrollierte Umgebungen um Hacking zu lernen — ohne rechtliche Risiken.", syntax:"<b>Keine Befehlssyntax</b> — Plattformen-Übersicht", options:[{flag:"HackTheBox",desc:"htb.com — Realistische Maschinen zum Hacken"},{flag:"TryHackMe",desc:"tryhackme.com — Geführte Lernpfade, ideal für Einsteiger"},{flag:"VulnHub",desc:"vulnhub.com — Kostenlose VMs zum Herunterladen"},{flag:"PicoCTF",desc:"picoctf.org — CTF für Schüler und Einsteiger"},{flag:"CTFtime",desc:"ctftime.org — Kalender aller CTF-Wettbewerbe"},{flag:"PortSwigger Web Academy",desc:"portswigger.net/web-security — Kostenloses Web-Pentesting"}], examples:[{title:"Empfohlener Lernpfad",code:"<span class='comment'># Einsteiger:\n# 1. TryHackMe — 'Pre-Security' Pfad\n# 2. TryHackMe — 'Jr Penetration Tester'\n# 3. VulnHub — einfache Maschinen (Mr. Robot, Basic Pentesting)\n\n# Fortgeschrittene:\n# 4. HackTheBox — Starting Point\n# 5. HackTheBox — Easy-Maschinen\n# 6. Eigene CTF-Teilnahme (CTFtime.org)</span>",note:"TryHackMe erklärt alles Schritt für Schritt — ideal für Anfänger."},{title:"Lokale Übungsumgebung",code:"<span class='comment'># DVWA (Damn Vulnerable Web App):</span>\n<span class='prompt'>$ </span>sudo apt install dvwa\n<span class='comment'># Metasploitable2 (absichtlich unsicher):</span>\n<span class='comment'># Als VM herunterladen von Rapid7</span>",note:"DVWA und Metasploitable2 sind absichtlich unsichere Systeme zum Üben."}], legal:"Diese Plattformen sind explizit für legales Hacking-Training gedacht. Wende das Gelernte nur in autorisierten Umgebungen an.", tip:"TryHackMe ist der beste Einstieg — kostenlos, geführt und ideal für absolute Anfänger.", tags:["Pentesting","Lernen","CTF"] }
    ]

  "Git": {
    icon: "🌿",
    commands: [
      { name:"git init", short:"Repository initialisieren", desc:"Erstellt ein neues lokales Git-Repository im aktuellen Verzeichnis. Legt den .git-Ordner mit allen Metadaten an.", syntax:"<b>git init</b> <span class='opt-part'>[Verzeichnis]</span>", options:[{flag:"git init",desc:"Repo im aktuellen Ordner erstellen"},{flag:"git init mein-projekt",desc:"Neuen Ordner als Repo anlegen"},{flag:"--bare",desc:"Bare-Repo (nur für Server, kein Arbeitsverzeichnis)"}], examples:[{title:"Neues Projekt starten",code:"<span class='prompt'>$ </span>mkdir mein-projekt && cd mein-projekt\n<span class='prompt'>$ </span>git init\n<span class='output'>Initialized empty Git repository in /home/user/mein-projekt/.git/</span>",note:"Ab jetzt werden alle Änderungen in diesem Ordner verfolgt."},{title:"Ersten Commit erstellen",code:"<span class='prompt'>$ </span>echo '# Mein Projekt' > README.md\n<span class='prompt'>$ </span>git add README.md\n<span class='prompt'>$ </span>git commit -m 'Erster Commit'",note:"Immer: init → add → commit"}], tip:"git init + git add . + git commit -m 'init' sind die drei Startbefehle jedes neuen Projekts.", tags:["Git","Versionskontrolle","Basis"] },
      { name:"git clone", short:"Repository klonen", desc:"Lädt ein Remote-Repository vollständig herunter — inklusive aller Commits, Branches und der gesamten Versionsgeschichte.", syntax:"<b>git clone</b> <span class='arg-part'>URL</span> <span class='opt-part'>[Ordner]</span>", options:[{flag:"git clone URL",desc:"Repo klonen (Ordnername = Repo-Name)"},{flag:"git clone URL mein-name",desc:"Unter eigenem Namen speichern"},{flag:"--depth 1",desc:"Nur letzten Commit laden (schneller)"},{flag:"--branch main",desc:"Bestimmten Branch klonen"},{flag:"--recurse-submodules",desc:"Submodule mit klonen"}], examples:[{title:"GitHub-Repo klonen",code:"<span class='prompt'>$ </span>git clone https://github.com/user/projekt.git\n<span class='output'>Cloning into 'projekt'...\nremote: Counting objects: 142, done.\nReceiving objects: 100% (142/142), 2.3 MiB, done.</span>",note:"Erstellt automatisch einen Ordner mit dem Repo-Namen."},{title:"Nur letzten Commit (flach)",code:"<span class='prompt'>$ </span>git clone --depth 1 https://github.com/user/grosses-repo.git",note:"--depth 1 spart enorm Zeit und Speicher bei großen Repos."}], tip:"Nach dem Klonen: cd in den Ordner, dann sofort 'git remote -v' um die Verbindung zu prüfen.", tags:["Git","Versionskontrolle","Remote"] },
      { name:"git add", short:"Änderungen zur Stage hinzufügen", desc:"Fügt Dateien oder Änderungen zum Staging-Bereich (Index) hinzu — der Zwischenstufe vor dem eigentlichen Commit.", syntax:"<b>git add</b> <span class='arg-part'>Datei|Muster</span>", options:[{flag:"git add datei.txt",desc:"Eine einzelne Datei stagen"},{flag:"git add .",desc:"Alle Änderungen im aktuellen Verzeichnis stagen"},{flag:"git add -A",desc:"Alle Änderungen im gesamten Repo stagen"},{flag:"git add -p",desc:"Änderungen interaktiv (teilweise) stagen"},{flag:"git add *.js",desc:"Alle JS-Dateien stagen"}], examples:[{title:"Alle Änderungen stagen",code:"<span class='prompt'>$ </span>git status\n<span class='output'>modified: index.html\nnew file: style.css\ndeleted:  old.js</span>\n<span class='prompt'>$ </span>git add .\n<span class='prompt'>$ </span>git status\n<span class='output'>Changes to be committed: index.html, style.css, old.js</span>",note:"Grüne Dateien sind gestagete, rote ungestagete Änderungen."},{title:"Interaktives Stagen",code:"<span class='prompt'>$ </span>git add -p\n<span class='output'>@@ -10,3 +10,7 @@\n+  neue Zeile 1\n+  neue Zeile 2\nStage this hunk? [y/n/s/?]</span>",note:"-p ermöglicht es, nur Teile einer Datei zu committen."}], tip:"git add -p ist Gold wert — so landen keine Debug-Ausgaben oder Test-Änderungen versehentlich im Commit.", tags:["Git","Versionskontrolle","Basis"] },
      { name:"git commit", short:"Änderungen speichern", desc:"Speichert alle gestageten Änderungen als neuen Commit (Snapshot) in der Versionsgeschichte. Jeder Commit bekommt eine eindeutige SHA-ID.", syntax:"<b>git commit</b> <span class='opt-part'>-m 'Nachricht'</span>", options:[{flag:"-m 'Text'",desc:"Commit-Nachricht direkt angeben"},{flag:"-a -m 'Text'",desc:"Alle geänderten Dateien automatisch stagen + committen"},{flag:"--amend",desc:"Letzten Commit nachträglich ändern (Nachricht oder Inhalt)"},{flag:"-m 'Titel' -m 'Details'",desc:"Mehrzeilige Commit-Nachricht"}], examples:[{title:"Normaler Commit",code:"<span class='prompt'>$ </span>git add .\n<span class='prompt'>$ </span>git commit -m 'Login-Button Farbe geändert'\n<span class='output'>[main 3a4f8c2] Login-Button Farbe geändert\n 1 file changed, 2 insertions(+), 2 deletions(-)</span>",note:"Commit-Nachrichten sollten beschreiben WAS und WARUM, nicht WIE."},{title:"Letzten Commit korrigieren",code:"<span class='prompt'>$ </span>git commit --amend -m 'Korrekte Commit-Nachricht'\n<span class='comment'># oder vergessene Datei hinzufügen:</span>\n<span class='prompt'>$ </span>git add vergessen.txt && git commit --amend --no-edit",note:"--amend nur für lokale Commits — nie bei bereits gepushten Commits!"}], warn:"git commit --amend verändert die Commit-Geschichte — nie bei Commits die bereits gepusht wurden!", tags:["Git","Versionskontrolle","Basis"] },
      { name:"git status / log", short:"Status und Geschichte anzeigen", desc:"git status zeigt den aktuellen Zustand des Repos (geänderte, gestagete, untracked Dateien). git log zeigt die Commit-Geschichte.", syntax:"<b>git status</b>  |  <b>git log</b> <span class='opt-part'>[Optionen]</span>", options:[{flag:"git status",desc:"Aktuellen Zustand anzeigen"},{flag:"git status -s",desc:"Kurzform (M=modified, A=added, ??=untracked)"},{flag:"git log",desc:"Vollständige Commit-Geschichte"},{flag:"git log --oneline",desc:"Kompakte Ansicht (eine Zeile pro Commit)"},{flag:"git log --graph --oneline",desc:"Branches als ASCII-Baum"},{flag:"git log -5",desc:"Letzte 5 Commits anzeigen"},{flag:"git log --author='Max'",desc:"Commits eines bestimmten Autors"}], examples:[{title:"Status prüfen",code:"<span class='prompt'>$ </span>git status\n<span class='output'>On branch main\nChanges not staged for commit:\n  modified: README.md\nUntracked files:\n  neu.txt</span>",note:"Immer git status vor git add ausführen — gibt Überblick."},{title:"Geschichte anzeigen",code:"<span class='prompt'>$ </span>git log --oneline --graph\n<span class='output'>* 3a4f8c2 (HEAD -> main) Login-Button geändert\n* b29a1f0 Startseite erstellt\n* 8c3d2e1 Erster Commit</span>",note:"--graph zeigt Branches als visuellen Baum."}], tip:"git log --all --oneline --graph zeigt alle Branches gleichzeitig — sehr nützlich bei komplexen Projekten.", tags:["Git","Versionskontrolle","Überblick"] },
      { name:"git diff", short:"Unterschiede anzeigen", desc:"Zeigt die genauen Unterschiede (Zeile für Zeile) zwischen Dateiversionen — zwischen Arbeitsverzeichnis, Stage und Commits.", syntax:"<b>git diff</b> <span class='opt-part'>[Optionen] [Commit1] [Commit2]</span>", options:[{flag:"git diff",desc:"Ungestagete Änderungen anzeigen"},{flag:"git diff --staged",desc:"Gestagete Änderungen (was wird committet)"},{flag:"git diff HEAD~1",desc:"Vergleich mit vorherigem Commit"},{flag:"git diff main feature",desc:"Zwei Branches vergleichen"},{flag:"git diff SHA1 SHA2",desc:"Zwei spezifische Commits vergleichen"},{flag:"git diff -- datei.txt",desc:"Nur eine bestimmte Datei vergleichen"}], examples:[{title:"Aktuelle Änderungen sehen",code:"<span class='prompt'>$ </span>git diff\n<span class='output'>diff --git a/index.html b/index.html\n-  <h1>Alt</h1>\n+  <h1>Neu</h1></span>",note:"Rot (-) = gelöscht, Grün (+) = hinzugefügt."},{title:"Was wird committet?",code:"<span class='prompt'>$ </span>git add index.html\n<span class='prompt'>$ </span>git diff --staged\n<span class='output'>diff --git a/index.html b/index.html\n+  <h1>Neu</h1></span>",note:"--staged zeigt genau was im nächsten Commit landet."}], tip:"git difftool öffnet einen grafischen Diff-Editor (z.B. meld) — viel übersichtlicher als Terminal-Diff.", tags:["Git","Versionskontrolle","Analyse"] },
      { name:"git branch / checkout", short:"Branches verwalten", desc:"Branches erlauben parallele Entwicklung. git branch verwaltet Branches, git checkout / git switch wechselt zwischen ihnen.", syntax:"<b>git branch</b> <span class='opt-part'>[Name]</span>  |  <b>git checkout</b> <span class='opt-part'>-b Branch</span>", options:[{flag:"git branch",desc:"Alle lokalen Branches auflisten"},{flag:"git branch -a",desc:"Alle Branches inkl. Remote"},{flag:"git branch feature-x",desc:"Neuen Branch erstellen"},{flag:"git checkout feature-x",desc:"Zu Branch wechseln"},{flag:"git checkout -b feature-x",desc:"Erstellen und direkt wechseln"},{flag:"git branch -d feature-x",desc:"Branch löschen (nach Merge)"},{flag:"git branch -D feature-x",desc:"Branch löschen (erzwingen)"}], examples:[{title:"Feature-Branch erstellen",code:"<span class='prompt'>$ </span>git checkout -b feature/login\n<span class='output'>Switched to a new branch 'feature/login'</span>\n<span class='comment'># Entwickeln, committen...</span>\n<span class='prompt'>$ </span>git checkout main\n<span class='prompt'>$ </span>git merge feature/login",note:"Feature-Branches halten main sauber und stabil."},{title:"Übersicht aller Branches",code:"<span class='prompt'>$ </span>git branch -a\n<span class='output'>* main\n  feature/login\n  remotes/origin/main\n  remotes/origin/dev</span>",note:"* markiert den aktuellen Branch."}], tip:"Moderner Befehl: 'git switch -c feature-x' statt 'git checkout -b' — klarer und weniger verwechslungsanfällig.", tags:["Git","Versionskontrolle","Branches"] },
      { name:"git merge / rebase", short:"Branches zusammenführen", desc:"git merge kombiniert zwei Branches zu einem. git rebase schreibt die Commit-Geschichte um und legt Commits auf einen neuen Basis-Commit.", syntax:"<b>git merge</b> <span class='arg-part'>Branch</span>  |  <b>git rebase</b> <span class='arg-part'>Branch</span>", options:[{flag:"git merge feature-x",desc:"Feature-Branch in aktuellen Branch mergen"},{flag:"git merge --no-ff feature-x",desc:"Merge-Commit erzwingen (keine Fast-Forward)"},{flag:"git merge --abort",desc:"Merge bei Konflikt abbrechen"},{flag:"git rebase main",desc:"Aktuellen Branch auf main neu basieren"},{flag:"git rebase --interactive HEAD~3",desc:"Letzte 3 Commits interaktiv bearbeiten"},{flag:"git rebase --abort",desc:"Rebase abbrechen"}], examples:[{title:"Feature-Branch mergen",code:"<span class='prompt'>$ </span>git checkout main\n<span class='prompt'>$ </span>git merge feature/login\n<span class='output'>Merge made by the 'ort' strategy.\n login.html | 45 ++++++++++++++\n 1 file changed, 45 insertions(+)</span>",note:"Fast-Forward wenn möglich, sonst Merge-Commit."},{title:"Merge-Konflikt lösen",code:"<span class='prompt'>$ </span>git merge feature/login\n<span class='output'>CONFLICT (content): Merge conflict in index.html\nAutomatic merge failed; fix conflicts and then commit.</span>\n<span class='comment'># Datei bearbeiten, Konflikt-Marker entfernen</span>\n<span class='prompt'>$ </span>git add index.html\n<span class='prompt'>$ </span>git commit",note:"Konflikt-Marker: <<<<<<< HEAD (mein Code) >>>>>>> feature (fremder Code)"}], warn:"git rebase schreibt Geschichte um — nie auf gepushte/geteilte Branches anwenden!", tags:["Git","Versionskontrolle","Branches"] },
      { name:"git push / pull", short:"Mit Remote synchronisieren", desc:"git push lädt lokale Commits auf das Remote-Repository hoch. git pull lädt Änderungen vom Remote herunter und merged sie.", syntax:"<b>git push</b> <span class='opt-part'>origin Branch</span>  |  <b>git pull</b> <span class='opt-part'>origin Branch</span>", options:[{flag:"git push origin main",desc:"Lokalen main-Branch hochladen"},{flag:"git push -u origin main",desc:"Branch mit Remote verknüpfen (einmalig)"},{flag:"git push --all",desc:"Alle Branches pushen"},{flag:"git pull",desc:"Änderungen holen und mergen"},{flag:"git pull --rebase",desc:"Holen und mit Rebase integrieren"},{flag:"git fetch",desc:"Nur holen, ohne zu mergen"},{flag:"git remote -v",desc:"Remote-URL anzeigen"}], examples:[{title:"Ersten Push einrichten",code:"<span class='prompt'>$ </span>git remote add origin https://github.com/user/repo.git\n<span class='prompt'>$ </span>git push -u origin main\n<span class='output'>Branch 'main' set up to track remote branch 'main' from 'origin'.</span>",note:"-u merkt sich den Remote — danach reicht 'git push' allein."},{title:"Täglich mit Remote synchronisieren",code:"<span class='prompt'>$ </span>git pull\n<span class='comment'># Arbeiten, committen...</span>\n<span class='prompt'>$ </span>git push\n<span class='output'>To https://github.com/user/repo.git\n   b29a1f0..3a4f8c2  main -> main</span>",note:"git pull vor git push — so bleiben Konflikte minimal."}], tip:"git fetch + git merge ist sicherer als git pull — zeigt erst was kommt, bevor es gemergt wird.", tags:["Git","Versionskontrolle","Remote"] },
      { name:"git stash", short:"Änderungen vorübergehend ablegen", desc:"Stash speichert unfertige Änderungen temporär weg, ohne einen Commit zu erstellen. Nützlich für schnellen Branch-Wechsel.", syntax:"<b>git stash</b> <span class='opt-part'>[push|pop|list|drop]</span>", options:[{flag:"git stash",desc:"Aktuelle Änderungen stashen"},{flag:"git stash push -m 'Name'",desc:"Stash mit Beschreibung speichern"},{flag:"git stash list",desc:"Alle Stashes auflisten"},{flag:"git stash pop",desc:"Letzten Stash anwenden und löschen"},{flag:"git stash apply stash@{2}",desc:"Bestimmten Stash anwenden (behalten)"},{flag:"git stash drop",desc:"Letzten Stash löschen"},{flag:"git stash clear",desc:"Alle Stashes löschen"}], examples:[{title:"Typischer Stash-Workflow",code:"<span class='comment'># Mitten in der Arbeit → dringender Bugfix nötig</span>\n<span class='prompt'>$ </span>git stash push -m 'WIP: neue Funktion'\n<span class='prompt'>$ </span>git checkout hotfix\n<span class='comment'># Bugfix erledigen...</span>\n<span class='prompt'>$ </span>git checkout feature\n<span class='prompt'>$ </span>git stash pop\n<span class='output'>On branch feature: restored working directory</span>",note:"Stash rettet die Arbeit beim Kontextwechsel."},{title:"Mehrere Stashes verwalten",code:"<span class='prompt'>$ </span>git stash list\n<span class='output'>stash@{0}: WIP: neue Funktion\nstash@{1}: Experiment Layout</span>\n<span class='prompt'>$ </span>git stash apply stash@{1}",note:"apply lässt den Stash erhalten, pop löscht ihn."}], tip:"git stash branch feature-aus-stash erstellt direkt einen Branch aus dem Stash — praktisch wenn der Stash doch zu komplex wird.", tags:["Git","Versionskontrolle","Workflow"] },
      { name:".gitignore", short:"Dateien ignorieren", desc:"Die .gitignore-Datei definiert welche Dateien und Ordner Git ignorieren soll — z.B. Build-Artefakte, Passwörter, node_modules.", syntax:"<b>.gitignore</b> — Textdatei im Repo-Stammverzeichnis", options:[{flag:"*.log",desc:"Alle .log-Dateien ignorieren"},{flag:"node_modules/",desc:"Verzeichnis ignorieren"},{flag:"!wichtig.log",desc:"Ausnahme: diese Datei NICHT ignorieren"},{flag:"/config.local.js",desc:"Nur im Wurzelverzeichnis"},{flag:"build/**",desc:"Alles im build-Ordner"},{flag:"# Kommentar",desc:"Kommentarzeile"}], examples:[{title:"Typische .gitignore für Web-Projekt",code:"<span class='comment'># .gitignore</span>\nnode_modules/\ndist/\n.env\n.env.local\n*.log\n.DS_Store\n.idea/\n.vscode/settings.json\ncoverage/",note:"Nie .env oder Passwort-Dateien committen!"},{title:".gitignore nachträglich anwenden",code:"<span class='comment'># Falls Datei bereits getrackt ist:</span>\n<span class='prompt'>$ </span>git rm --cached node_modules -r\n<span class='prompt'>$ </span>git commit -m '.gitignore: node_modules entfernt'",note:"git rm --cached entfernt aus dem Index, aber nicht von der Festplatte."}], tip:"github.com/github/gitignore hat fertige .gitignore-Templates für jede Sprache — einfach kopieren.", tags:["Git","Versionskontrolle","Konfiguration"] }
    ]
